{{/* Ultimo aggiornamento + pulsante stampa
     Usato in: pagine rischio, piano emergenza, allerte, piano familiare */}}
<div class="page-tools d-flex flex-wrap justify-content-between align-items-center mt-4 pt-3 border-top">
  <div class="small text-muted">
    {{ if and .Date (not (eq (.Date.Format "2006") "0001")) }}
    <i class="bi bi-clock me-1" aria-hidden="true"></i>
    Ultimo aggiornamento: <time datetime="{{ .Lastmod.Format "2006-01-02" }}">{{ .Lastmod | time.Format ":date_long" }}</time>
    {{ end }}
  </div>
  <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.print()" aria-label="Stampa questa pagina">
    <i class="bi bi-printer me-1" aria-hidden="true"></i> Stampa
  </button>
</div>
