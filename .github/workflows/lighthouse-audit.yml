# ============================================================
# Workflow: Audit Accessibilità Automatico con Lighthouse
# Si attiva dopo ogni deploy riuscito
# ============================================================
name: "♿ Audit Accessibilità"

on:
  # Si attiva quando il workflow di deploy è completato
  workflow_run:
    workflows: ["🚀 Build e Deploy"]
    types:
      - completed

  # Permette esecuzione manuale
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # Aspetta che GitHub Pages si aggiorni
      - name: "⏳ Attendi propagazione deploy"
        run: sleep 60

      - name: "🔦 Esegui Lighthouse (3 run × 3 URL, mediana)"
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      - name: "📊 Riepilogo punteggi"
        if: always()
        run: |
          echo "## ♿ Risultati Audit Accessibilità + Performance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configurazione: 3 run × 3 URL (home + comunicazioni + numeri-utili), mobile, mediana." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Soglie" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibilità: ≥ 95/100 (warn errore se sotto, requisito WCAG 2.2 AA)" >> $GITHUB_STEP_SUMMARY
          echo "- Best Practices: ≥ 95/100 (errore)" >> $GITHUB_STEP_SUMMARY
          echo "- SEO: ≥ 95/100 (errore)" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: ≥ 85/100 (warn, target operativo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configurazione: lighthouserc.json nella root del repo. Modifica le soglie lì." >> $GITHUB_STEP_SUMMARY
