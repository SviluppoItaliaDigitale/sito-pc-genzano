name: "🛠️ Fix radio zero one-shot"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-radio-zero-one-shot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-radio-zero:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Correggi Ø usato come zero nei nominativi fittizi"
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          files = [
              Path('content/formazione/radiocomunicazioni-emergenza/gestione-messaggi.md'),
              Path('content/formazione/radiocomunicazioni-emergenza/tecniche-operative.md'),
          ]

          for path in files:
              text = path.read_text(encoding='utf-8')
              fixed = text.replace('IØ', 'I0')
              if fixed != text:
                  path.write_text(fixed, encoding='utf-8')
                  print(f'corretto: {path}')
              else:
                  print(f'nessuna modifica necessaria: {path}')
          PY

          rm -f .github/workflows/fix-radio-zero-one-shot.yml

      - name: "📝 Commit correzione"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Corregge zero numerico nei nominativi radio formativi"
            git push
          fi
