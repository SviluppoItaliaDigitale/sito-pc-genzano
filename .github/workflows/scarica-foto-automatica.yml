name: "📷 Scarica foto da fonti libere (articoli con marker)"

# Quando si scrive un articolo da mobile/cloud (sandbox blocca i domini esterni),
# si inserisce nel frontmatter un marker (uno tra i seguenti):
#
#   # TODO-foto-wikipedia: bash scripts/foto-da-wikipedia.sh "Titolo Wikipedia" slug-articolo [lang]
#   # TODO-foto-nasa:      bash scripts/foto-da-nasa.sh      "search query"     slug-articolo
#   # TODO-foto-usgs:      bash scripts/foto-da-usgs.sh      shakemap eventid   slug-articolo
#
# Questo workflow scansiona tutti gli articoli, esegue i comandi indicati,
# scarica le foto, applica la fascia blu istituzionale, aggiorna il
# frontmatter (image + image_credit + image_source_url) e committa.
# Poi triggera esplicitamente il deploy.
#
# Skip: i commit del workflow stesso contengono "[skip-foto-wiki]" nel
# messaggio per evitare loop di re-trigger.
#
# Sicurezza: solo gli script in WHITELIST possono essere eseguiti. Il workflow
# NON esegue comandi grezzi dal frontmatter — estrae solo i parametri e li
# passa allo script corretto.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: "foto-automatica"
  cancel-in-progress: false

jobs:
  scarica-foto:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-foto-wiki]')"
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Installa dipendenze (Python Pillow + font Liberation)"
        run: |
          sudo apt-get update -qq
          # python3-pil: Pillow (gestione immagini cross-platform, WebP nativo)
          # python3-pil.imagetk: per Image.fromarray ecc (sicurezza extra)
          # fonts-liberation: Liberation Sans Bold/Regular usati per la fascia
          sudo apt-get install -y -qq python3-pil fonts-liberation
          fc-cache -f 2>/dev/null | tail -1 || true

      - name: "🩺 Diagnostica ambiente Python+Pillow"
        run: |
          echo "=== Python + Pillow ==="
          python3 -c "from PIL import Image, features; print('Pillow:', Image.__version__); print('WebP:', features.check('webp'))"
          echo ""
          echo "=== Font Liberation disponibili ==="
          ls /usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf /usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf 2>&1
          echo ""
          echo "=== Test rapido scrittura WebP via Pillow ==="
          python3 -c "from PIL import Image; import os; Image.new('RGB',(100,100),(0,51,102)).save('/tmp/test.webp','WEBP',quality=85); print('[ok] WebP scritto:', os.path.getsize('/tmp/test.webp'), 'bytes')" || echo "[FAIL] WebP scrittura"

      - name: "🔍 Cerca articoli con marker TODO-foto-*"
        id: scan
        run: |
          set -e
          MATCHES=$(grep -rlE "^# TODO-foto-(wikipedia|nasa|usgs|noaa):" content/comunicazioni/ 2>/dev/null || true)
          if [ -z "$MATCHES" ]; then
            echo "[info] Nessun articolo con marker TODO-foto-* trovato."
            echo "found=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "[info] Articoli trovati:"
          echo "$MATCHES"
          echo "$MATCHES" > /tmp/articoli-da-processare.txt
          NUM=$(echo "$MATCHES" | wc -l)
          echo "found=$NUM" >> "$GITHUB_OUTPUT"

      - name: "📷 Scarica foto e aggiorna frontmatter"
        if: steps.scan.outputs.found != '0'
        id: download
        run: |
          set +e
          PROCESSED=0
          FAILED=0
          declare -a FAILED_ITEMS

          ALLOWED_SCRIPTS="foto-da-wikipedia.sh foto-da-nasa.sh foto-da-usgs.sh foto-da-noaa.sh"

          while IFS= read -r ARTICLE; do
            [ -z "$ARTICLE" ] && continue
            echo "─────────────────────────────────────────────"
            echo "Articolo: $ARTICLE"

            MARKER_LINE=$(grep -m1 -E "^# TODO-foto-(wikipedia|nasa|usgs|noaa):" "$ARTICLE")
            FONTE=$(echo "$MARKER_LINE" | sed -nE 's/^# TODO-foto-(wikipedia|nasa|usgs|noaa):.*$/\1/p')
            CMD=$(echo "$MARKER_LINE" | sed -E "s/^# TODO-foto-${FONTE}:[[:space:]]*//")

            if [ -z "$FONTE" ] || [ -z "$CMD" ]; then
              echo "[warn] marker malformato, skip"
              continue
            fi
            echo "Fonte:   $FONTE"
            echo "Comando: $CMD"

            SCRIPT_NAME=$(echo "$CMD" | grep -oE 'scripts/[a-z-]+\.sh' | head -1 | sed 's|scripts/||')
            if ! echo " $ALLOWED_SCRIPTS " | grep -q " $SCRIPT_NAME "; then
              echo "[error] script non consentito: $SCRIPT_NAME (consentiti: $ALLOWED_SCRIPTS)"
              FAILED=$((FAILED+1))
              FAILED_ITEMS+=("$ARTICLE: script non consentito '$SCRIPT_NAME'")
              continue
            fi

            # NON usare 'bash -c "$CMD"': i titoli Wikipedia/NASA contengono
            # apostrofi (es. "dell'Irpinia") che rompono il parsing della shell.
            # Estraggo titolo + parametri e invoco lo script direttamente con
            # quoting corretto (eseguibile come array di argomenti).
            case "$FONTE" in
              wikipedia|nasa)
                # Pattern: bash scripts/foto-da-XXX.sh "Titolo o query" slug [lang]
                TITLE=$(echo "$CMD" | grep -oE '"[^"]+"' | head -1 | sed 's/^"\(.*\)"$/\1/')
                REST=$(echo "$CMD" | sed -E 's/.*"[^"]+"\s*//')
                SLUG=$(echo "$REST" | awk '{print $1}')
                EXTRA=$(echo "$REST" | awk '{print $2}')
                if [ -z "$TITLE" ] || [ -z "$SLUG" ]; then
                  echo "[error] parametri non estraibili dal marker $FONTE: $CMD"
                  FAILED=$((FAILED+1))
                  FAILED_ITEMS+=("$ARTICLE ($FONTE): parametri non estraibili")
                  continue
                fi
                if [ -n "$EXTRA" ]; then
                  OUTPUT=$(bash "scripts/$SCRIPT_NAME" "$TITLE" "$SLUG" "$EXTRA" 2>&1)
                else
                  OUTPUT=$(bash "scripts/$SCRIPT_NAME" "$TITLE" "$SLUG" 2>&1)
                fi
                EXIT=$?
                ;;
              usgs)
                # Pattern: bash scripts/foto-da-usgs.sh shakemap <eventid> <slug>
                TOKENS=$(echo "$CMD" | sed -E 's|^bash\s+scripts/foto-da-usgs\.sh\s+||')
                MODE=$(echo "$TOKENS" | awk '{print $1}')
                EVENTID=$(echo "$TOKENS" | awk '{print $2}')
                SLUG=$(echo "$TOKENS" | awk '{print $3}')
                if [ -z "$MODE" ] || [ -z "$EVENTID" ] || [ -z "$SLUG" ]; then
                  echo "[error] parametri USGS non estraibili: $CMD"
                  FAILED=$((FAILED+1))
                  FAILED_ITEMS+=("$ARTICLE (usgs): parametri non estraibili")
                  continue
                fi
                OUTPUT=$(bash scripts/foto-da-usgs.sh "$MODE" "$EVENTID" "$SLUG" 2>&1)
                EXIT=$?
                ;;
              noaa)
                # Pattern: bash scripts/foto-da-noaa.sh "URL diretto NOAA" "Descrizione" <slug>
                # Estraggo i due valori tra virgolette + slug (3 parametri quotati)
                URL=$(echo "$CMD" | grep -oE '"[^"]+"' | sed -n '1p' | sed 's/^"\(.*\)"$/\1/')
                DESC=$(echo "$CMD" | grep -oE '"[^"]+"' | sed -n '2p' | sed 's/^"\(.*\)"$/\1/')
                SLUG=$(echo "$CMD" | awk '{print $NF}')
                if [ -z "$URL" ] || [ -z "$DESC" ] || [ -z "$SLUG" ]; then
                  echo "[error] parametri NOAA non estraibili: $CMD"
                  FAILED=$((FAILED+1))
                  FAILED_ITEMS+=("$ARTICLE (noaa): parametri non estraibili")
                  continue
                fi
                OUTPUT=$(bash scripts/foto-da-noaa.sh "$URL" "$DESC" "$SLUG" 2>&1)
                EXIT=$?
                ;;
              *)
                echo "[error] fonte non gestita: $FONTE"
                FAILED=$((FAILED+1))
                FAILED_ITEMS+=("$ARTICLE: fonte non gestita '$FONTE'")
                continue
                ;;
            esac

            if [ "$EXIT" -ne 0 ]; then
              echo "[error] script $SCRIPT_NAME fallito (exit $EXIT):"
              echo "$OUTPUT"
              FAILED=$((FAILED+1))
              FAILED_ITEMS+=("$ARTICLE ($FONTE): script fallito (exit $EXIT)")
              continue
            fi
            echo "$OUTPUT"

            ORIGIN=$(echo "$OUTPUT" | grep -oE 'Origine:\s*https?://\S+' | sed 's/^Origine:\s*//')
            AUTHOR=$(echo "$OUTPUT" | sed -nE 's/^\s*Autore:\s*(.*)$/\1/p' | head -1)
            LICENSE_=$(echo "$OUTPUT" | sed -nE 's/^\s*Licenza:\s*(.*)$/\1/p' | head -1)

            python3 scripts/aggiorna-frontmatter-foto.py \
              "$ARTICLE" \
              "$SLUG" \
              "${AUTHOR:-Sconosciuto}" \
              "${LICENSE_:-Sconosciuta}" \
              "${ORIGIN:-}" || {
              echo "[error] aggiornamento frontmatter fallito"
              FAILED=$((FAILED+1))
              FAILED_ITEMS+=("$ARTICLE ($FONTE): aggiornamento frontmatter fallito")
              continue
            }

            PROCESSED=$((PROCESSED+1))
          done < /tmp/articoli-da-processare.txt

          echo "─────────────────────────────────────────────"
          echo "[summary] Processati: $PROCESSED, Falliti: $FAILED"
          echo "processed=$PROCESSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" -gt 0 ]; then
            {
              echo "items<<EOF_ITEMS"
              for it in "${FAILED_ITEMS[@]}"; do echo "- $it"; done
              echo "EOF_ITEMS"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: "🎨 Genera cover tipografiche per articoli senza foto"
        id: cover
        run: |
          set +e
          # Genera cover istituzionali (gradiente blu + titolo + fascia) per
          # articoli con image: "" e SENZA marker TODO-foto-* (sicuro: non
          # sovrascrive image: già valorizzato come foto utente custom).
          OUT=$(python3 scripts/auto-cover-mancanti.py 2>&1) || true
          echo "$OUT"
          GENERATED=$(echo "$OUT" | grep -oE 'Cover generate: [0-9]+' | grep -oE '[0-9]+' | head -1)
          GENERATED="${GENERATED:-0}"
          echo "generated=$GENERATED" >> "$GITHUB_OUTPUT"

      - name: "💾 Commit e push (foto + cover)"
        id: commit
        if: |
          (steps.download.outputs.processed != '0' && steps.download.outputs.processed != '') ||
          (steps.cover.outputs.generated != '0' && steps.cover.outputs.generated != '')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/images/ content/comunicazioni/
          if git diff --staged --quiet; then
            echo "[info] nessuna modifica da committare"
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PHOTO_COUNT="${{ steps.download.outputs.processed }}"
          COVER_COUNT="${{ steps.cover.outputs.generated }}"
          git commit -m "[skip-foto-wiki] Cover automatiche: ${PHOTO_COUNT:-0} foto + ${COVER_COUNT:-0} cover tipografiche

          Workflow: scarica-foto-automatica.yml
          - Foto scaricate (Wikipedia/NASA/USGS, licenze libere): ${PHOTO_COUNT:-0}
          - Cover tipografiche generate (gradiente blu + titolo): ${COVER_COUNT:-0}

          Per foto: fascia blu istituzionale applicata, frontmatter aggiornato
          (image + image_credit + image_source_url).
          Per cover tipografiche: applicata solo dove image: era vuoto e senza
          marker TODO-foto-* (mai sovrascritte foto utente custom)."
          git push
          echo "did_commit=true" >> "$GITHUB_OUTPUT"

      - name: "🚀 Triggera deploy"
        if: steps.commit.outputs.did_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref main
          echo "[ok] deploy.yml triggerato"

      - name: "🚨 Apri issue se ci sono fallimenti"
        if: steps.download.outputs.failed != '0' && steps.download.outputs.failed != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="📷 Foto automatiche non scaricate ($(date +%Y-%m-%d))"
          BODY=$(cat <<EOF
          Il workflow \`scarica-foto-automatica.yml\` non e riuscito a scaricare le foto per ${{ steps.download.outputs.failed }} articoli.

          Articoli da gestire manualmente:

          ${{ steps.download.outputs.items }}

          Per riprovare: modifica il marker (titolo Wikipedia diverso, query NASA, eventid USGS valido), poi committa.

          Il workflow ri-girera automaticamente al prossimo push su \`main\`.
          EOF
          )
          gh issue create --title "$TITLE" --body "$BODY" || echo "[warn] gh issue create fallito"
