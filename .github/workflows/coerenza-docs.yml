name: "Coerenza documentazione"

# Controllo mensile della coerenza interna tra i file di governance:
# CLAUDE.md, archetypes/comunicazioni.md, .claude/rules/*.md,
# MANUALE-SITO.md, PIANO-EDITORIALE.md e il partial badge.html.
# Apre una issue se trova deviazioni o riferimenti rotti.

on:
  schedule:
    # Primo del mese alle 07:00 UTC
    - cron: "0 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  coerenza:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Verifica coerenza interna"
        id: check
        shell: bash
        run: |
          set -u
          REPORT="/tmp/coerenza-report.md"
          : > "$REPORT"
          FOUND_ISSUES="false"

          echo "## Verifica coerenza documentazione" >> "$REPORT"
          echo "" >> "$REPORT"

          # 1) Esistenza file di governance
          echo "### 1. File di governance" >> "$REPORT"
          for f in CLAUDE.md MANUALE-SITO.md PIANO-EDITORIALE.md archetypes/comunicazioni.md archetypes/default.md \
                   .claude/rules/01-governance-pa.md .claude/rules/02-content-design-pa.md \
                   .claude/rules/03-accessibility.md .claude/rules/04-hugo-architecture.md \
                   .claude/rules/05-github-aruba-deploy.md .claude/rules/06-protezione-civile-scientifica.md; do
            if [ ! -f "$f" ]; then
              echo "- File mancante: \`$f\`" >> "$REPORT"
              FOUND_ISSUES="true"
            fi
          done
          echo "" >> "$REPORT"

          # 2) Import @.claude/rules/*.md dichiarati in CLAUDE.md devono esistere
          echo "### 2. Import dichiarati in CLAUDE.md" >> "$REPORT"
          while IFS= read -r imp; do
            path="${imp#@}"
            if [ ! -f "$path" ]; then
              echo "- Import rotto in \`CLAUDE.md\`: \`$imp\`" >> "$REPORT"
              FOUND_ISSUES="true"
            fi
          done < <(grep -oE '^@\.claude/rules/[a-z0-9-]+\.md' CLAUDE.md || true)
          echo "" >> "$REPORT"

          # 3) Coerenza badge list (fonte di verita: badge.html)
          echo "### 3. Coerenza badge list" >> "$REPORT"
          BADGE_FILE="themes/flavour-pcgenzano/layouts/partials/badge.html"
          if [ -f "$BADGE_FILE" ]; then
            # Estrae lo slice $known dal template Hugo
            KNOWN=$(grep -oP '\$known := slice \K[^-]+' "$BADGE_FILE" | head -1 | tr -d '"' | tr -s ' ' '\n' | sort -u | grep -v '^$' || true)
            BADGE_COUNT=$(echo "$KNOWN" | grep -c .)
            echo "Badge noti in \`$BADGE_FILE\`: $BADGE_COUNT categorie" >> "$REPORT"

            # Ogni badge deve essere menzionato almeno in rule 02 (fonte della verita per docs)
            for b in $KNOWN; do
              if ! grep -qi "$b" .claude/rules/02-content-design-pa.md; then
                echo "- Badge \`$b\` presente in \`badge.html\` ma assente in \`02-content-design-pa.md\`" >> "$REPORT"
                FOUND_ISSUES="true"
              fi
              if ! grep -qi "$b" CLAUDE.md; then
                echo "- Badge \`$b\` presente in \`badge.html\` ma assente in \`CLAUDE.md\`" >> "$REPORT"
                FOUND_ISSUES="true"
              fi
              if ! grep -qi "$b" archetypes/comunicazioni.md; then
                echo "- Badge \`$b\` presente in \`badge.html\` ma assente in \`archetypes/comunicazioni.md\`" >> "$REPORT"
                FOUND_ISSUES="true"
              fi
            done
          else
            echo "- File \`$BADGE_FILE\` non trovato" >> "$REPORT"
            FOUND_ISSUES="true"
          fi
          echo "" >> "$REPORT"

          # 4) Formato data articoli (solo AAAA-MM-GG, mai timezone)
          echo "### 4. Formato data articoli" >> "$REPORT"
          BAD_DATES=$(grep -lrE '^date: [0-9]{4}-[0-9]{2}-[0-9]{2}T' content/comunicazioni/ 2>/dev/null || true)
          if [ -n "$BAD_DATES" ]; then
            echo "Articoli con formato data non valido (contiene T/timezone):" >> "$REPORT"
            while IFS= read -r f; do
              [ -n "$f" ] && echo "- \`$f\`" >> "$REPORT"
            done <<< "$BAD_DATES"
            FOUND_ISSUES="true"
          else
            echo "OK: tutti gli articoli usano il formato \`AAAA-MM-GG\`." >> "$REPORT"
          fi
          echo "" >> "$REPORT"

          # 5) Frontmatter completo negli articoli (campi obbligatori archetype)
          echo "### 5. Frontmatter articoli" >> "$REPORT"
          REQUIRED_FIELDS=("title" "date" "description" "badge" "priorita" "autore" "draft")
          MISSING_FM=""
          for art in content/comunicazioni/*.md; do
            [ -f "$art" ] || continue
            # Estrae frontmatter (tra le prime --- e le seconde ---)
            fm=$(awk '/^---$/{c++; next} c==1' "$art")
            for field in "${REQUIRED_FIELDS[@]}"; do
              if ! echo "$fm" | grep -qE "^$field:"; then
                MISSING_FM="$MISSING_FM\n- \`$art\`: manca campo \`$field\`"
                FOUND_ISSUES="true"
              fi
            done
          done
          if [ -n "$MISSING_FM" ]; then
            echo "Articoli con frontmatter incompleto:" >> "$REPORT"
            printf "%b\n" "$MISSING_FM" >> "$REPORT"
          else
            echo "OK: frontmatter completo in tutti gli articoli." >> "$REPORT"
          fi
          echo "" >> "$REPORT"

          # 6) Riferimenti incrociati tra documenti di governance
          echo "### 6. Riferimenti incrociati" >> "$REPORT"
          if ! grep -q "MANUALE-SITO.md" CLAUDE.md; then
            echo "- \`CLAUDE.md\` non cita \`MANUALE-SITO.md\`" >> "$REPORT"
            FOUND_ISSUES="true"
          fi
          if ! grep -q "aggiorna-manuale" CLAUDE.md; then
            echo "- \`CLAUDE.md\` non cita il workflow \`aggiorna-manuale.yml\`" >> "$REPORT"
            FOUND_ISSUES="true"
          fi
          if ! grep -q "PIANO-EDITORIALE.md" CLAUDE.md; then
            echo "- \`CLAUDE.md\` non cita \`PIANO-EDITORIALE.md\`" >> "$REPORT"
            FOUND_ISSUES="true"
          fi
          echo "" >> "$REPORT"

          # Output
          echo "found_issues=$FOUND_ISSUES" >> "$GITHUB_OUTPUT"
          {
            echo "report<<EOF"
            cat "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "=== REPORT ==="
          cat "$REPORT"

      - name: "Apri issue se ci sono deviazioni"
        if: steps.check.outputs.found_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const report = `${{ steps.check.outputs.report }}`;
            const body = [
              `# Verifica mensile coerenza documentazione — ${today}`,
              ``,
              `Il controllo automatico ha rilevato deviazioni nella documentazione di governance.`,
              ``,
              report,
              ``,
              `### Azioni richieste`,
              ``,
              `- [ ] Allineare i file segnalati`,
              `- [ ] Verificare che \`badge.html\`, \`CLAUDE.md\`, \`archetypes/comunicazioni.md\` e \`.claude/rules/02-content-design-pa.md\` abbiano la stessa badge list`,
              `- [ ] Correggere gli articoli con frontmatter incompleto o data in formato errato`,
              `- [ ] Chiudere questa issue con il riferimento al commit di correzione`,
              ``,
              `---`,
              `*Issue generata automaticamente dal workflow \`coerenza-docs.yml\`.*`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Automatico] Coerenza documentazione — ${today}`,
              body: body,
              labels: ['documentazione', 'manutenzione', 'coerenza']
            });
