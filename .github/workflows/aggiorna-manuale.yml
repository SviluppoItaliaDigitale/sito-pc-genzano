name: "Aggiornamento MANUALE-SITO.md"

# Controllo settimanale delle fonti AGID / Designers Italia / Bootstrap Italia.
# Se una pagina ufficiale cambia, apre una issue con checklist di revisione.

on:
  schedule:
    # Ogni lunedi alle 06:00 UTC (08:00 Europe/Rome in ora legale, 07:00 in ora solare)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  verifica-fonti:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: "Installa dipendenze"
        run: pip install --quiet beautifulsoup4

      - name: "Verifica fonti ufficiali e calcola hash"
        id: check
        shell: bash
        run: |
          set -u
          STATE_FILE=".manuale/sources-hashes.json"
          CHANGES_FILE="/tmp/manuale-changes.md"
          : > "$CHANGES_FILE"

          # Versione dell'algoritmo di hashing. Se diversa da quella nel manifesto
          # esistente, è in corso una migrazione (es. v1 sed → v2 BeautifulSoup):
          # NON segnaliamo cambiamenti, solo re-baseline silenziosa.
          ALGORITMO="v2-text-only"

          declare -A FONTI=(
            ["linee_guida_design_pa"]="https://www.agid.gov.it/it/design-servizi/linee-guida-design-servizi-web-pa"
            ["designers_italia_home"]="https://designers.italia.it/"
            ["designers_italia_guide"]="https://designers.italia.it/risorse-per-progettare/"
            ["writing_toolkit"]="https://designers.italia.it/risorse-per-progettare/content-design/writing-toolkit/"
            ["content_toolkit"]="https://designers.italia.it/risorse-per-progettare/content-design/"
            ["ui_kit"]="https://designers.italia.it/kit/ui-kit/"
            ["bootstrap_italia_docs"]="https://italia.github.io/bootstrap-italia/docs/come-iniziare/introduzione/"
            ["accessibilita_agid"]="https://www.agid.gov.it/it/design-servizi/accessibilita"
            ["dichiarazione_accessibilita"]="https://form.agid.gov.it/"
            ["dipartimento_pc"]="https://www.protezionecivile.gov.it/"
          )

          PREV_ALGO=$(jq -r '._meta.algoritmo // ""' "$STATE_FILE" 2>/dev/null || echo "")
          if [ "$PREV_ALGO" != "$ALGORITMO" ]; then
            echo "::notice ::Migrazione algoritmo hashing: $PREV_ALGO -> $ALGORITMO. Nessuna issue verrà aperta in questo run (re-baseline silenziosa)."
            BASELINE="true"
          else
            BASELINE="false"
          fi

          HAS_CHANGES="false"
          NEW_JSON=$(jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg algo "$ALGORITMO" \
            '{
              "_meta": {
                "descrizione": "Hash SHA-256 del solo testo visibile (main/body) delle fonti AGID / Designers Italia monitorate settimanalmente dal workflow .github/workflows/aggiorna-manuale.yml. Lo script scripts/hash-fonte-agid.py rimuove script, style, header, footer, cookie banner e pattern volatili (timestamp, fingerprint asset) prima dell hashing, così le modifiche puramente cosmetiche non scattano falsi positivi.",
                "algoritmo": $algo,
                "ultimo_aggiornamento": $ts,
                "note": "Aggiornato automaticamente dal workflow. Non modificare manualmente."
              },
              "fonti": {}
            }')

          for key in "${!FONTI[@]}"; do
            url="${FONTI[$key]}"
            echo "Verifica: $key -> $url"

            # Lo script Python gestisce internamente download, parsing, normalizzazione
            # e hashing. Stampa l'hash su stdout o scrive errore su stderr ed esce 2.
            if hash=$(python3 scripts/hash-fonte-agid.py "$url" 2>/dev/null); then
              :
            else
              echo "  ATTENZIONE: impossibile elaborare $url"
              hash="errore-download"
            fi

            prev_hash=$(jq -r --arg k "$key" '.fonti[$k].hash // ""' "$STATE_FILE" 2>/dev/null || echo "")

            if [ "$BASELINE" = "false" ] \
               && [ -n "$prev_hash" ] \
               && [ "$prev_hash" != "$hash" ] \
               && [ "$hash" != "errore-download" ]; then
              HAS_CHANGES="true"
              echo "- **$key** — [$url]($url)" >> "$CHANGES_FILE"
            fi

            NEW_JSON=$(echo "$NEW_JSON" | jq \
              --arg k "$key" \
              --arg u "$url" \
              --arg h "$hash" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '.fonti[$k] = {"url": $u, "hash": $h, "verificato": $ts}')
          done

          echo "$NEW_JSON" | jq '.' > "$STATE_FILE"

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          if [ "$HAS_CHANGES" = "true" ]; then
            {
              echo "changes<<EOF"
              cat "$CHANGES_FILE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: "Commit aggiornamento hash"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .manuale/sources-hashes.json; then
            echo "Nessuna modifica agli hash."
          else
            git add .manuale/sources-hashes.json
            git commit -m "Aggiornamento hash fonti manuale — verifica settimanale"
            git push
          fi

      - name: "Apri issue di revisione se ci sono cambiamenti"
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const changes = `${{ steps.check.outputs.changes }}`;
            const body = [
              `## Revisione settimanale del manuale operativo — ${today}`,
              ``,
              `Il controllo automatico ha rilevato modifiche nelle fonti ufficiali AGID / Designers Italia.`,
              `Le pagine seguenti sono cambiate dall'ultima verifica:`,
              ``,
              changes,
              ``,
              `> **Nota struttura (da maggio 2026):** il manuale e' diviso in 18 file separati nella cartella \`manuale/\` (1 file per Parte). \`MANUALE-SITO.md\` nella root resta come indice. Le modifiche vanno fatte sul file specifico della Parte interessata.`,
              ``,
              `### Checklist di revisione`,
              ``,
              `- [ ] Aprire ogni URL e annotare le modifiche rilevanti`,
              `- [ ] Valutare l'impatto sulle Parti del manuale (vedi \`manuale/README.md\` per indice)`,
              `- [ ] Aggiornare regole AGID in \`manuale/parte-02-le-regole-agid-in-dettaglio.md\` se il Writing Toolkit e' cambiato`,
              `- [ ] Aggiornare specifiche immagini in \`manuale/parte-03-immagini-per-gli-articoli.md\` se il UI Kit e' cambiato`,
              `- [ ] Verificare che gli esempi di codice Bootstrap Italia siano ancora validi`,
              `- [ ] Verificare la dichiarazione di accessibilita`,
              `- [ ] Rivedere \`manuale/parte-11-testi-per-i-social-instagram-facebook-x-telegram.md\` se cambiano le linee guida PA sulla comunicazione digitale`,
              `- [ ] Rivedere \`manuale/parte-12-comunicati-stampa-tempo-ordinario-e-tempo-emergenziale.md\` se cambia la normativa su trasparenza o comunicazione pubblica`,
              `- [ ] Aggiornare il changelog in \`MANUALE-SITO.md\` (indice) con la data e le modifiche`,
              `- [ ] Chiudere questa issue con il riferimento al commit di aggiornamento`,
              ``,
              `---`,
              `*Issue generata automaticamente dal workflow \`aggiorna-manuale.yml\` lunedi mattina.*`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Automatico] Revisione manuale operativo — ${today}`,
              body: body,
              labels: ['manuale', 'documentazione', 'revisione']
            });
