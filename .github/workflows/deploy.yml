name: "🚀 Build e Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "⚙️ Setup Hugo"
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.143.1'
          extended: true

      - name: "♿ Setup liblouis (braille) + segno (QR) + dipendenze Python"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-louis liblouis-data python3-yaml
          pip install --break-system-packages segno

      - name: "🔲 Genera QR code mancanti per gli articoli"
        # Idempotente: salta i QR già presenti in static/qr/.
        # Genera <slug>.png (600x600) + <slug>.svg (vettoriale) per articoli
        # nuovi pubblicati da mobile senza esecuzione locale dello script.
        # Storia: 16/05/2026 articolo Giro Formia andò live senza bottone "Scarica QR"
        # perché lo script non era in CI e nessuno l'aveva lanciato manualmente.
        run: python3 scripts/genera-qr-articoli.py

      - name: "📖 Genera versioni Braille (.brf) per gli articoli /comunicazioni/"
        # Specifiche: manuale/parte-24-output-braille-articoli.md
        # Output in static/braille/comunicazioni/<slug>.brf (ASCII puro, BRF/ICEB).
        # Idempotente (mtime-based): solo articoli nuovi/modificati vengono rigenerati.
        run: python3 scripts/genera-braille.py

      - name: "🖨️ Genera pacchetti HTML stampabili 1-click per fascia"
        # Genera 4 file in static/formazione/schede-stampabili/pacchetti/ con tutte
        # le schede di una fascia concatenate, pronte per la stampa diretta dal browser
        # (bottone "Stampa tutto" sulla hub schede-stampabili).
        # Fonte di verità: content/formazione/kit-scuola-<fascia>.md (la stessa usata
        # per gli ZIP scaricabili offline). Idempotente: ricrea sempre da zero.
        # Auto-aggiornamento: ogni push → pacchetti riflettono lo stato corrente.
        run: python3 scripts/genera-pacchetti-schede.py

      - name: "🏗️ Build per Aruba"
        run: hugo --minify --baseURL "https://www.protezionecivilegenzano.it/"

      - name: "🔎 Estendi indice cerca con pagine HTML statiche (Aruba)"
        run: python3 scripts/aggiungi-pagine-statiche-al-cerca.py

      - name: "📤 Deploy FTP su Aruba"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /www.protezionecivilegenzano.it/
          dangerous-clean-slate: false
          timeout: 60000
          log-level: verbose
          exclude: |
            **/documenti/**

      - name: "🏗️ Build per GitHub Pages"
        run: hugo --minify --baseURL "https://sviluppoitaliadigitale.github.io/sito-pc-genzano/"

      - name: "🔎 Estendi indice cerca con pagine HTML statiche (GitHub Pages)"
        run: python3 scripts/aggiungi-pagine-statiche-al-cerca.py

      - name: "📦 Upload artifact GitHub Pages"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: "🌐 Deploy GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
