name: "🚀 Build e Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout del repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔧 Installa Hugo"
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: "⚙️ Configura Pages"
        id: pages
        uses: actions/configure-pages@v5

      - name: "🏗️ Build del sito Hugo"
        env:
          TZ: 'Europe/Rome'
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify

      - name: "📦 Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "🌐 Deploy su GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
