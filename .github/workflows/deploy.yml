name: "🚀 Build e Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Hugo"
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: "🏗️ Build per Aruba"
        run: hugo --minify --baseURL "https://www.protezionecivilegenzano.it/"

      - name: "📤 Deploy FTP su Aruba"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /www.protezionecivilegenzano.it/
          dangerous-clean-slate: false
          timeout: 60000
          log-level: verbose
          exclude: |
            **/documenti/**
            **/cartelli/**
            **/giochi-bambini/**
            **/formazionepc/**
            **/quizpc/**

      - name: "🏗️ Build per GitHub Pages"
        run: hugo --minify --baseURL "https://sviluppoitaliadigitale.github.io/sito-pc-genzano/"

      - name: "📦 Upload artifact GitHub Pages"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: "🌐 Deploy GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
