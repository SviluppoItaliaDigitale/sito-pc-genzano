name: "Aggiornamento meteo Genzano"

# Aggiorna data/meteo.json ogni 3 ore con dati Open-Meteo.
# Fonte: Open-Meteo (modelli ECMWF/DWD, open data, server UE).
# Per allerte ufficiali il riferimento resta il Centro Funzionale Regione Lazio.

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggiorna-meteo:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Fetch Open-Meteo e genera data/meteo.json"
        shell: python3 {0}
        run: |
          import json, urllib.request, datetime, os

          LAT, LON = 41.7063, 12.6921
          URL = (
              "https://api.open-meteo.com/v1/forecast"
              f"?latitude={LAT}&longitude={LON}"
              "&current=temperature_2m,relative_humidity_2m,apparent_temperature,"
              "is_day,precipitation,weather_code,wind_speed_10m"
              "&daily=weather_code,temperature_2m_max,temperature_2m_min,"
              "precipitation_sum,precipitation_probability_max,wind_speed_10m_max"
              "&timezone=Europe%2FRome&forecast_days=3"
          )

          CODES = {
              0:  ("Sereno",                    "bi-sun",                   "si-orange"),
              1:  ("Prevalentemente sereno",    "bi-cloud-sun",             "si-orange"),
              2:  ("Parzialmente nuvoloso",     "bi-cloud-sun",             "si-teal"),
              3:  ("Coperto",                   "bi-clouds",                "si-teal"),
              45: ("Nebbia",                    "bi-cloud-fog2",            "si-teal"),
              48: ("Nebbia con brina",          "bi-cloud-fog2",            "si-teal"),
              51: ("Pioviggine leggera",        "bi-cloud-drizzle",         "si-blue"),
              53: ("Pioviggine moderata",       "bi-cloud-drizzle",         "si-blue"),
              55: ("Pioviggine intensa",        "bi-cloud-drizzle",         "si-blue"),
              56: ("Pioviggine gelata",         "bi-cloud-hail",            "si-blue"),
              57: ("Pioviggine gelata intensa", "bi-cloud-hail",            "si-blue"),
              61: ("Pioggia leggera",           "bi-cloud-rain",            "si-blue"),
              63: ("Pioggia",                   "bi-cloud-rain",            "si-blue"),
              65: ("Pioggia forte",             "bi-cloud-rain-heavy",      "si-blue"),
              66: ("Pioggia gelata",            "bi-cloud-hail",            "si-blue"),
              67: ("Pioggia gelata forte",      "bi-cloud-hail",            "si-blue"),
              71: ("Neve leggera",              "bi-snow",                  "si-teal"),
              73: ("Neve",                      "bi-snow",                  "si-teal"),
              75: ("Neve forte",                "bi-snow",                  "si-teal"),
              77: ("Granelli di neve",          "bi-snow2",                 "si-teal"),
              80: ("Rovesci leggeri",           "bi-cloud-rain",            "si-blue"),
              81: ("Rovesci",                   "bi-cloud-rain-heavy",      "si-blue"),
              82: ("Rovesci violenti",          "bi-cloud-rain-heavy",      "si-red"),
              85: ("Rovesci di neve",           "bi-cloud-snow",            "si-teal"),
              86: ("Rovesci di neve forti",     "bi-cloud-snow",            "si-teal"),
              95: ("Temporale",                 "bi-cloud-lightning",       "si-red"),
              96: ("Temporale con grandine",    "bi-cloud-lightning-rain",  "si-red"),
              99: ("Temporale forte",           "bi-cloud-lightning-rain",  "si-red"),
          }

          def descrivi(code):
              return CODES.get(int(code), ("Non disponibile", "bi-cloud", "si-teal"))

          def nome_giorno(date_iso):
              oggi = datetime.date.today()
              d = datetime.date.fromisoformat(date_iso)
              diff = (d - oggi).days
              if diff == 0: return "Oggi"
              if diff == 1: return "Domani"
              if diff == 2: return "Dopodomani"
              return d.strftime("%A")

          req = urllib.request.Request(URL, headers={"User-Agent": "PCGenzanoBot/1.0"})
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read())

          current = data["current"]
          daily = data["daily"]
          cur_desc, cur_icon, cur_color = descrivi(current["weather_code"])

          out = {
              "aggiornamento": datetime.datetime.now(
                  datetime.timezone.utc
              ).astimezone().isoformat(timespec="seconds"),
              "fonte": "Open-Meteo (modelli ECMWF/DWD)",
              "fonte_url": "https://open-meteo.com/",
              "localita": "Genzano di Roma",
              "attuale": {
                  "temperatura": round(current["temperature_2m"]),
                  "temperatura_percepita": round(current["apparent_temperature"]),
                  "condizione": cur_desc,
                  "icona": cur_icon,
                  "colore": cur_color,
                  "umidita": current["relative_humidity_2m"],
                  "vento_kmh": round(current["wind_speed_10m"]),
                  "precipitazione_mm": current["precipitation"],
                  "giorno": bool(current["is_day"])
              },
              "previsione": []
          }

          prob = daily.get("precipitation_probability_max") or [0] * len(daily["time"])
          for i, day in enumerate(daily["time"]):
              desc, icon, color = descrivi(daily["weather_code"][i])
              out["previsione"].append({
                  "data": day,
                  "giorno": nome_giorno(day),
                  "condizione": desc,
                  "icona": icon,
                  "colore": color,
                  "temp_max": round(daily["temperature_2m_max"][i]),
                  "temp_min": round(daily["temperature_2m_min"][i]),
                  "precip_prob": prob[i] or 0,
                  "precip_mm": round(daily["precipitation_sum"][i] or 0, 1),
                  "vento_max_kmh": round(daily["wind_speed_10m_max"][i])
              })

          os.makedirs("data", exist_ok=True)
          with open("data/meteo.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
              f.write("\n")

          print(json.dumps(out, ensure_ascii=False, indent=2))

      - name: "Commit e push"
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/meteo.json; then
            echo "Nessuna variazione significativa."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add data/meteo.json
            git commit -m "Aggiornamento meteo Genzano"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Triggera build e deploy"
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref main || echo "Deploy sara eseguito al prossimo push manuale."
