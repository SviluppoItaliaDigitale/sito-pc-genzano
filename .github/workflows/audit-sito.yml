name: "🕵️ Audit settimanale sito"

# Audit completo automatico (38 sezioni) di contenuti, codice, governance:
# - 1-15  contenuti pubblicati: COI, numeri emergenza, telefono, sede, CAP,
#         placeholder, asset rotti, badge, date, allegati, frasi AGID,
#         pagine draft, schede stampabili, modalità emergenza, dataRevisione,
#         widget duplicati
# - 16-22 codice/template: build Hugo pulito, articoli draft:true, link
#         interni a slug inesistenti, sintassi JS, validità YAML workflow,
#         path assoluti template, residui refactoring (CCV-MB, lombardo,
#         /index.html)
# - 23-32 governance docs: file presenti, import CLAUDE.md, badge list
#         coerente fra badge.html/CLAUDE/rule02/archetype, formato date,
#         frontmatter completo, riferimenti incrociati, pagine obbligatorie,
#         shortcode foto, script export, formato dataUltimaRevisione
# - 33-38 audit aggiuntivo: mixed content (http://), image_alt accessibility,
#         coerenza dati istituzionali nelle 7 traduzioni, divergenze
#         hugo.toml ↔ data/numeri_utili.yaml, smoke test rendering H1
#         delle pagine critiche, link critici normativa/PDF locali
#
# Nasce dall'audit manuale di aprile 2026 (COI 15° errato → 14°, cartello AR4 404,
# 115/118 come numero da chiamare, data widget meteo errata, placeholder
# residui) e dal checkup completo di fine aprile 2026 (duplicate target
# paths, slug typo nei link interni, draft:true dimenticati, manuale
# lombardo residuo, /index.html residui post-Chrome-cache fix).
#
# Storia merge: il 26 aprile 2026 il workflow `coerenza-docs.yml` (che
# girava lun 07:00) è stato fuso qui dentro come sezioni 23-32 per non
# avere 2 issue separate il lunedì mattina con la stessa filosofia.

on:
  schedule:
    # Ogni lunedi alle 09:00 UTC (dopo check-normativa-links delle 08:00,
    # prima di check-links-sito delle 10:00)
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔧 Setup Hugo"
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: "🏗️ Build sito (per smoke test rendering)"
        run: hugo --minify

      - name: "🧪 Audit contenuti"
        id: audit
        shell: bash
        run: |
          # Override del default GitHub Actions (set -e -o pipefail).
          # Lo script ha 40+ sezioni con grep condizionali. Un grep che
          # ritorna 1 (no match) sul primo controllo NON deve far fallire
          # tutto lo script — è informazione legittima (no issue trovate).
          # Set -e e set -u sono troppo aggressivi per il pattern di
          # questo script. Pipefail mantenuto per intercettare errori veri
          # nelle pipeline (es. grep | head | wc dove head fallisce).
          set +e
          set +u
          set -o pipefail
          REPORT="/tmp/audit-report.md"
          : > "$REPORT"
          FOUND="false"

          section() { echo "" >> "$REPORT"; echo "### $1" >> "$REPORT"; echo "" >> "$REPORT"; }
          ok()      { echo "- ✅ $1" >> "$REPORT"; }
          warn()    { echo "- ⚠️ $1" >> "$REPORT"; FOUND="true"; }
          err()     { echo "- ❌ $1" >> "$REPORT"; FOUND="true"; }

          # Scope dell'audit: pagine pubblicate (escludendo governance e rules)
          # Le regole di governance citano deliberatamente i numeri deprecati
          # (per spiegare il divieto), quindi vanno escluse dalle grep di veridicità.
          CONTENT_GLOB="content"
          THEME_GLOB="themes/flavour-pcgenzano"

          echo "# Audit settimanale sito — $(date -u +%Y-%m-%d)" >> "$REPORT"

          # ----------------------------------------------------------------
          section "1. Coerenza COI (Centro Operativo Intercomunale)"
          # Il gruppo aderisce al 14° C.O.I. della Provincia di Roma.
          # Qualsiasi altro grado citato nei contenuti pubblici è un errore storico.
          BAD_COI=$(grep -rInE '\b(1[0-35-9]|20|21|22)°[[:space:]]*C\.?O\.?I\.?\b' \
            "$CONTENT_GLOB/" "$THEME_GLOB/layouts/" hugo.toml data/ 2>/dev/null || true)
          if [ -n "$BAD_COI" ]; then
            err "Riferimenti al COI con grado diverso da 14° trovati:"
            echo '```' >> "$REPORT"
            echo "$BAD_COI" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Tutti i riferimenti al COI usano il 14°."
          fi

          # ----------------------------------------------------------------
          section "2. Numero unico emergenza NUE 112"
          # Nel Lazio dal 2017 il cittadino chiama solo il 112. I numeri 115,
          # 118 e 1515 non devono più apparire come numero da chiamare nei
          # contenuti del sito. Sono ammessi come "nome organizzazione"
          # (es. "ARES 118", "Corpo Forestale 1515"), quindi la grep cerca
          # pattern imperativi: "chiamare il 115", "comporre il 118", "tel: 1515" ecc.
          # Esclude i pattern didattici "Non chiamare il 115/118/1515" che
          # spiegano al cittadino di NON usarli (es. assistente guidato).
          DEPRECATED=$(grep -rInE \
            '(chiama[rt]e?|componi|comporre|numero|tel\.?|contatta[rt]e?)[[:space:]]*(il[[:space:]]*)?(1515|115|118)\b' \
            "$CONTENT_GLOB/" "$THEME_GLOB/layouts/" data/ 2>/dev/null \
            | grep -vE 'Non[[:space:]]+chiamare|non[[:space:]]+chiama[rt]e?|invece[[:space:]]+(di|del)|al[[:space:]]+posto[[:space:]]+(di|del)|sostituisce|sostituito' \
            || true)
          if [ -n "$DEPRECATED" ]; then
            err "Numeri deprecati citati come numero da chiamare (usare solo 112):"
            echo '```' >> "$REPORT"
            echo "$DEPRECATED" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Nessun riferimento imperativo a 115/118/1515: il cittadino è indirizzato al 112."
          fi

          # ----------------------------------------------------------------
          section "3. Telefono istituzionale coerente"
          # hugo.toml è la fonte di verità. Ogni altra occorrenza del numero
          # di sede deve coincidere: spazi variabili ammessi ma cifre identiche.
          TEL_DISPLAY=$(grep -oP 'telefono\s*=\s*"\K[^"]+' hugo.toml | head -1 || true)
          TEL_E164=$(grep -oP 'telefono_tel\s*=\s*"\K[^"]+' hugo.toml | head -1 || true)
          if [ -z "$TEL_DISPLAY" ] || [ -z "$TEL_E164" ]; then
            err "hugo.toml: \`telefono\` o \`telefono_tel\` mancante."
          else
            ok "hugo.toml: telefono = \`$TEL_DISPLAY\` / telefono_tel = \`$TEL_E164\`"
            # Cifre pure del numero istituzionale (senza +39 e senza spazi)
            TEL_DIGITS=$(echo "$TEL_DISPLAY" | tr -d ' +' | sed 's/^39//')
            # Cerca numeri telefonici "da sede" (06 9362...) con cifre diverse
            OTHER_TEL=$(grep -rInE '06[[:space:]]*93[[:space:]]*6[[:space:]]*2[0-9]{3}' \
              "$CONTENT_GLOB/" data/ 2>/dev/null \
              | grep -vE "$(echo "$TEL_DIGITS" | sed 's/^06//' | sed 's/./&[[:space:]]*/g')" \
              || true)
            if [ -n "$OTHER_TEL" ]; then
              warn "Possibili numeri 06 93 62... con cifre diverse dal numero istituzionale:"
              echo '```' >> "$REPORT"
              echo "$OTHER_TEL" | head -20 >> "$REPORT"
              echo '```' >> "$REPORT"
            else
              ok "Nessun numero 06 93 62xxx divergente dalle cifre di hugo.toml."
            fi
          fi

          # tel: href malformato (contiene spazi o mancanza di +39).
          # Le righe con template Go `{{ ... }}` vengono escluse: gli spazi sono
          # dentro l'espressione di template e vengono rimossi al render.
          BAD_TEL_HREF=$(grep -rInE 'href="tel:[^"]*( |%20)[^"]*"' \
            "$THEME_GLOB/" "$CONTENT_GLOB/" 2>/dev/null \
            | grep -v '{{' || true)
          if [ -n "$BAD_TEL_HREF" ]; then
            err "Attributi \`href=\"tel:...\"\` con spazi (violano RFC 3966 E.164):"
            echo '```' >> "$REPORT"
            echo "$BAD_TEL_HREF" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Tutti i \`href=\"tel:...\"\` sono in formato E.164 senza spazi."
          fi

          # ----------------------------------------------------------------
          section "4. Indirizzo sede coerente"
          # Via Sicilia, 13-15 — 00045 Genzano di Roma (RM). Verifica che
          # non compaiano varianti numeriche (13, 15 da sole) o CAP diversi.
          SEDE=$(grep -oP 'sede\s*=\s*"\K[^"]+' hugo.toml | head -1 || true)
          if [ -z "$SEDE" ]; then
            err "hugo.toml: \`sede\` mancante."
          else
            ok "Sede istituzionale: \`$SEDE\`"
            BAD_CAP=$(grep -rInE '\b000?[0-9]{2,4}\b.*Genzano' "$CONTENT_GLOB/" 2>/dev/null \
              | grep -vE '00045' || true)
            if [ -n "$BAD_CAP" ]; then
              warn "Occorrenze di CAP diversi da 00045 accanto a 'Genzano':"
              echo '```' >> "$REPORT"
              echo "$BAD_CAP" | head -10 >> "$REPORT"
              echo '```' >> "$REPORT"
            fi
          fi

          # ----------------------------------------------------------------
          section "5. Placeholder, TODO, Lorem ipsum, testi incompleti"
          # Esclusioni: descrizione vuota nel frontmatter (legittima),
          # commenti TODO nei sorgenti, attributi `placeholderTitle` /
          # `placeholderDesc` dello shortcode external-widget (questi
          # ATTRIBUTI sono nomi dei parametri, non testi placeholder).
          PLACEHOLDER=$(grep -rInE '\b(TODO|TBD|FIXME|XXX|lorem ipsum|placeholder|DA COMPLETARE|DA VERIFICARE|\{\{\s*[a-z_]+\s*\}\})\b' \
            "$CONTENT_GLOB/" 2>/dev/null \
            | grep -vE "(_index\.md:.*description:[[:space:]]*\"\"|#.*TODO|placeholderTitle=|placeholderDesc=|placeholder=\"|placeholder='|::placeholder|\.placeholder|placeholder-|aria-placeholder|input.*placeholder)" \
            || true)
          if [ -n "$PLACEHOLDER" ]; then
            err "Contenuti con placeholder o marker di lavoro in corso:"
            echo '```' >> "$REPORT"
            echo "$PLACEHOLDER" | head -30 >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Nessun placeholder residuo nei contenuti."
          fi

          # ----------------------------------------------------------------
          section "6. Immagini e allegati referenziati ma inesistenti"
          # Estrai tutti i riferimenti a file statici dai contenuti e verifica
          # che il file corrispondente esista in static/.
          MISSING_STATIC=""
          # Pattern: src="/images/...", src="/cartelli/...", src="/manuali/...",
          # href="/allegati/...", url: "/allegati/..." (frontmatter YAML),
          # shortcode foto src="/images/..."
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            # ref è tipo "/images/foo.webp" — togli la / iniziale e prepend static/
            path="static${ref}"
            if [ ! -f "$path" ]; then
              MISSING_STATIC="$MISSING_STATIC\n- \`$ref\`"
            fi
          done < <(grep -rhoE '(src=|href=|url:\s*)"?/(images|cartelli|manuali|allegati|comunicati|documenti)/[^"[:space:]<>)]+' \
              "$CONTENT_GLOB/" 2>/dev/null \
            | grep -oE '/(images|cartelli|manuali|allegati|comunicati|documenti)/[^"[:space:]<>)]+' \
            | sort -u)

          if [ -n "$MISSING_STATIC" ]; then
            # La cartella /documenti/ è gestita manualmente sul server Aruba: i
            # file non sono nel repo e quindi risulterebbero sempre mancanti —
            # li filtriamo per ridurre rumore.
            MISSING_FILTERED=$(printf "%b" "$MISSING_STATIC" | grep -v '/documenti/' || true)
            if [ -n "$MISSING_FILTERED" ]; then
              err "File statici referenziati ma non presenti nel repo:"
              echo '```' >> "$REPORT"
              printf "%b\n" "$MISSING_FILTERED" | sort -u | head -40 >> "$REPORT"
              echo '```' >> "$REPORT"
            else
              ok "Nessun file statico mancante (i riferimenti a /documenti/ sono lato server Aruba)."
            fi
          else
            ok "Ogni riferimento a immagine/allegato punta a un file esistente."
          fi

          # ----------------------------------------------------------------
          section "7. Badge articoli coerenti con badge.html"
          BADGE_FILE="$THEME_GLOB/layouts/partials/badge.html"
          if [ -f "$BADGE_FILE" ]; then
            # Badge noti nel template (slice $known := slice "..." "..." ...).
            # Il template fa `$lower := $badge | lower` prima del confronto,
            # quindi qui normalizziamo tutto in minuscolo per replicare la logica.
            KNOWN_BADGES=$(grep -oP '\$known := slice \K[^-]+' "$BADGE_FILE" \
              | head -1 \
              | grep -oE '"[^"]+"' \
              | tr -d '"' \
              | tr '[:upper:]' '[:lower:]' \
              | sort -u)
            UNKNOWN_BADGES=""
            for art in "$CONTENT_GLOB"/comunicazioni/*.md; do
              [ -f "$art" ] || continue
              BADGE=$(awk '/^---$/{c++; next} c==1 && /^badge:/ {sub(/^badge:[[:space:]]*"?/,""); sub(/"?[[:space:]]*$/,""); print; exit}' "$art" || true)
              [ -z "$BADGE" ] && continue
              BADGE_LC=$(echo "$BADGE" | tr '[:upper:]' '[:lower:]')
              if ! echo "$KNOWN_BADGES" | grep -qx "$BADGE_LC"; then
                UNKNOWN_BADGES="$UNKNOWN_BADGES\n- \`$art\` usa badge \`$BADGE\` (non in badge.html)"
              fi
            done
            if [ -n "$UNKNOWN_BADGES" ]; then
              warn "Articoli con badge non dichiarato in badge.html (ricevono colore automatico):"
              printf "%b\n" "$UNKNOWN_BADGES" >> "$REPORT"
            else
              ok "Tutti i badge usati negli articoli sono dichiarati in badge.html."
            fi
          else
            err "File \`$BADGE_FILE\` non trovato."
          fi

          # ----------------------------------------------------------------
          section "8. Date articoli nel range plausibile"
          # Accetta 2020..anno_corrente+1. Date oltre sono quasi sempre typo.
          YEAR_MAX=$(( $(date -u +%Y) + 1 ))
          BAD_YEAR=""
          for art in "$CONTENT_GLOB"/comunicazioni/*.md; do
            [ -f "$art" ] || continue
            D=$(awk '/^---$/{c++; next} c==1 && /^date:/ {sub(/^date:[[:space:]]*"?/,""); sub(/"?[[:space:]]*$/,""); print; exit}' "$art" || true)
            YEAR=$(echo "$D" | cut -c1-4)
            case "$YEAR" in
              ''|*[!0-9]*) continue ;;
            esac
            if [ "$YEAR" -lt 2020 ] || [ "$YEAR" -gt "$YEAR_MAX" ]; then
              BAD_YEAR="$BAD_YEAR\n- \`$art\`: date \`$D\` (anno fuori range 2020..$YEAR_MAX)"
            fi
          done
          if [ -n "$BAD_YEAR" ]; then
            err "Articoli con anno sospetto nel frontmatter:"
            printf "%b\n" "$BAD_YEAR" >> "$REPORT"
          else
            ok "Tutte le date articolo sono nell'intervallo 2020..$YEAR_MAX."
          fi

          # ----------------------------------------------------------------
          section "9. Allegati PDF con dimensione dichiarata (WCAG 3.3.5)"
          # Il manuale raccomanda di dichiarare la dimensione per ogni allegato.
          # Qui segnaliamo (warn, non err) gli articoli con allegati senza dimensione.
          MISSING_SIZE=""
          for art in "$CONTENT_GLOB"/comunicazioni/*.md; do
            [ -f "$art" ] || continue
            fm=$(awk '/^---$/{c++; next} c==1' "$art")
            if echo "$fm" | grep -qE '^allegati:'; then
              # Se c'è almeno una voce allegati con "titolo:" ma senza "dimensione:"
              # NB: `grep -c` esce con code 1 quando il count è 0 e stampa già "0".
              # Il vecchio `|| echo 0` aggiungeva un secondo "0" creando una stringa
              # multiriga e rompendo i confronti `-gt`/`-lt` con "integer expression expected".
              TITOLI=$(echo "$fm" | grep -cE '^[[:space:]]*-[[:space:]]*titolo:' || true)
              DIM=$(echo "$fm" | grep -cE '^[[:space:]]*dimensione:' || true)
              TITOLI=${TITOLI:-0}
              DIM=${DIM:-0}
              if [ "$TITOLI" -gt 0 ] && [ "$DIM" -lt "$TITOLI" ]; then
                MISSING_SIZE="$MISSING_SIZE\n- \`$art\`: $TITOLI allegati ma solo $DIM con \`dimensione:\`"
              fi
            fi
          done
          if [ -n "$MISSING_SIZE" ]; then
            warn "Articoli con allegati privi di campo \`dimensione:\` (WCAG 3.3.5):"
            printf "%b\n" "$MISSING_SIZE" | head -30 >> "$REPORT"
          else
            ok "Tutti gli allegati dichiarano la dimensione."
          fi

          # ----------------------------------------------------------------
          section "10. Frasi AGID molto lunghe (>40 parole)"
          # Euristica: per ogni articolo, contiamo frasi > 40 parole.
          # È solo un warn: alcune frasi lunghe sono legittime (es. citazioni,
          # elenchi narrativi), ma il linguaggio PA tende a frasi ≤ 20 parole.
          LONG_SENT=""
          for art in "$CONTENT_GLOB"/comunicazioni/*.md; do
            [ -f "$art" ] || continue
            # Rimuovi frontmatter e converti blocchi in righe "frase"
            BODY=$(awk '/^---$/{c++; next} c>=2' "$art" \
              | tr '\n' ' ' \
              | sed 's/\([\.\!\?]\)/\1\n/g')
            COUNT=$(echo "$BODY" | awk '{ if (NF > 40) c++ } END { print c+0 }')
            if [ "$COUNT" -ge 3 ]; then
              LONG_SENT="$LONG_SENT\n- \`$art\`: $COUNT frasi con >40 parole"
            fi
          done
          if [ -n "$LONG_SENT" ]; then
            warn "Articoli con molte frasi lunghe (linguaggio PA raccomanda ≤ 20 parole per frase):"
            printf "%b\n" "$LONG_SENT" | head -20 >> "$REPORT"
          else
            ok "Nessun articolo con più di 2 frasi lunghe."
          fi

          # ----------------------------------------------------------------
          section "11. Pagine pubbliche con campo draft ambiguo"
          # _index.md delle sezioni statiche non dovrebbe avere draft: true.
          DRAFT_INDEX=$(grep -rlE '^draft:[[:space:]]*true' "$CONTENT_GLOB"/*/_index.md 2>/dev/null || true)
          if [ -n "$DRAFT_INDEX" ]; then
            err "Pagine \`_index.md\` marcate come \`draft: true\` (sparirebbero dal sito):"
            echo "$DRAFT_INDEX" | sed 's/^/- `/; s/$/`/' >> "$REPORT"
          else
            ok "Nessuna pagina istituzionale in bozza."
          fi

          # ----------------------------------------------------------------
          section "12. Schede stampabili linkate ma file mancante"
          # I kit didattici linkano schede in /formazione/schede-stampabili/<slug>/.
          # Ogni link deve corrispondere a un file static/formazione/schede-stampabili/<slug>/index.html.
          MISSING_SCHEDE=""
          # Estraggo gli slug linkati dai kit (formato /formazione/schede-stampabili/<slug>/)
          LINKED_SLUGS=$(grep -rohE '/formazione/schede-stampabili/[a-z0-9-]+/' \
            content/formazione/ 2>/dev/null \
            | sed 's|/formazione/schede-stampabili/||; s|/$||' | sort -u || true)
          for slug in $LINKED_SLUGS; do
            if [ ! -f "static/formazione/schede-stampabili/${slug}/index.html" ]; then
              MISSING_SCHEDE="${MISSING_SCHEDE}${slug}\n"
            fi
          done
          if [ -n "$MISSING_SCHEDE" ]; then
            err "Schede stampabili linkate dai kit ma il file HTML non esiste:"
            echo '```' >> "$REPORT"
            printf "%b" "$MISSING_SCHEDE" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Tutte le schede stampabili linkate hanno il file corrispondente."
          fi

          # ----------------------------------------------------------------
          section "13. Modalità emergenza attiva da troppo tempo"
          # data/emergenza.json con attiva: true e ultimo_aggiornamento più
          # vecchio di 14 giorni segnala probabile dimenticanza (l'utente
          # ha attivato l'emergenza ma non l'ha mai disattivata).
          EMERG_ACTIVE=$(jq -r '.attiva' data/emergenza.json 2>/dev/null || echo "false")
          if [ "$EMERG_ACTIVE" = "true" ]; then
            EMERG_DATE=$(jq -r '.ultimo_aggiornamento // ""' data/emergenza.json 2>/dev/null || true)
            if [ -n "$EMERG_DATE" ]; then
              # Calcola differenza in giorni (solo se la data è parsabile)
              EMERG_TS=$(date -u -d "$EMERG_DATE" +%s 2>/dev/null || echo "")
              if [ -n "$EMERG_TS" ]; then
                DIFF_DAYS=$(( ( $(date -u +%s) - EMERG_TS ) / 86400 ))
              else
                DIFF_DAYS=-1
              fi
              if [ "$DIFF_DAYS" -gt 14 ]; then
                err "data/emergenza.json ha attiva: true da $DIFF_DAYS giorni (ultimo_aggiornamento: $EMERG_DATE). Verificare se l'emergenza è ancora reale o se va disattivata."
              else
                ok "Modalità emergenza attiva da $DIFF_DAYS giorni (entro la soglia di 14)."
              fi
            else
              warn "data/emergenza.json è in modalità attiva ma manca il campo ultimo_aggiornamento."
            fi
          else
            ok "Modalità emergenza non attiva (ordinario)."
          fi

          # ----------------------------------------------------------------
          section "14. Pagine legali/istituzionali con dataUltimaRevisione vecchia"
          # Le pagine privacy, note-legali, accessibilita, social-media-policy
          # hanno il campo dataUltimaRevisione. Se più vecchio di 18 mesi è warning.
          LEGAL_PAGES="content/privacy/_index.md content/note-legali/_index.md content/accessibilita/_index.md content/social-media-policy/_index.md"
          OUTDATED_LEGAL=""
          for f in $LEGAL_PAGES; do
            [ -f "$f" ] || continue
            REV=$(grep -E '^dataUltimaRevisione:' "$f" | sed -E 's/^dataUltimaRevisione:[[:space:]]*"?([0-9-]+)"?.*/\1/' | head -1)
            [ -z "$REV" ] && { OUTDATED_LEGAL="${OUTDATED_LEGAL}- \`$f\`: campo dataUltimaRevisione assente\n"; continue; }
            REV_TS=$(date -u -d "$REV" +%s 2>/dev/null || echo "")
            if [ -n "$REV_TS" ]; then
              DIFF=$(( ( $(date -u +%s) - REV_TS ) / 86400 ))
            else
              DIFF=-1
            fi
            if [ "$DIFF" -gt 540 ]; then
              OUTDATED_LEGAL="${OUTDATED_LEGAL}- \`$f\`: rev $REV ($DIFF giorni fa)\n"
            fi
          done
          if [ -n "$OUTDATED_LEGAL" ]; then
            warn "Pagine legali con dataUltimaRevisione più vecchia di 18 mesi (rivedere il contenuto):"
            printf "%b" "$OUTDATED_LEGAL" >> "$REPORT"
          else
            ok "Tutte le pagine legali sono state riviste negli ultimi 18 mesi."
          fi

          # ----------------------------------------------------------------
          section "15. Coerenza widget esterni: data-widget-src duplicati"
          # Se due iframe widget nella stessa pagina hanno lo stesso widgetId,
          # il bottone "Carica" del secondo non funziona. Verifica che ogni
          # widgetId nel sito sia univoco per pagina costruita.
          # (Controllo: ogni widgetId compare al massimo 1 volta nello stesso file html prodotto)
          WIDGETID_DUPS=""
          if [ -d "public" ]; then
            for f in $(find public -name "*.html"); do
              IDS=$(grep -oE 'id="[a-z-]+"[^>]*data-widget-src' "$f" 2>/dev/null | sed -E 's/.*id="([^"]+)".*/\1/' | sort | uniq -d)
              if [ -n "$IDS" ]; then
                WIDGETID_DUPS="${WIDGETID_DUPS}${f}: ${IDS}\n"
              fi
            done
          fi
          if [ -n "$WIDGETID_DUPS" ]; then
            err "ID widget duplicati nella stessa pagina (rompe il bottone Carica):"
            echo '```' >> "$REPORT"
            printf "%b" "$WIDGETID_DUPS" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Nessun widget con widgetId duplicato nella stessa pagina."
          fi

          # ----------------------------------------------------------------
          section "16. Hugo build pulito (warning su duplicate target / template inutilizzati)"
          # Build con --printPathWarnings per catturare alias che collidono.
          # Esempio storico: 7 lingue avevano alias /en/index.html oltre /en/
          # che producevano duplicate target path su en/index.html.
          if command -v hugo >/dev/null 2>&1; then
            HUGO_OUT=$(hugo --minify --printPathWarnings 2>&1 || true)
            HUGO_WARN=$(echo "$HUGO_OUT" | grep -iE "warn|error|duplicate" | grep -vE "emergency-actions\.html is unused" || true)
            if [ -n "$HUGO_WARN" ]; then
              err "Hugo build emette warning di rilievo:"
              echo '```' >> "$REPORT"
              echo "$HUGO_WARN" | head -20 >> "$REPORT"
              echo '```' >> "$REPORT"
            else
              ok "Build Hugo pulito (warning conditionali esclusi)."
            fi
          else
            warn "Hugo non installato sul runner — sezione skippata."
          fi

          # ----------------------------------------------------------------
          section "17. Articoli con draft: true (regola: nessun articolo in revisione)"
          # Regola del progetto: gli articoli si pubblicano subito o si
          # calendarizzano. Mai "in bozza" — Hugo esclude i draft a prescindere
          # dalla data e nessun workflow flippa draft:true → false.
          DRAFT_ART=$(grep -rl '^draft: true$' "$CONTENT_GLOB"/comunicazioni/ 2>/dev/null || true)
          if [ -n "$DRAFT_ART" ]; then
            err "Articoli con \`draft: true\` (vanno pubblicati subito o calendarizzati con \`draft: false\` + data futura):"
            echo "$DRAFT_ART" | sed 's/^/- `/; s/$/`/' >> "$REPORT"
          else
            ok "Nessun articolo in stato draft (regola coerente)."
          fi

          # ----------------------------------------------------------------
          section "18. Link interni a slug inesistenti (typo o slug aggiornati)"
          # Scansiona i link [titolo](/comunicazioni/<slug>/) e verifica
          # che esista content/comunicazioni/<slug>.md. Rileva typo o slug
          # rinominati post-creazione, che vengono mostrati graceful dal
          # render-link hook ma rappresentano comunque un'intenzione persa.
          # Tutto in bash per evitare il pattern velenoso heredoc-python (la
          # validazione YAML strict si rompe con righe Python a colonna 1).
          BROKEN_INTERNAL=""
          LINKED_SLUGS=$(grep -rohE '/comunicazioni/[a-zA-Z0-9_-]+' "$CONTENT_GLOB"/ 2>/dev/null \
            | sed 's|/comunicazioni/||' | sort -u || true)
          for slug in $LINKED_SLUGS; do
            [ -f "$CONTENT_GLOB/comunicazioni/${slug}.md" ] || BROKEN_INTERNAL="${BROKEN_INTERNAL}- \`/comunicazioni/${slug}/\`\n"
          done
          if [ -n "$BROKEN_INTERNAL" ]; then
            err "Slug inesistenti citati nei link interni (verificare typo o aggiornamenti slug):"
            printf "%b" "$BROKEN_INTERNAL" | head -30 >> "$REPORT"
          else
            ok "Tutti i link \`/comunicazioni/<slug>/\` puntano a articoli esistenti."
          fi

          # ----------------------------------------------------------------
          section "19. Sintassi JavaScript dei file standalone"
          # Verifica con `node --check` tutti i .js in static/ (giochi, quiz,
          # scenari, mappa, abili-a-proteggere) per intercettare errori che
          # passerebbero il build Hugo ma romperebbero in browser.
          JS_ERRORS=""
          if command -v node >/dev/null 2>&1; then
            while IFS= read -r js; do
              [ -z "$js" ] && continue
              ERR=$(node --check "$js" 2>&1 || true)
              if [ -n "$ERR" ]; then
                JS_ERRORS="${JS_ERRORS}- \`$js\`: $(echo "$ERR" | head -1)\n"
              fi
            done < <(find static/ -name "*.js" -type f -not -path "*/node_modules/*" 2>/dev/null)
            if [ -n "$JS_ERRORS" ]; then
              err "Errori sintassi JavaScript:"
              printf "%b" "$JS_ERRORS" >> "$REPORT"
            else
              ok "Sintassi JavaScript pulita su tutti i file .js standalone."
            fi
          else
            warn "Node non installato — sezione skippata."
          fi

          # ----------------------------------------------------------------
          section "20. Validazione YAML dei workflow GitHub Actions"
          # I workflow vengono validati da GitHub al push, ma se il YAML è
          # invalido il run completa con failure senza aprire issue: il
          # problema può passare inosservato per settimane.
          # Pattern velenoso noto: heredoc python con istruzioni a colonna 1
          # dentro uno step bash → il parser legge quelle righe come chiavi
          # top-level rompendo la struttura.
          YAML_BAD=""
          for wf in .github/workflows/*.yml; do
            # Passo il filename via sys.argv invece di interpolarlo nella
            # stringa Python, così i filename con apici/spazi non rompono
            # il parser silenziosamente facendo passare il check come "OK".
            ERR=$(python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$wf" 2>&1 || true)
            if [ -n "$ERR" ]; then
              YAML_BAD="${YAML_BAD}- \`$wf\`: $(echo "$ERR" | head -1)\n"
            fi
          done
          if [ -n "$YAML_BAD" ]; then
            err "Workflow YAML non validi:"
            printf "%b" "$YAML_BAD" >> "$REPORT"
          else
            ok "Tutti i workflow YAML validano."
          fi

          # ----------------------------------------------------------------
          section "21. Path interni assoluti nei template (subpath GitHub Pages)"
          # I template che usano href assoluti tipo href="/foo/" funzionano
          # su Aruba (baseURL root) ma sono rotti su GitHub Pages dove il
          # baseURL ha il subpath /sito-pc-genzano/. Tutti i path interni nei
          # template Hugo devono usare relURL o absURL.
          ABS_HREF=$(grep -rnE 'href="/[a-z][^"]*"' "$THEME_GLOB/layouts/" 2>/dev/null \
            | grep -vE 'absURL|relURL|window\.SITO|class="skip-link"|href="/#"|href="/sito-pc-genzano' \
            | head -10 || true)
          if [ -n "$ABS_HREF" ]; then
            err "Template con \`href=\"/...\"\` hardcoded (rotto su GitHub Pages):"
            echo '```' >> "$REPORT"
            echo "$ABS_HREF" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Tutti i path interni nei template usano relURL/absURL."
          fi

          # ----------------------------------------------------------------
          section "22. Residui di refactoring (sweep dei pattern già fixati)"
          # Verifica l'assenza di residui dei refactoring storici, secondo
          # la regola di proattività .claude/rules/07-proattivita-coerenza.md.
          # Pattern noti da non lasciare reintrodurre:
          # - /quizpc/index.html, /formazionepc/index.html, /giochi/index.html
          #   (path canonico è senza /index.html)
          # - "intercomunale lombarda", "manuale originale", "Imbersago"
          #   (riferimenti al manuale lombardo, da citare solo come link)
          # - "CCV-MB", "Monza-Brianza" come fonte di articoli
          #   (regola: niente nomi di enti locali non pertinenti nel testo)
          RESIDUI=""
          PAT_INDEX=$(grep -rn '/index\.html"' "$CONTENT_GLOB/" "$THEME_GLOB/layouts/" 2>/dev/null | head -5 || true)
          [ -n "$PAT_INDEX" ] && RESIDUI="${RESIDUI}**/index.html nei contenuti/template:**\n\`\`\`\n$PAT_INDEX\n\`\`\`\n"
          PAT_LOMB=$(grep -rin "intercomunale lombard\|manuale originale\|imbersago" "$CONTENT_GLOB/" "$THEME_GLOB/layouts/" 2>/dev/null || true)
          [ -n "$PAT_LOMB" ] && RESIDUI="${RESIDUI}**Riferimenti al manuale lombardo:**\n\`\`\`\n$PAT_LOMB\n\`\`\`\n"
          PAT_CCV=$(grep -rin "ccv[-. ]mb\|monza.brianza" "$CONTENT_GLOB/" "$THEME_GLOB/layouts/" 2>/dev/null || true)
          [ -n "$PAT_CCV" ] && RESIDUI="${RESIDUI}**Riferimenti CCV-MB:**\n\`\`\`\n$PAT_CCV\n\`\`\`\n"
          if [ -n "$RESIDUI" ]; then
            err "Trovati residui di refactoring già completati:"
            printf "%b" "$RESIDUI" >> "$REPORT"
          else
            ok "Nessun residuo dei refactoring storici (CCV-MB, manuale lombardo, /index.html)."
          fi

          # ============================================================
          # Sezioni 23-32 — Coerenza documentazione di governance
          # (originariamente in coerenza-docs.yml, fuse qui per non avere
          # 2 issue separate il lunedì mattina con la stessa filosofia)
          # ============================================================

          # ----------------------------------------------------------------
          section "23. File di governance esistenti"
          GOV_MISSING=""
          for f in CLAUDE.md MANUALE-SITO.md PIANO-EDITORIALE.md archetypes/comunicazioni.md archetypes/default.md \
                   manuale/README.md \
                   .claude/rules/01-governance-pa.md .claude/rules/02-content-design-pa.md \
                   .claude/rules/03-accessibility.md .claude/rules/04-hugo-architecture.md \
                   .claude/rules/04a-hugo-shortcode-partial.md .claude/rules/04b-hugo-template-css.md \
                   .claude/rules/04c-hugo-static-cartelle.md \
                   .claude/rules/05-github-aruba-deploy.md .claude/rules/06-protezione-civile-scientifica.md \
                   .claude/rules/07-proattivita-coerenza.md \
                   .claude/rules/08-claude-code-setup.md \
                   .claude/rules/09-regole-contenuti-qualita.md \
                   .claude/rules/10-automazioni-github-actions.md; do
            [ -f "$f" ] || GOV_MISSING="${GOV_MISSING}- \`$f\`\n"
          done
          # Verifica anche che le 18 parti del manuale esistano (parte-00 a parte-17)
          MANUALE_PARTS_MISSING=""
          for n in 00 01 02 03 04 05 06 07 08 09 10 11 12 13 14 15 16 17; do
            if ! ls manuale/parte-${n}-*.md >/dev/null 2>&1; then
              MANUALE_PARTS_MISSING="${MANUALE_PARTS_MISSING}- \`manuale/parte-${n}-*.md\` (mancante)\n"
            fi
          done
          if [ -n "$GOV_MISSING" ] || [ -n "$MANUALE_PARTS_MISSING" ]; then
            err "File di governance/manuale mancanti:"
            printf "%b" "$GOV_MISSING$MANUALE_PARTS_MISSING" >> "$REPORT"
          else
            ok "Tutti i file di governance presenti (15 file root + 18 parti del manuale)."
          fi

          # ----------------------------------------------------------------
          section "24. Import @.claude/rules/*.md dichiarati in CLAUDE.md"
          BAD_IMPORT=""
          while IFS= read -r imp; do
            path="${imp#@}"
            [ -f "$path" ] || BAD_IMPORT="${BAD_IMPORT}- \`$imp\`\n"
          done < <(grep -oE '^@\.claude/rules/[a-z0-9-]+\.md' CLAUDE.md || true)
          if [ -n "$BAD_IMPORT" ]; then
            err "Import rotti in CLAUDE.md:"
            printf "%b" "$BAD_IMPORT" >> "$REPORT"
          else
            ok "Tutti gli import \`@.claude/rules/*.md\` in CLAUDE.md sono validi."
          fi

          # ----------------------------------------------------------------
          section "25. Coerenza badge list (badge.html ↔ CLAUDE.md / rule 02 / archetype)"
          BADGE_FILE_GOV="$THEME_GLOB/layouts/partials/badge.html"
          BADGE_DOC_DIVERG=""
          if [ -f "$BADGE_FILE_GOV" ]; then
            KNOWN_GOV=$(grep -oP '\$known := slice \K[^-]+' "$BADGE_FILE_GOV" | head -1 | tr -d '"' | tr -s ' ' '\n' | sort -u | grep -v '^$' || true)
            for b in $KNOWN_GOV; do
              grep -qi "$b" .claude/rules/02-content-design-pa.md || BADGE_DOC_DIVERG="${BADGE_DOC_DIVERG}- Badge \`$b\` mancante in \`02-content-design-pa.md\`\n"
              grep -qi "$b" CLAUDE.md || BADGE_DOC_DIVERG="${BADGE_DOC_DIVERG}- Badge \`$b\` mancante in \`CLAUDE.md\`\n"
              grep -qi "$b" archetypes/comunicazioni.md || BADGE_DOC_DIVERG="${BADGE_DOC_DIVERG}- Badge \`$b\` mancante in \`archetypes/comunicazioni.md\`\n"
            done
            if [ -n "$BADGE_DOC_DIVERG" ]; then
              err "Badge dichiarati in badge.html ma non documentati altrove:"
              printf "%b" "$BADGE_DOC_DIVERG" >> "$REPORT"
            else
              ok "Badge list coerente fra badge.html, CLAUDE.md, rule 02 e archetype."
            fi
          else
            err "File \`$BADGE_FILE_GOV\` non trovato."
          fi

          # ----------------------------------------------------------------
          section "26. Formato data articoli (no UTC, sì +02:00 Europe/Rome)"
          # NB: la sezione 8 verifica il range dell'anno; questa verifica il formato.
          # Regola 02-content-design-pa.md § "Regola critica formato data":
          #   - 1 articolo/giorno → date: AAAA-MM-GG (semplice)
          #   - 2+ articoli/giorno → date: AAAA-MM-GGTHH:MM:SS+02:00 (orari crescenti)
          # Il bug VERO è solo `T...Z` (UTC esplicito), non un T qualunque.
          BAD_DATE_FORMAT=$(grep -lrE '^date: [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:]+Z' content/comunicazioni/ 2>/dev/null || true)
          if [ -n "$BAD_DATE_FORMAT" ]; then
            err "Articoli con data in formato \`AAAA-MM-DDTHH:MM:SSZ\` UTC (regola 02: usare \`+02:00\` Europe/Rome, mai \`Z\`):"
            echo "$BAD_DATE_FORMAT" | sed 's/^/- `/; s/$/`/' >> "$REPORT"
          else
            ok "Tutte le date articolo in formato corretto (\`AAAA-MM-GG\` o \`AAAA-MM-GGTHH:MM:SS+02:00\`)."
          fi

          # ----------------------------------------------------------------
          section "27. Frontmatter completo articoli"
          REQUIRED_FIELDS="title date description badge priorita autore draft"
          MISSING_FM=""
          for art in "$CONTENT_GLOB"/comunicazioni/*.md; do
            [ -f "$art" ] || continue
            # Salta gli _index.md: sono indici di sezione, non articoli (regola Hugo).
            [ "$(basename "$art")" = "_index.md" ] && continue
            fm=$(awk '/^---$/{c++; next} c==1' "$art")
            for field in $REQUIRED_FIELDS; do
              echo "$fm" | grep -qE "^$field:" || MISSING_FM="${MISSING_FM}- \`$art\`: manca campo \`$field\`\n"
            done
          done
          if [ -n "$MISSING_FM" ]; then
            err "Articoli con frontmatter incompleto:"
            printf "%b" "$MISSING_FM" | head -30 >> "$REPORT"
          else
            ok "Frontmatter completo in tutti gli articoli."
          fi

          # ----------------------------------------------------------------
          section "28. Riferimenti incrociati CLAUDE.md ↔ docs"
          CROSS_MISS=""
          grep -q "MANUALE-SITO.md" CLAUDE.md || CROSS_MISS="${CROSS_MISS}- CLAUDE.md non cita \`MANUALE-SITO.md\`\n"
          grep -q "aggiorna-manuale" CLAUDE.md || CROSS_MISS="${CROSS_MISS}- CLAUDE.md non cita workflow \`aggiorna-manuale.yml\`\n"
          grep -q "PIANO-EDITORIALE.md" CLAUDE.md || CROSS_MISS="${CROSS_MISS}- CLAUDE.md non cita \`PIANO-EDITORIALE.md\`\n"
          if [ -n "$CROSS_MISS" ]; then
            err "Riferimenti incrociati mancanti:"
            printf "%b" "$CROSS_MISS" >> "$REPORT"
          else
            ok "CLAUDE.md cita correttamente MANUALE, PIANO e workflow di manutenzione."
          fi

          # ----------------------------------------------------------------
          section "29. Pagine content/ istituzionali obbligatorie"
          PAGES="content/_index.md content/accessibilita/_index.md content/allerte-meteo/_index.md \
                 content/area-download/_index.md content/cartografia/_index.md content/chi-siamo/_index.md \
                 content/contatti/_index.md content/cosa-fare-adesso/_index.md content/diventa-volontario/_index.md \
                 content/faq/_index.md content/formazione/_index.md content/note-legali/_index.md \
                 content/numeri-utili/_index.md content/piano-emergenza/_index.md content/piano-familiare/_index.md \
                 content/privacy/_index.md content/rischi-prevenzione/_index.md content/siti-utili/_index.md \
                 content/social-media-policy/_index.md"
          PAGE_MISS=""
          for p in $PAGES; do
            [ -f "$p" ] || PAGE_MISS="${PAGE_MISS}- \`$p\`\n"
          done
          if [ -n "$PAGE_MISS" ]; then
            err "Pagine istituzionali mancanti:"
            printf "%b" "$PAGE_MISS" >> "$REPORT"
          else
            ok "Tutte le 19 pagine content/ istituzionali presenti."
          fi

          # ----------------------------------------------------------------
          section "30. Shortcode foto presente e documentato"
          SHORTCODE_FOTO="$THEME_GLOB/layouts/shortcodes/foto.html"
          SC_ISSUES=""
          if [ ! -f "$SHORTCODE_FOTO" ]; then
            SC_ISSUES="${SC_ISSUES}- Shortcode mancante: \`$SHORTCODE_FOTO\`\n"
          else
            # Cerca "foto" in MANUALE-SITO.md (indice) o in qualsiasi parte del manuale
            (grep -q "foto" MANUALE-SITO.md || grep -q "foto" manuale/parte-03-*.md 2>/dev/null) \
              || SC_ISSUES="${SC_ISSUES}- Shortcode \`foto\` non citato in MANUALE-SITO.md o manuale/parte-03-*.md\n"
            grep -q "foto" .claude/rules/02-content-design-pa.md || SC_ISSUES="${SC_ISSUES}- Shortcode \`foto\` non citato in rule 02\n"
          fi
          if [ -n "$SC_ISSUES" ]; then
            err "Shortcode foto: problemi documentazione:"
            printf "%b" "$SC_ISSUES" >> "$REPORT"
          else
            ok "Shortcode \`foto\` presente e documentato."
          fi

          # ----------------------------------------------------------------
          section "31. Script export-contesto-ai presente ed eseguibile"
          EXPORT_SCRIPT="scripts/export-contesto-ai.sh"
          if [ ! -f "$EXPORT_SCRIPT" ]; then
            err "Script \`$EXPORT_SCRIPT\` mancante."
          elif [ ! -x "$EXPORT_SCRIPT" ]; then
            err "Script \`$EXPORT_SCRIPT\` non eseguibile (manca chmod +x)."
          else
            ok "Script export-contesto-ai presente e eseguibile."
          fi

          # ----------------------------------------------------------------
          section "32. dataUltimaRevisione formato corretto sulle pagine legali"
          # NB: sezione 14 controlla anche la "vecchiezza"; qui solo il formato.
          REV_BAD=""
          for f in content/privacy/_index.md content/note-legali/_index.md content/accessibilita/_index.md content/social-media-policy/_index.md; do
            [ -f "$f" ] || { REV_BAD="${REV_BAD}- Pagina mancante: \`$f\`\n"; continue; }
            fm=$(awk '/^---$/{c++; next} c==1' "$f")
            echo "$fm" | grep -qE '^dataUltimaRevisione:[[:space:]]*"[0-9]{4}-[0-9]{2}-[0-9]{2}"' \
              || REV_BAD="${REV_BAD}- \`$f\`: \`dataUltimaRevisione\` mancante o non in formato \"AAAA-MM-GG\"\n"
          done
          if [ -n "$REV_BAD" ]; then
            err "Problemi sul campo dataUltimaRevisione:"
            printf "%b" "$REV_BAD" >> "$REPORT"
          else
            ok "Tutte le 4 pagine legali hanno \`dataUltimaRevisione\` ben formato."
          fi

          # ============================================================
          # Sezioni 33-37 — Audit aggiuntivo automatizzato
          # (aggiunte il 26 aprile 2026 dopo verifica manuale che ha
          # rilevato mixed content, traduzioni incoerenti, image_alt
          # mancanti, divergenze hugo.toml ↔ data files)
          # ============================================================

          # ----------------------------------------------------------------
          section "33. Mixed content: link http:// esterni nelle pagine HTTPS"
          # Il sito gira su HTTPS (Aruba + GitHub Pages). I link http://
          # generano warning di "mixed content" sui browser moderni e
          # alcune risorse vengono bloccate. Eccezioni note (siti senza
          # HTTPS lato fornitore): parcocastelliromani.it, idrografico.roma.it,
          # zonesismiche.mi.ingv.it. Tutti gli altri http:// vanno aggiornati.
          MIXED=$(grep -rn 'http://[a-zA-Z]' "$CONTENT_GLOB"/ 2>/dev/null \
            | grep -vE 'parcocastelliromani\.it|idrografico\.roma\.it|zonesismiche\.mi\.ingv\.it|protezionecivile-imbersago|schema\.org|w3\.org|<!--' \
            | head -10 || true)
          if [ -n "$MIXED" ]; then
            err "Link \`http://\` su siti che potrebbero supportare HTTPS (verifica con curl HEAD e aggiorna):"
            echo '```' >> "$REPORT"
            echo "$MIXED" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            ok "Nessun link http:// problematico (escluse 3 eccezioni note)."
          fi

          # ----------------------------------------------------------------
          section "34. Image alt text degli articoli (accessibility WCAG 1.1.1)"
          # Ogni articolo dovrebbe avere image_alt non vuoto nel frontmatter.
          # Hugo lo usa come alt= della copertina e dei thumbnail card.
          MISSING_ALT=""
          for art in "$CONTENT_GLOB"/comunicazioni/*.md; do
            [ -f "$art" ] || continue
            fm=$(awk '/^---$/{c++; next} c==1' "$art")
            # Skip articoli senza image: (non hanno copertina nel frontmatter)
            echo "$fm" | grep -qE '^image:[[:space:]]*"' || continue
            # Verifica image_alt presente e non vuoto
            ALT=$(echo "$fm" | grep -E '^image_alt:' | sed -E 's/^image_alt:[[:space:]]*"?([^"]*)"?.*/\1/' | head -1)
            if [ -z "$ALT" ]; then
              MISSING_ALT="${MISSING_ALT}- \`$art\`\n"
            fi
          done
          if [ -n "$MISSING_ALT" ]; then
            warn "Articoli con \`image:\` ma senza \`image_alt\` significativo (screen reader leggono il filename):"
            printf "%b" "$MISSING_ALT" | head -20 >> "$REPORT"
          else
            ok "Tutti gli articoli con copertina hanno \`image_alt\` valorizzato."
          fi

          # ----------------------------------------------------------------
          section "35. Coerenza dati istituzionali nelle 7 traduzioni"
          # Le pagine in content/{english,deutsch,...}/_index.md e
          # /numeri-utili/_index.md devono contenere i dati istituzionali
          # essenziali: sede (Via Sicilia 13-15), CAP 00045, riferimento al 112.
          # È un check minimale: se manca uno di questi 3, è probabile
          # che la traduzione sia stata aggiornata in italiano ma non
          # propagata nelle altre lingue.
          LANG_INCOH=""
          for lang in english deutsch espanol francais portugues romana esperanto; do
            f="content/$lang/numeri-utili/_index.md"
            [ -f "$f" ] || { LANG_INCOH="${LANG_INCOH}- \`$f\`: pagina mancante\n"; continue; }
            grep -q "Sicilia" "$f" || LANG_INCOH="${LANG_INCOH}- \`$f\`: indirizzo \"Via Sicilia\" mancante\n"
            grep -q "00045" "$f" || LANG_INCOH="${LANG_INCOH}- \`$f\`: CAP 00045 mancante\n"
            grep -q "112" "$f" || LANG_INCOH="${LANG_INCOH}- \`$f\`: numero NUE 112 mancante\n"
          done
          if [ -n "$LANG_INCOH" ]; then
            err "Traduzioni con dati istituzionali mancanti:"
            printf "%b" "$LANG_INCOH" >> "$REPORT"
          else
            ok "Le 7 traduzioni contengono tutte sede, CAP e NUE 112."
          fi

          # ----------------------------------------------------------------
          section "36. Coerenza telefono hugo.toml ↔ data/numeri_utili.yaml"
          # hugo.toml ha `telefono` come fonte di verità del numero di sede.
          # data/numeri_utili.yaml ha il record "locale" che dovrebbe
          # contenere lo stesso numero (alimenta la card Numeri Utili).
          # NB: l'email NON è nel yaml dei numeri (yaml è solo numeri di
          # telefono), quindi qui controlliamo solo il telefono.
          # Uso grep -F per evitare che il "+" di "+39..." venga
          # interpretato come metachar regex.
          DIVERG=""
          if [ -f data/numeri_utili.yaml ] && [ -f hugo.toml ]; then
            HUGO_TEL=$(grep -oP 'telefono\s*=\s*"\K[^"]+' hugo.toml | head -1 | tr -d ' ')
            YAML_TELS=$(grep -oP 'numero:\s*"?\K[+0-9 ]+' data/numeri_utili.yaml | tr -d ' ' || true)
            if [ -n "$HUGO_TEL" ] && ! echo "$YAML_TELS" | grep -qF "$HUGO_TEL"; then
              DIVERG="${DIVERG}- Telefono di sede in hugo.toml (\`$HUGO_TEL\`) non presente in data/numeri_utili.yaml\n"
            fi
          else
            DIVERG="${DIVERG}- File hugo.toml o data/numeri_utili.yaml mancante\n"
          fi
          if [ -n "$DIVERG" ]; then
            err "Divergenze fra hugo.toml e data/numeri_utili.yaml:"
            printf "%b" "$DIVERG" >> "$REPORT"
          else
            ok "Telefono di sede coincide fra hugo.toml e data/numeri_utili.yaml."
          fi

          # ----------------------------------------------------------------
          section "37. Smoke test rendering: pagine critiche hanno H1"
          # Dopo build Hugo, verifica che le pagine critiche abbiano
          # contenuto reale (almeno un <h1>). Se una pagina ha rendering
          # rotto o frontmatter sbagliato, può venire generata vuota:
          # Hugo non sempre lo segnala come errore.
          MISSING_H1=""
          if [ -d public ]; then
            CRITICAL_PAGES="public/index.html public/cosa-fare-adesso/index.html \
                            public/numeri-utili/index.html public/contatti/index.html \
                            public/cartografia/index.html public/assistente/index.html \
                            public/comunicazioni/index.html public/formazione/index.html \
                            public/rischi-prevenzione/index.html public/diventa-volontario/index.html \
                            public/area-download/index.html public/faq/index.html"
            for p in $CRITICAL_PAGES; do
              if [ ! -f "$p" ]; then
                MISSING_H1="${MISSING_H1}- \`$p\`: file non generato\n"
              elif ! grep -q '<h1' "$p"; then
                MISSING_H1="${MISSING_H1}- \`$p\`: nessun \`<h1>\` nel rendering\n"
              fi
            done
          else
            MISSING_H1="${MISSING_H1}- cartella \`public/\` non presente (skip rendering test)\n"
          fi
          if [ -n "$MISSING_H1" ]; then
            err "Pagine critiche con problemi di rendering:"
            printf "%b" "$MISSING_H1" >> "$REPORT"
          else
            ok "Tutte le 12 pagine critiche hanno H1 nel rendering."
          fi

          # ----------------------------------------------------------------
          section "38. Link critici (normativa, PDF locali, Normattiva)"
          # Sentinella veloce con messaggi specifici sui link che, se
          # cadono, vanno individuati subito perché compaiono in più
          # pagine: portali ufficiali, PDF nostri locali, Normattiva.
          # Lychee (check-links-sito.yml lun 10:00) farà comunque il
          # crawl completo ma ha output generico; questa sezione apre
          # subito l'issue settimanale con il nome del documento rotto.
          # Storia merge: il 26 aprile 2026 il workflow
          # check-normativa-links.yml (lun 08:00) è stato fuso qui.
          CRITICAL_LINKS_FAILED=""
          check_critical() {
            local url="$1"
            local label="$2"
            local code
            code=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 \
                   --user-agent "Mozilla/5.0 (compatible; PCGenzanoAuditBot/1.0)" "$url" 2>/dev/null)
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              CRITICAL_LINKS_FAILED="${CRITICAL_LINKS_FAILED}- **$label** ($code): \`$url\`\n"
            fi
          }

          # Portali normativi (citati in /area-download/, articoli normativa)
          check_critical "https://protezionecivile.regione.lazio.it/agenzia/normative/regolamenti-regionali-dgr" \
            "Normativa regionale Lazio (Agenzia PC Lazio)"
          check_critical "https://www.protezionecivile.gov.it/it/dipartimento/amministrazione-trasparente/provvedimenti-normativi/" \
            "Normativa nazionale (Dipartimento PC)"

          # PDF locali sul server Aruba (gestiti manualmente in /documenti/, esclusi dal deploy FTP)
          check_critical "https://www.protezionecivilegenzano.it/documenti/normativa/Piano_Emergenza_Comunale_PC_Genzano.pdf" \
            "Piano di Emergenza Comunale"
          check_critical "https://www.protezionecivilegenzano.it/documenti/normativa/Ordinanza_Sindacale_AIB_2025.pdf" \
            "Ordinanza Sindacale AIB 2025"
          check_critical "https://www.protezionecivilegenzano.it/documenti/normativa/Piano_AIB_Lazio.pdf" \
            "Piano AIB Lazio"
          check_critical "https://www.protezionecivilegenzano.it/documenti/normativa/Piano_Triennale_PC_Lazio.pdf" \
            "Piano Triennale PC Lazio"

          # Normattiva (citata in /normativa/ e in vari articoli)
          check_critical "https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2018;1~art25!vig=" \
            "D.Lgs. 1/2018 — Codice della Protezione Civile"
          check_critical "https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:legge:2000;353" \
            "L. 353/2000 — Legge-quadro incendi boschivi"

          if [ -n "$CRITICAL_LINKS_FAILED" ]; then
            err "Link normativi/PDF critici non raggiungibili — verificare urgentemente:"
            printf "%b" "$CRITICAL_LINKS_FAILED" >> "$REPORT"
          else
            ok "Tutti gli 8 link critici (normativa Lazio, DPC, PDF locali, Normattiva) raggiungibili."
          fi

          section "39. Cartella riferimenti-interni/ NON deve essere linkata dal sito pubblico"
          # La cartella `riferimenti-interni/` contiene documentazione di lavoro
          # (norme copyrighted, draft) che NON deve mai finire sul sito pubblico.
          # Hugo non la legge perché non rientra nelle cartelle native, ma se
          # qualcuno per errore la linka da content/, static/ o themes/ il file
          # NON viene servito (Hugo non lo conosce) e il link sarebbe rotto. Qui
          # cerchiamo riferimenti testuali "riferimenti-interni/" nel contenuto
          # destinato al sito pubblico, escludendo MANUALE-SITO/manuale/, CLAUDE.md e
          # le regole .claude/rules/ che possono citarla legittimamente.
          INTERNAL_LEAKS=$(grep -rln 'riferimenti-interni' content/ static/ themes/ 2>/dev/null | grep -v 'static/manuali/' | head -5)
          if [ -n "$INTERNAL_LEAKS" ]; then
            err "Riferimento alla cartella interna riferimenti-interni/ trovato in contenuto pubblico:"
            for f in $INTERNAL_LEAKS; do
              echo "- \`$f\`" >> "$REPORT"
            done
            echo "I documenti copyrighted in riferimenti-interni/ non devono essere esposti pubblicamente. Sposta i link verso static/manuali/ o rimuovili." >> "$REPORT"
          else
            ok "Cartella riferimenti-interni/ correttamente isolata dal contenuto pubblico."
          fi

          # ----------------------------------------------------------------
          section "40. Audit grammaticale italiano (refusi, accenti, apostrofi)"
          # Esegue scripts/audit-grammatica-italiana.py che cerca nei contenuti:
          # - apostrofi finti usati al posto degli accenti (è invece di è, né
          #   invece di né, sarà invece di sarà)
          # - accenti mancanti su congiunzioni e sostantivi tronchi NON ambigui
          #   (perche, poiche, piu, puo, gia, cosi, citta, universita, lunedi…)
          # - "qual'è", "un'altro", "una emergenza" e altri errori italiani
          #   tipici
          # - "po" senza apostrofo
          # - doppi spazi, spazi prima della punteggiatura
          # - uso di "...", trattini brevi, ecc. (info)
          # Lo script è conservativo: NON segnala parole ambigue (sostantivo
          # legittimo + verbo al passato remoto, es. "arrivo/arrivò").
          GRAMM_OUT=$(python3 scripts/audit-grammatica-italiana.py 2>&1)
          GRAMM_ERR=$(echo "$GRAMM_OUT" | grep -oE '[0-9]+ errori' | head -1 | grep -oE '[0-9]+' || echo "0")
          GRAMM_WARN=$(echo "$GRAMM_OUT" | grep -oE '[0-9]+ warning' | head -1 | grep -oE '[0-9]+' || echo "0")
          if [ "$GRAMM_ERR" -gt 0 ] || [ "$GRAMM_WARN" -gt 0 ]; then
            warn "Audit grammaticale: $GRAMM_ERR errori, $GRAMM_WARN warning. Dettaglio in fondo al report."
            echo "" >> "$REPORT"
            echo "<details><summary>📖 Dettaglio audit grammaticale (clicca per espandere)</summary>" >> "$REPORT"
            echo "" >> "$REPORT"
            # Saltiamo l'header dello script (#) e prendiamo dal totale in poi
            echo "$GRAMM_OUT" | tail -n +3 >> "$REPORT"
            echo "" >> "$REPORT"
            echo "</details>" >> "$REPORT"
          else
            ok "Nessun errore grammaticale italiano rilevato dallo script."
          fi

          # ----------------------------------------------------------------
          section "41. Coerenza menu Hugo ↔ static/app-shared/site-chrome.js"
          # Le pagine statiche fuori da Hugo (giochi, abili-a-proteggere, schede
          # stampabili, quizpc, formazionepc, ecc.) prendono header e footer da
          # site-chrome.js, che ha il menu HARDCODED in JavaScript. Va tenuto
          # allineato a hugo.toml [[menus.main]]. Drift = navigazione divergente
          # tra home (menu nuovo) e mini-app (menu vecchio).
          MENU_DRIFT=""
          if [ -f static/app-shared/site-chrome.js ] && [ -f hugo.toml ]; then
            # Estrai i nomi delle voci di primo livello dal menu Hugo
            # (gli identifier dei dropdown attuali sono 5: per-il-cittadino,
            # per-le-scuole, accessibilita-supporti, volontariato, risorse —
            # split di educazione-inclusione in per-le-scuole + accessibilita-supporti, maggio 2026)
            HUGO_PARENTS=$(grep -E '^  identifier = "(per-il-cittadino|per-le-scuole|accessibilita-supporti|volontariato|risorse)"' hugo.toml | grep -oE '"[a-z-]+"' | tr -d '"' | sort -u)
            for parent_id in $HUGO_PARENTS; do
              if ! grep -q "navDropdown-$parent_id" static/app-shared/site-chrome.js; then
                MENU_DRIFT="${MENU_DRIFT}- Dropdown \`$parent_id\` mancante in \`site-chrome.js\` (presente in \`hugo.toml\`)\n"
              fi
            done
            # Verifica voci dirette: Home, Comunicazioni, Contatti
            for direct in 'Home' 'Comunicazioni' 'Contatti'; do
              if ! grep -q "<span>$direct</span>" static/app-shared/site-chrome.js; then
                MENU_DRIFT="${MENU_DRIFT}- Voce diretta \`$direct\` mancante in \`site-chrome.js\`\n"
              fi
            done
            # Verifica che NON ci siano voci obsolete (residui)
            if grep -q "navDropdown-formazione" static/app-shared/site-chrome.js; then
              MENU_DRIFT="${MENU_DRIFT}- Residuo obsoleto \`navDropdown-formazione\` in \`site-chrome.js\` (sostituito dal nuovo schema 5-dropdown)\n"
            fi
            if grep -q "navDropdown-educazione-inclusione" static/app-shared/site-chrome.js; then
              MENU_DRIFT="${MENU_DRIFT}- Residuo obsoleto \`navDropdown-educazione-inclusione\` in \`site-chrome.js\` (split in per-le-scuole + accessibilita-supporti, maggio 2026)\n"
            fi
            if [ -n "$MENU_DRIFT" ]; then
              err "Menu Hugo ↔ site-chrome.js NON allineati. Aggiornare \`static/app-shared/site-chrome.js\` per riflettere \`hugo.toml [[menus.main]]\` (vedi memoria \`feedback_sincronizza_site_chrome.md\`):"
              printf "%b" "$MENU_DRIFT" >> "$REPORT"
            else
              ok "Menu Hugo ↔ site-chrome.js allineati (5 dropdown + 3 voci dirette)."
            fi
          else
            warn "File \`hugo.toml\` o \`static/app-shared/site-chrome.js\` non trovati: check saltato."
          fi

          # ----------------------------------------------------------------
          # 42. (RIMOSSO maggio 2026) — La sezione verificava che i conteggi
          # dichiarati sul sito ("127 schede", "33 giochi", ecc.) corrispondessero
          # al numero reale di cartelle. Decisione editoriale di maggio 2026:
          # tutti i conteggi inventario sono stati rimossi dal sito e sostituiti
          # con descrizioni qualitative. Non c'è più drift da inseguire perché
          # non ci sono più numeri da allineare.

          # ----------------------------------------------------------------
          # Output
          # Garantisce default "false" se la variabile non è stata mai
          # toccata (improbabile con set +u ma difensivo per sicurezza).
          : "${FOUND:=false}"
          echo "found_issues=$FOUND" >> "$GITHUB_OUTPUT"
          {
            echo "report<<EOF"
            cat "$REPORT" 2>/dev/null || echo "(report vuoto)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "=== AUDIT REPORT ==="
          cat "$REPORT"

      - name: "🚨 Apri issue se l'audit rileva problemi"
        # always() perché lo step audit prima faceva exit 1 quando FOUND=true.
        # Adesso lo step audit termina sempre 0, ma always() resta come
        # safety-net se qualcuno re-introduce un exit 1.
        if: ${{ always() && steps.audit.outputs.found_issues == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            // Legge il report direttamente dal file. Storia: prima si usava
            // l'output dello step audit interpolato come template literal JS
            // ma rompeva il parsing perche' il report contiene backtick e
            // numeri Markdown (SyntaxError: Unexpected number / Invalid token).
            // ATTENZIONE: niente sintassi GH Actions in questo commento,
            // GH la espande anche dentro commenti JS, contaminando il codice.
            const fs = require('fs');
            let report = '(report non disponibile)';
            try {
              report = fs.readFileSync('/tmp/audit-report.md', 'utf-8');
            } catch (e) {
              report = '(errore lettura report: ' + e.message + ')';
            }

            const today = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const body = [
              report,
              '',
              '---',
              '',
              '### Come agire',
              '',
              '- ❌ = errore da correggere prima del prossimo deploy',
              '- ⚠️ = warning: valuta se è un falso positivo o se vale la pena sistemare',
              '',
              'Dopo aver corretto, chiudi la issue citando il commit di fix.',
              '',
              '*Issue generata automaticamente dal workflow `audit-sito.yml` (lun 09:00 UTC).*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Automatico] Audit sito — ${today}`,
              body: body,
              labels: ['audit', 'qualità-testi', 'manutenzione']
            });
