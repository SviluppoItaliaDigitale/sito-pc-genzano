name: "📻 Audit nominativi radio"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "45 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-nominativi-radio:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔎 Verifica uso corretto dello zero nei nominativi"
        id: audit
        shell: bash
        run: |
          set -u
          REPORT="/tmp/audit-nominativi-radio.md"
          : > "$REPORT"
          FOUND="false"

          echo "# Audit nominativi radio — $(date -u +%Y-%m-%d)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "Controllo automatico per evitare che nei nominativi radioamatoriali venga usata la lettera **Ø** al posto dello zero numerico **0**." >> "$REPORT"
          echo "" >> "$REPORT"
          echo "Regola: il dato testuale deve restare con lo zero numerico, ad esempio **IU0QVW**. L'eventuale zero barrato va ottenuto solo tramite stile CSS." >> "$REPORT"
          echo "" >> "$REPORT"

          SCOPE="content themes/flavour-pcgenzano/layouts data hugo.toml static assets"

          BAD=$(grep -rInE '\b(I|IK|IU|IZ|IW|IQ|IR|II|IO)[A-Z]?Ø[A-Z0-9]{2,5}\b|\b[A-Z]{1,3}Ø[A-Z0-9]{2,5}\b' $SCOPE 2>/dev/null | grep -vE '.github|audit-nominativi-radio' || true)
          if [ -n "$BAD" ]; then
            FOUND="true"
            echo "## ❌ Possibili nominativi con Ø al posto di 0" >> "$REPORT"
            echo "" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$BAD" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"
            echo "Correggere sostituendo Ø con 0 e, se serve, applicare stile grafico tipo font-variant-numeric: slashed-zero." >> "$REPORT"
          fi

          if [ "$FOUND" = "false" ]; then
            echo "- ✅ Nessun nominativo radio con Ø al posto dello zero numerico trovato nei contenuti pubblici." >> "$REPORT"
          fi

          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: "📌 Apri issue se il controllo trova errori"
        if: steps.audit.outputs.found == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/audit-nominativi-radio.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Audit nominativi radio: uso improprio di Ø trovato (${new Date().toISOString().slice(0,10)})`,
              body,
              labels: ['audit', 'contenuti', 'radio']
            });

      - name: "❌ Fallisci il controllo se ci sono errori"
        if: steps.audit.outputs.found == 'true'
        run: exit 1
