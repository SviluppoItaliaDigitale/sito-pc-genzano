name: "Aggiungi kit consigliato ai rischi one-shot"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/add-kit-rischi-one-shot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-kit-rischi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inserisci box kit consigliato nelle pagine rischio
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          import unicodedata

          targets = {
              'terremoto': '''## Kit consigliato per questo rischio\n\nPer il rischio sismico tieni pronto un kit leggero e raggiungibile, utile sia se devi uscire rapidamente sia se devi restare in casa senza servizi.\n\n- acqua in litri sufficienti per la famiglia;\n- torcia con pile o ricarica funzionante;\n- radio a pile o a manovella;\n- power bank carico;\n- fischietto per segnalare la presenza;\n- scarpe chiuse, guanti da lavoro e piccola coperta termica;\n- copie dei documenti, farmaci abituali e numeri utili.\n\nApprofondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n''',
              'alluvione': '''## Kit consigliato per questo rischio\n\nPer piogge intense, allagamenti o possibili evacuazioni prepara un kit che resti asciutto e facile da prendere.\n\n- acqua e alimenti non deperibili;\n- torcia impermeabile o ben protetta;\n- radio a pile o a manovella;\n- power bank carico;\n- documenti e farmaci in busta impermeabile;\n- cambio asciutto, impermeabile leggero e calze di ricambio;\n- numeri utili stampati e contatti familiari.\n\nNon attraversare sottopassi, strade allagate o corsi d'acqua in piena. Approfondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n''',
              'incendio': '''## Kit consigliato per questo rischio\n\nPer incendi, fumo o evacuazioni rapide è importante avere poche cose essenziali già pronte e non perdere tempo a cercarle.\n\n- documenti, farmaci e chiavi in un punto noto;\n- telefono, caricabatterie e power bank;\n- torcia;\n- acqua;\n- mascherina antipolvere o protezione semplice per il fumo leggero, se disponibile;\n- elenco dei contatti utili;\n- guinzaglio, trasportino o materiale essenziale per animali domestici.\n\nIn presenza di fumo, fiamme o pericolo immediato allontanati e chiama il 112. Approfondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n''',
              'temporale': '''## Kit consigliato per questo rischio\n\nPer temporali forti, fulmini, grandine e vento prepara un piccolo kit domestico per blackout o interruzioni temporanee dei servizi.\n\n- torcia con pile cariche;\n- radio a pile o a manovella;\n- power bank carico;\n- acqua e alimenti semplici;\n- farmaci abituali;\n- numeri utili stampati;\n- coperta leggera o indumenti adatti alla stagione.\n\nDurante i temporali evita alberi isolati, strutture metalliche, corsi d'acqua e spostamenti non necessari. Approfondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n''',
              'vento': '''## Kit consigliato per questo rischio\n\nPer vento forte e possibili cadute di rami, tegole o oggetti è utile avere un kit essenziale per restare in casa in sicurezza o uscire solo se necessario.\n\n- torcia;\n- radio a pile o a manovella;\n- power bank carico;\n- acqua e alimenti semplici;\n- farmaci abituali;\n- scarpe chiuse e guanti da lavoro;\n- numeri utili stampati.\n\nPrima del maltempo rimuovi o fissa oggetti su balconi, davanzali e giardini. Approfondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n''',
              'blackout': '''## Kit consigliato per questo rischio\n\nPer un blackout prepara materiali che funzionano anche senza corrente elettrica.\n\n- torce, non candele, per ridurre il rischio incendio;\n- pile di ricambio o torce ricaricabili;\n- radio a pile o a manovella;\n- power bank carico;\n- acqua e alimenti pronti;\n- farmaci abituali e piano per dispositivi elettromedicali;\n- elenco dei numeri utili su carta.\n\nSe in famiglia ci sono dispositivi medici elettrici, prepara un piano specifico con il medico o il fornitore del dispositivo. Approfondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n''',
              'caldo': '''## Kit consigliato per questo rischio\n\nPer caldo intenso e ondate di calore prepara un kit semplice, utile soprattutto per anziani, bambini, persone fragili e animali domestici.\n\n- acqua in litri adeguati alla famiglia;\n- sali o bevande reidratanti solo se consigliati dal medico;\n- farmaci abituali conservati correttamente;\n- lista di contatti familiari, medico e vicini di fiducia;\n- cappello, abiti leggeri e protezione solare;\n- acqua e ciotola per animali;\n- power bank per restare raggiungibili.\n\nEvita le ore più calde, controlla le persone fragili e non lasciare mai bambini o animali in auto. Approfondisci nella pagina [Kit di emergenza: casa, evacuazione e auto](/rischi-prevenzione/kit-emergenza/).\n'''
          }

          def norm(s: str) -> str:
              s = unicodedata.normalize('NFKD', s).encode('ascii', 'ignore').decode('ascii')
              return s.lower()

          def match_kind(path: Path, text: str):
              blob = norm(str(path) + '\n' + text[:2500])
              if any(x in blob for x in ['terremoto', 'sisma', 'sismico']): return 'terremoto'
              if any(x in blob for x in ['alluvione', 'allagamento', 'idrogeologico', 'idraulico']): return 'alluvione'
              if any(x in blob for x in ['incendio', 'incendi', 'boschivo', 'fumo']): return 'incendio'
              if any(x in blob for x in ['temporale', 'temporali', 'fulmini', 'grandine']): return 'temporale'
              if any(x in blob for x in ['vento forte', 'vento', 'raffiche']): return 'vento'
              if any(x in blob for x in ['blackout', 'mancanza corrente', 'interruzione elettrica']): return 'blackout'
              if any(x in blob for x in ['caldo', 'ondata di calore', 'calore']): return 'caldo'
              return None

          changed = []
          for path in Path('content').rglob('*.md'):
              # Evita le schede stampabili e i kit stessi: qui vogliamo pagine rischio/informazione.
              sp = str(path)
              if 'kit-emergenza' in sp or 'kit-calamita' in sp or 'kit-fragilita' in sp:
                  continue
              text = path.read_text(encoding='utf-8')
              if 'Kit consigliato per questo rischio' in text:
                  continue
              kind = match_kind(path, text)
              if not kind:
                  continue
              block = targets[kind]
              marker_candidates = ['## Collegamenti utili\n', '## Link utili\n', '## Fonti\n', '## Approfondimenti\n']
              inserted = False
              for marker in marker_candidates:
                  if marker in text:
                      text = text.replace(marker, block + '\n' + marker, 1)
                      inserted = True
                      break
              if not inserted:
                  text = text.rstrip() + '\n\n' + block + '\n'
              path.write_text(text, encoding='utf-8')
              changed.append(f'{kind}: {sp}')

          Path('tmp-kit-rischi-report.txt').write_text('\n'.join(changed) + '\n', encoding='utf-8')
          print('Modifiche applicate:')
          print('\n'.join(changed) if changed else 'Nessun file candidato trovato')
          PY

          rm -f .github/workflows/add-kit-rischi-one-shot.yml

      - name: Commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Aggiunge kit consigliato nelle pagine rischio"
            git push
          fi
