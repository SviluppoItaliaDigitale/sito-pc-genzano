name: "🛠️ Ripristina solo disegni kit one-shot"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ripristina-disegni-kit-one-shot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ripristina-disegni:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Ripristina solo i disegni originali JPG nelle schede"
        shell: bash
        run: |
          set -euo pipefail

          # Garantisce che i disegni JPG reali siano presenti nella versione buona.
          git checkout 51c610045d85f123c82339bfd4ceea738e781749 -- \
            static/formazione/kit-calamita-bambini/img/camion-pc.jpg \
            static/formazione/kit-calamita-bambini/img/tende-campo-pc.jpg \
            static/formazione/kit-calamita-bambini/img/elicottero-pc.jpg \
            static/formazione/kit-calamita-bambini/img/cane-da-soccorso.jpg

          # Cambia SOLO il file immagine richiamato: da SVG a JPG.
          # I testi, le pagine, menu, landing e contenuti restano invariati.
          python3 - <<'PY'
          from pathlib import Path
          replacements = {
              Path('static/formazione/kit-calamita-bambini/02-colora-camion-pc.html'): ('img/camion-pc.svg', 'img/camion-pc.jpg'),
              Path('static/formazione/kit-calamita-bambini/03-colora-tenda.html'): ('img/tende-campo-pc.svg', 'img/tende-campo-pc.jpg'),
              Path('static/formazione/kit-calamita-bambini/04-colora-elicottero.html'): ('img/elicottero-pc.svg', 'img/elicottero-pc.jpg'),
              Path('static/formazione/kit-calamita-bambini/05-color-by-number-cane-soccorso.html'): ('img/cane-da-soccorso.svg', 'img/cane-da-soccorso.jpg'),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding='utf-8')
              if old in text:
                  path.write_text(text.replace(old, new), encoding='utf-8')
                  print(f'ripristinato disegno: {path} -> {new}')
              elif new in text:
                  print(f'già corretto: {path} -> {new}')
              else:
                  raise SystemExit(f'Immagine non trovata in {path}: atteso {old} o {new}')
          PY

          rm -f .github/workflows/ripristina-disegni-kit-one-shot.yml

      - name: "📝 Commit correzione"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Ripristina solo i disegni JPG del kit bambini"
            git push
          fi
