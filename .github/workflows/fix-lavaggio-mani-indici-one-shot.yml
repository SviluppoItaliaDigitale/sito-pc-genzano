name: "Fix lavaggio mani indici one-shot"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-lavaggio-mani-indici-one-shot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-lavaggio-mani-indici:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Correggi testi residui 5 passi
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          replacements = {
              'Lavarsi le mani in 5 passi': 'Lavaggio completo delle mani',
              'lavarsi le mani in 5 passi': 'lavaggio completo delle mani',
              'Per ricordare una routine semplice di igiene: bagna, sapone, strofina, risciacqua, asciuga.': 'Per imparare una procedura completa di igiene delle mani, seguendo tutti i passaggi illustrati nella scheda.',
              'Per ricordare una routine semplice di igiene: bagna, sapone, strofina, risciacqua, asciuga': 'Per imparare una procedura completa di igiene delle mani, seguendo tutti i passaggi illustrati nella scheda',
              'routine semplice di igiene': 'procedura completa di igiene delle mani',
          }
          changed=[]
          for root in ['content','static']:
              for path in Path(root).rglob('*'):
                  if path.suffix.lower() not in {'.md','.html'}:
                      continue
                  text = path.read_text(encoding='utf-8')
                  fixed = text
                  for old,new in replacements.items():
                      fixed = fixed.replace(old,new)
                  if fixed != text:
                      path.write_text(fixed,encoding='utf-8')
                      changed.append(str(path))
          print('\n'.join(changed) if changed else 'Nessun testo residuo trovato')
          PY
          rm -f .github/workflows/fix-lavaggio-mani-indici-one-shot.yml
      - name: Commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Rimuove riferimenti 5 passi dal lavaggio mani"
            git push
          fi
