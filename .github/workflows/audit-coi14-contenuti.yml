name: "🛡️ Audit COI 14 contenuti pubblici"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-coi14:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔎 Verifica COI 14 su contenuti pubblici"
        id: audit
        shell: bash
        run: |
          set -u
          REPORT="/tmp/audit-coi14.md"
          : > "$REPORT"
          FOUND="false"

          echo "# Audit COI 14 — $(date -u +%Y-%m-%d)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "Controllo automatico contro il ritorno di riferimenti errati al COI 15 o ad altri numeri non coerenti con il dato corretto: **14° COI**." >> "$REPORT"
          echo "" >> "$REPORT"

          SCOPE="content themes/flavour-pcgenzano/layouts data hugo.toml"

          BAD_EXPLICIT=$(grep -rInE '(^|[^0-9])(COI|C\.O\.I\.)[[:space:]]*(15|15°|XV)\b|(^|[^0-9])15°[[:space:]]*(COI|C\.O\.I\.)\b' $SCOPE 2>/dev/null | grep -vE '.github|CLAUDE|governance|rules|audit-coi14|audit-sito' || true)
          if [ -n "$BAD_EXPLICIT" ]; then
            FOUND="true"
            echo "## ❌ Riferimenti errati a COI 15" >> "$REPORT"
            echo "" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$BAD_EXPLICIT" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"
          fi

          BAD_OTHER=$(grep -rInE '(^|[^0-9])([0-9]{1,2})°[[:space:]]*(COI|C\.O\.I\.)\b|(^|[^0-9])(COI|C\.O\.I\.)[[:space:]]*([0-9]{1,2})\b' $SCOPE 2>/dev/null \
            | grep -vE '14°[[:space:]]*(COI|C\.O\.I\.)|(COI|C\.O\.I\.)[[:space:]]*14\b|.github|CLAUDE|governance|rules|audit-coi14|audit-sito' || true)
          if [ -n "$BAD_OTHER" ]; then
            FOUND="true"
            echo "## ⚠️ Riferimenti a COI numerato diverso da 14" >> "$REPORT"
            echo "" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$BAD_OTHER" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"
          fi

          if [ "$FOUND" = "false" ]; then
            echo "- ✅ Nessun riferimento pubblico a COI 15 o ad altri numeri COI diversi da 14." >> "$REPORT"
          fi

          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          echo "found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: "📌 Apri issue se il controllo trova errori"
        if: steps.audit.outputs.found == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/audit-coi14.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Audit COI 14: riferimenti non coerenti trovati (${new Date().toISOString().slice(0,10)})`,
              body,
              labels: ['audit', 'contenuti', 'coi14']
            });

      - name: "❌ Fallisci il controllo se ci sono errori"
        if: steps.audit.outputs.found == 'true'
        run: exit 1
