name: "Aggiorna documentazione contenuti one-shot"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-documentazione-contenuti-one-shot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Aggiorna README, manuali e regole governance
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          from datetime import date

          today = date.today().isoformat()
          changed = []

          # 1) Correzione globale documentazione: COI corretto = 14°.
          replacements = {
              '15° C.O.I.': '14° C.O.I.',
              '15° COI': '14° COI',
              'COI 15': 'COI 14',
              'C.O.I. 15': 'C.O.I. 14',
              '15 C.O.I.': '14 C.O.I.',
              '15° Centro Operativo Intercomunale': '14° Centro Operativo Intercomunale',
          }
          doc_roots = [Path('.'), Path('manuale'), Path('.claude/rules')]
          seen = set()
          for root in doc_roots:
              if not root.exists():
                  continue
              for path in root.rglob('*.md'):
                  if path in seen:
                      continue
                  seen.add(path)
                  if any(part in {'.git', 'public', 'resources'} for part in path.parts):
                      continue
                  text = path.read_text(encoding='utf-8')
                  fixed = text
                  for old, new in replacements.items():
                      fixed = fixed.replace(old, new)
                  if fixed != text:
                      path.write_text(fixed, encoding='utf-8')
                      changed.append(f'corretto COI: {path}')

          # 2) Sezione riepilogo in README.md.
          readme = Path('README.md')
          if readme.exists():
              text = readme.read_text(encoding='utf-8')
              block = '''
---

## Aggiornamenti contenuti didattici e prevenzione — maggio 2026

Questa sezione riepiloga gli ultimi aggiornamenti strutturati ai contenuti pubblicati, da tenere presenti quando si lavora su sito, manuali, mappa del sito e automazioni.

### Nuove pagine pubblicate

- `content/rischi-prevenzione/scuole-genzano-rischi-locali.md` — pagina per scuole, famiglie e docenti. Non contiene dati inventati su singoli istituti: rimanda ai piani interni delle scuole, al Piano Comunale e alla cartografia operativa.
- `content/rischi-prevenzione/rischi-in-parole-semplici.md` — versione semplificata dei rischi principali per bambini, BES, disabilità cognitive e italiano L2.
- `content/rischi-prevenzione/kit-emergenza-economico-progressivo.md` — guida per costruire il kit per fasi, senza indicare marchi, negozi o prodotti commerciali.

### Schede didattiche aggiornate

- `static/formazione/kit-calamita-bambini/10-routine-lavarsi-mani.html` — rinominata concettualmente in “Lavaggio completo delle mani”, senza riferimenti ai “5 passi”, con impaginazione A4 reale.
- `static/formazione/kit-calamita-bambini/12-unisci-puntini-casco.html` — scheda dedicata “Unisci i puntini: casco di Protezione Civile”, con immagine fornita dall'utente integrata nella pagina.
- `static/formazione/kit-calamita-bambini/07-mandala-sole.html` — ripristinato il mandala del sole semplice per bambini 3-5 anni.

### Regole editoriali collegate

- Nei contenuti istituzionali non indicare marchi commerciali, negozi, prodotti sponsorizzati o modelli specifici, salvo obbligo tecnico-documentale motivato.
- Le pagine rivolte alle scuole non devono inventare dati su istituti, indirizzi, referenti, aree di raccolta interne o procedure operative: per questi elementi rimandare sempre al piano della singola scuola e alle fonti ufficiali.
- La mappa manuale del sito deve essere aggiornata quando si aggiungono nuove pagine informative importanti. Il `sitemap.xml` tecnico resta generato da Hugo.
'''
              marker = '## Aggiornamenti contenuti didattici e prevenzione — maggio 2026'
              if marker not in text:
                  insert_after = '---\n\n## Guida ai file di documentazione (`.md`)'
                  if insert_after in text:
                      text = text.replace(insert_after, block + '\n---\n\n## Guida ai file di documentazione (`.md`)', 1)
                  else:
                      text = text.rstrip() + '\n\n' + block + '\n'
                  readme.write_text(text, encoding='utf-8')
                  changed.append('aggiornato README.md con riepilogo contenuti')

          # 3) Manuale specifico: crea o aggiorna una parte dedicata alle modifiche contenutistiche.
          manuale_dir = Path('manuale')
          if manuale_dir.exists():
              doc = manuale_dir / 'parte-21-aggiornamenti-contenuti-didattici-prevenzione.md'
              content = '''# Parte 21 — Aggiornamenti contenuti didattici e prevenzione

Questa parte documenta le modifiche recenti ai contenuti didattici e di prevenzione del sito.

## Nuove pagine informative

### Scuole di Genzano e rischi locali

Percorso: `content/rischi-prevenzione/scuole-genzano-rischi-locali.md`

Scopo: offrire una pagina di raccordo tra scuola, famiglie, rischi locali, materiali didattici e piano di emergenza.

Regole di qualità:

- non inventare nomi di scuole, indirizzi, referenti o procedure interne;
- rimandare sempre al piano di emergenza del singolo istituto per punti di raccolta interni e procedure operative;
- usare solo indicazioni generali di autoprotezione, fonti ufficiali e pagine già presenti sul sito;
- mantenere linguaggio semplice, istituzionale e non allarmistico.

### Rischi principali in parole semplici

Percorso: `content/rischi-prevenzione/rischi-in-parole-semplici.md`

Scopo: offrire una versione semplificata per bambini, BES, persone con disabilità cognitive e persone con italiano L2.

Regole di qualità:

- frasi brevi;
- verbi concreti;
- niente burocratese;
- evitare dettagli tecnici non necessari;
- mantenere collegamenti alle pagine complete.

### Kit di emergenza economico e progressivo

Percorso: `content/rischi-prevenzione/kit-emergenza-economico-progressivo.md`

Scopo: spiegare come costruire il kit poco alla volta, senza suggerire acquisti inutili.

Regole di qualità:

- nessun marchio commerciale;
- nessun negozio;
- nessun prodotto sponsorizzato;
- nessun prezzo inventato;
- solo categorie generiche di materiali utili.

## Schede didattiche aggiornate

### Lavaggio completo delle mani

Percorso: `static/formazione/kit-calamita-bambini/10-routine-lavarsi-mani.html`

La scheda non deve più essere chiamata “5 passi”, perché mostra una procedura completa con più passaggi. Usare formulazioni come:

- “Lavaggio completo delle mani”;
- “Procedura completa WHO”;
- “sequenza completa per l'igiene delle mani”.

### Unisci i puntini: casco di Protezione Civile

Percorso: `static/formazione/kit-calamita-bambini/12-unisci-puntini-casco.html`

La scheda deve usare il disegno fornito dall'utente, non una ricostruzione autonoma. In caso di aggiornamento, sostituire l'immagine solo se l'utente fornisce un nuovo disegno pronto.

### Mandala del sole

Percorso: `static/formazione/kit-calamita-bambini/07-mandala-sole.html`

La scheda deve restare un mandala semplice, adatto a bambini 3-5 anni.

## Mappa del sito

Quando vengono aggiunte nuove pagine informative importanti, aggiornare anche la pagina manuale `content/mappa-sito/_index.md`.

Il `sitemap.xml` tecnico è generato automaticamente da Hugo e non va modificato a mano.

## Regola C.O.I.

Il riferimento corretto è **14° C.O.I.**. Non usare 15° C.O.I. nei testi pubblici, nella documentazione o nelle regole di governance.
'''
              old = doc.read_text(encoding='utf-8') if doc.exists() else ''
              if old != content:
                  doc.write_text(content, encoding='utf-8')
                  changed.append(f'aggiornato/creato {doc}')

              # Aggiorna indice manuale se esiste.
              for index_name in ['manuale/README.md', 'MANUALE-SITO.md']:
                  p = Path(index_name)
                  if p.exists():
                      text = p.read_text(encoding='utf-8')
                      line = '- [Parte 21 — Aggiornamenti contenuti didattici e prevenzione](manuale/parte-21-aggiornamenti-contenuti-didattici-prevenzione.md)'
                      line_manuale = '- [Parte 21 — Aggiornamenti contenuti didattici e prevenzione](parte-21-aggiornamenti-contenuti-didattici-prevenzione.md)'
                      if 'parte-21-aggiornamenti-contenuti-didattici-prevenzione.md' not in text:
                          add = line_manuale if index_name == 'manuale/README.md' else line
                          # Inserisce in fondo all'indice senza rischiare di rompere sezioni esistenti.
                          text = text.rstrip() + '\n\n' + add + '\n'
                          p.write_text(text, encoding='utf-8')
                          changed.append(f'aggiornato indice {p}')

          Path('tmp-documentazione-contenuti-report.txt').write_text('\n'.join(changed) + '\n', encoding='utf-8')
          print('\n'.join(changed) if changed else 'Nessuna modifica documentale necessaria')
          PY

          rm -f .github/workflows/update-documentazione-contenuti-one-shot.yml

      - name: Commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Aggiorna documentazione contenuti e regole editoriali"
            git push
          fi
