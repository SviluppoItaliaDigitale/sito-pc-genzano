name: "🛠️ Fix link kit animali one-shot"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-link-kit-animali-one-shot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-link-kit-animali:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Aggiorna link al kit animali unico"
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          old = '/formazione/kit-calamita-animali-domestici/'
          new = '/formazione/kit-calamita-animali/'
          for path in Path('content').rglob('*.md'):
              text = path.read_text(encoding='utf-8')
              fixed = text.replace(old, new)
              if fixed != text:
                  path.write_text(fixed, encoding='utf-8')
                  print(f'aggiornato: {path}')
          PY
          rm -f .github/workflows/fix-link-kit-animali-one-shot.yml

      - name: "📝 Commit correzione"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare."
          else
            git commit -m "Unifica link interni al kit animali"
            git push
          fi
