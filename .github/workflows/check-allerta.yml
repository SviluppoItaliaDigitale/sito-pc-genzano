name: "🌦️ Controlla Allerta Meteo"

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-allerta:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🌦️ Controlla allerta per Genzano di Roma"
        id: allerta
        run: |
          NOW=$(TZ="Europe/Rome" date "+%d/%m/%Y %H:%M")
          LIVELLO="verde"
          FONTE="nessuna fonte disponibile"

          # ══════════════════════════════════════
          # FONTE PRIMARIA: allertameteo.app
          # Specifica per Genzano di Roma
          # Dati ufficiali DPC gia filtrati per comune
          # ══════════════════════════════════════
          echo "📡 FONTE PRIMARIA: allertameteo.app (Genzano di Roma)..."
          
          # Prova API JSON
          API_RESP=$(curl -sL --max-time 20 "https://allertameteo.app/api/alert/genzano-di-roma" 2>/dev/null || echo "")
          
          if echo "$API_RESP" | grep -q "{" 2>/dev/null; then
            API_LVL=$(echo "$API_RESP" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              levels = {'verde':0,'gialla':1,'arancione':2,'rossa':3}
              mx = 'verde'
              def check(obj):
                  global mx
                  if isinstance(obj, dict):
                      for v in obj.values(): check(v)
                  elif isinstance(obj, str):
                      l = obj.lower().strip()
                      if l in levels and levels[l] > levels[mx]: mx = l
              check(data)
              print(mx)
          except: print('verde')" 2>/dev/null || echo "verde")
            LIVELLO="$API_LVL"
            FONTE="allertameteo.app API"
            echo "   API risultato: $LIVELLO"
          else
            echo "   API non disponibile, provo scraping pagina..."
            
            # Fallback: scraping pagina HTML
            PAGE=$(curl -sL --max-time 20 "https://allertameteo.app/lazio/roma/genzano-di-roma" 2>/dev/null || echo "")
            if [ -n "$PAGE" ]; then
              PAGE_LVL=$(echo "$PAGE" | python3 -c "
          import sys
          html = sys.stdin.read().lower()
          # Cerca solo nella prima sezione (oggi)
          # Il sito mostra: 'Nessuna Allerta' oppure 'Allerta Gialla/Arancione/Rossa'
          levels = {'rossa':3,'arancione':2,'gialla':1}
          result = 'verde'
          for color, val in levels.items():
              if f'allerta {color}' in html:
                  result = color
                  break
          # Verifica che non sia 'Nessuna Allerta'
          if 'nessuna allerta' in html and result == 'verde':
              result = 'verde'
          print(result)" 2>/dev/null || echo "verde")
              LIVELLO="$PAGE_LVL"
              FONTE="allertameteo.app pagina"
              echo "   Pagina risultato: $LIVELLO"
            else
              echo "   Pagina non raggiungibile"
            fi
          fi

          # ══════════════════════════════════════
          # FONTE BACKUP: CSV DPC per comune
          # Solo se allertameteo.app non disponibile
          # ══════════════════════════════════════
          if [ "$FONTE" = "nessuna fonte disponibile" ]; then
            echo "📡 FONTE BACKUP: CSV DPC per comune..."
            CSV=$(curl -sL --max-time 20 "https://raw.githubusercontent.com/opendatasicilia/DPC-bollettini-criticita-idrogeologica-idraulica/main/data/bollettino-latest-oggi-comuni.csv" 2>/dev/null || echo "")
            GENZANO=$(echo "$CSV" | grep -i "genzano" || echo "")
            if [ -n "$GENZANO" ]; then
              CSV_LVL=$(echo "$GENZANO" | python3 -c "
          import sys
          line = sys.stdin.read()
          levels = {'verde':0,'gialla':1,'arancione':2,'rossa':3}
          mx = 'verde'
          for f in line.split(','):
              f = f.strip().strip('\"').lower()
              if f in levels and levels[f] > levels[mx]: mx = f
          print(mx)" 2>/dev/null || echo "verde")
              LIVELLO="$CSV_LVL"
              FONTE="CSV DPC (backup)"
              echo "   CSV risultato: $LIVELLO"
            else
              echo "   Genzano non trovato nel CSV"
            fi
          fi

          # ══════════════════════════════════════
          # RISULTATO FINALE
          # ══════════════════════════════════════
          case $LIVELLO in
            verde) TITOLO="NESSUNA ALLERTA"; DESC="Non sono previsti fenomeni significativi sul nostro territorio." ;;
            gialla) TITOLO="ALLERTA GIALLA"; DESC="Criticita ordinaria. Possibili fenomeni localizzati. Prestare attenzione." ;;
            arancione) TITOLO="ALLERTA ARANCIONE"; DESC="Criticita moderata. Fenomeni diffusi e pericolosi. Limitare gli spostamenti." ;;
            rossa) TITOLO="ALLERTA ROSSA"; DESC="Criticita elevata. Fenomeni molto intensi. Seguire le indicazioni delle autorita." ;;
          esac

          echo ""
          echo "═══════════════════════════════════"
          echo "📊 RISULTATO: $TITOLO (fonte: $FONTE)"
          echo "═══════════════════════════════════"

          echo "livello=$LIVELLO" >> $GITHUB_OUTPUT
          echo "titolo=$TITOLO" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "now=$NOW" >> $GITHUB_OUTPUT
          echo "fonte=$FONTE" >> $GITHUB_OUTPUT

      - name: "📝 Aggiorna file dati allerta"
        run: |
          cat > data/allerta.json << JSONEOF
          {
            "livello": "${{ steps.allerta.outputs.livello }}",
            "titolo": "${{ steps.allerta.outputs.titolo }}",
            "descrizione": "${{ steps.allerta.outputs.desc }}",
            "zona": "F - Bacini Costieri Sud / D - Bacini di Roma",
            "aggiornamento": "Fonte: ${{ steps.allerta.outputs.fonte }}",
            "ultimo_check": "${{ steps.allerta.outputs.now }}"
          }
          JSONEOF

      - name: "📤 Commit e Push se cambiato"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/allerta.json
          if git diff --cached --quiet; then
            echo "✅ Nessuna modifica."
          else
            git commit -m "🌦️ Allerta: ${{ steps.allerta.outputs.titolo }} (${{ steps.allerta.outputs.now }})"
            git push
          fi

      - name: "📊 Riepilogo"
        if: always()
        run: |
          echo "## 🌦️ Controllo Allerta Meteo" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valore |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Livello | **${{ steps.allerta.outputs.titolo }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Fonte | ${{ steps.allerta.outputs.fonte }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Zona | Genzano di Roma (Bacini Costieri Sud) |" >> $GITHUB_STEP_SUMMARY
          echo "| Controllo | ${{ steps.allerta.outputs.now }} |" >> $GITHUB_STEP_SUMMARY
