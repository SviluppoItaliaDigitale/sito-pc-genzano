name: "🌦️ Controlla Allerta Meteo"

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-allerta:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🌦️ Controlla allerta per Genzano di Roma"
        id: allerta
        run: |
          NOW=$(TZ="Europe/Rome" date "+%d/%m/%Y %H:%M")
          LIVELLO="verde"
          TITOLO="NESSUNA ALLERTA"
          DESC="Non sono previsti fenomeni significativi sul nostro territorio."
          FONTE="controllo automatico"

          echo "📡 Fonte 1: CSV OpenDataSicilia (dati DPC per comune)..."

          # Scarica CSV bollettino OGGI per comuni
          CSV_OGGI=$(curl -sL --max-time 20 "https://raw.githubusercontent.com/opendatasicilia/DPC-bollettini-criticita-idrogeologica-idraulica/main/data/bollettino-latest-oggi-comuni.csv" 2>/dev/null || echo "")
          # Scarica CSV bollettino DOMANI per comuni
          CSV_DOMANI=$(curl -sL --max-time 20 "https://raw.githubusercontent.com/opendatasicilia/DPC-bollettini-criticita-idrogeologica-idraulica/main/data/bollettino-latest-domani-comuni.csv" 2>/dev/null || echo "")

          # Cerca Genzano di Roma (codice ISTAT 058041) in entrambi
          GENZANO_OGGI=$(echo "$CSV_OGGI" | grep -i "genzano di roma\|058041" || echo "")
          GENZANO_DOMANI=$(echo "$CSV_DOMANI" | grep -i "genzano di roma\|058041" || echo "")

          echo "   Oggi: $GENZANO_OGGI"
          echo "   Domani: $GENZANO_DOMANI"

          # Analizza i livelli con Python
          RESULT=$(python3 << PYEOF
          import sys
          levels = {'verde':0, 'gialla':1, 'arancione':2, 'rossa':3}
          max_level = 'verde'
          fonte = ''

          for label, line in [('oggi', """$GENZANO_OGGI"""), ('domani', """$GENZANO_DOMANI""")]:
              if not line.strip():
                  continue
              fields = line.strip().split(',')
              # I campi allerta sono gli ultimi 4: criticita, idrogeologico, temporali, idraulico
              for f in fields:
                  f_clean = f.strip().strip('"').lower()
                  if f_clean in levels and levels[f_clean] > levels[max_level]:
                      max_level = f_clean
                      fonte = f'CSV DPC ({label})'

          print(f'{max_level}|{fonte}')
          PYEOF
          )

          CSV_LEVEL=$(echo "$RESULT" | cut -d'|' -f1)
          CSV_FONTE=$(echo "$RESULT" | cut -d'|' -f2)

          if [ -n "$CSV_LEVEL" ] && [ "$CSV_LEVEL" != "verde" ]; then
            LIVELLO="$CSV_LEVEL"
            FONTE="$CSV_FONTE"
            echo "   ⚠️ CSV: allerta $LIVELLO ($CSV_FONTE)"
          else
            echo "   ✅ CSV: nessuna allerta per Genzano"
          fi

          # Se CSV non ha trovato nulla, prova API allertameteo.app come fallback
          if [ "$LIVELLO" = "verde" ]; then
            echo "📡 Fonte 2 (fallback): API allertameteo.app..."
            API_RESP=$(curl -sL --max-time 15 "https://allertameteo.app/api/alert/genzano-di-roma" 2>/dev/null || echo "ERRORE")
            if [ "$API_RESP" != "ERRORE" ] && echo "$API_RESP" | grep -q "{"; then
              API_LEVEL=$(echo "$API_RESP" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              levels = {'verde':0, 'gialla':1, 'arancione':2, 'rossa':3}
              max_l = 'verde'
              def check(obj):
                  global max_l
                  if isinstance(obj, dict):
                      for v in obj.values(): check(v)
                  elif isinstance(obj, str):
                      l = obj.lower().strip()
                      if l in levels and levels[l] > levels.get(max_l,0): max_l = l
              check(data)
              print(max_l)
          except: print('verde')
          " 2>/dev/null || echo "verde")
              if [ "$API_LEVEL" != "verde" ]; then
                LIVELLO="$API_LEVEL"
                FONTE="allertameteo.app API"
              fi
            fi
          fi

          # Imposta titolo e descrizione
          case $LIVELLO in
            verde) TITOLO="NESSUNA ALLERTA"; DESC="Non sono previsti fenomeni significativi sul nostro territorio." ;;
            gialla) TITOLO="ALLERTA GIALLA"; DESC="Criticita ordinaria. Possibili fenomeni localizzati. Prestare attenzione." ;;
            arancione) TITOLO="ALLERTA ARANCIONE"; DESC="Criticita moderata. Fenomeni diffusi e pericolosi. Limitare gli spostamenti." ;;
            rossa) TITOLO="ALLERTA ROSSA"; DESC="Criticita elevata. Fenomeni molto intensi. Seguire le indicazioni delle autorita." ;;
          esac

          echo ""
          echo "📊 RISULTATO: $TITOLO (fonte: ${FONTE:-nessuna allerta})"
          echo "livello=$LIVELLO" >> $GITHUB_OUTPUT
          echo "titolo=$TITOLO" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT
          echo "now=$NOW" >> $GITHUB_OUTPUT
          echo "fonte=${FONTE:-controllo automatico}" >> $GITHUB_OUTPUT

      - name: "📝 Aggiorna file dati allerta"
        run: |
          cat > data/allerta.json << JSONEOF
          {
            "livello": "${{ steps.allerta.outputs.livello }}",
            "titolo": "${{ steps.allerta.outputs.titolo }}",
            "descrizione": "${{ steps.allerta.outputs.desc }}",
            "zona": "F - Bacini Costieri Sud / D - Bacini di Roma",
            "aggiornamento": "Fonte: ${{ steps.allerta.outputs.fonte }}",
            "ultimo_check": "${{ steps.allerta.outputs.now }}"
          }
          JSONEOF

      - name: "📤 Commit e Push se cambiato"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/allerta.json
          if git diff --cached --quiet; then
            echo "✅ Nessuna modifica."
          else
            git commit -m "🌦️ Allerta: ${{ steps.allerta.outputs.titolo }} (${{ steps.allerta.outputs.now }})"
            git push
          fi

      - name: "📊 Riepilogo"
        if: always()
        run: |
          echo "## 🌦️ Controllo Allerta Meteo" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valore |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Livello | **${{ steps.allerta.outputs.titolo }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Fonte | ${{ steps.allerta.outputs.fonte }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Zona | Genzano di Roma (ISTAT 058041) |" >> $GITHUB_STEP_SUMMARY
          echo "| Controllo | ${{ steps.allerta.outputs.now }} |" >> $GITHUB_STEP_SUMMARY
