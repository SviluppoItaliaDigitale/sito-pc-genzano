name: "⛈️ Aggiornamento Allerta Meteo"

on:
  schedule:
    # Cron GitHub interno come FAIL-SAFE minimale: 1 run/h al minuto 17
    # (fuori dai quarti d'ora canonici 0/15/30/45 che sono i picchi di
    # carico GitHub Actions, per ridurre il drift).
    # Frequenza nominale: 1 run/h, 24 run/giorno.
    # NON è il trigger primario — quello è cron-job.org che fa il polling
    # ogni 5 minuti puntuale. Questo cron interviene SOLO se cron-job.org
    # va giù: nel peggiore dei casi il sito ricontrolla DPC entro 1 ora.
    - cron: '17 * * * *'
  # Trigger esterno PRIMARIO: cron-job.org chiama workflow_dispatch ogni
  # 5 minuti via API GitHub (Personal Access Token fine-grained con
  # permessi Actions: write sul solo sito-pc-genzano). Latenza end-to-end
  # osservata al cambio livello DPC: ~15 secondi.
  #
  # Configurazione cron-job.org gestita dall'utente su:
  # https://console.cron-job.org/jobs
  #
  # Architettura "doppio trigger" (FAIL-SAFE):
  # - cron-job.org primary: SLA 99.9%, garantisce ogni 5 min puntuale
  # - GitHub schedule: ridondanza se cron-job.org va giù (drift accettabile
  #   come secondario)
  # Lo script anti-spam interno (soglia stale_check 5h45min) impedisce
  # commit duplicati anche se i due trigger sparano ravvicinati.
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-allerta:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🛠️ Setup pdftotext (per fallback PDF Regione Lazio)"
        run: which pdftotext || sudo apt-get install -y --no-install-recommends poppler-utils

      - name: "🔍 Verifica livello allerta DPC per Genzano di Roma"
        id: check
        run: python3 scripts/check-allerta.py


      - name: "🌬️ Check avvisi meteo avversi (vento, neve, calore)"
        id: avvisi
        run: python3 scripts/check-avvisi-meteo.py

      - name: "🔥 Check rischio incendi boschivi (AIB Regione Lazio)"
        id: incendi
        run: python3 scripts/check-rischi-incendi.py

      - name: "📝 Commit e push se allerta/avviso/incendi cambiato"
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/allerta.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica a data/allerta.json: skip commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Messaggio commit combinato: descrive cosa è cambiato
          MSG_PARTS=()
          if [ "${{ steps.check.outputs.changed }}" = "true" ]; then
            MSG_PARTS+=("${{ steps.check.outputs.motivo }}")
          fi
          if [ "${{ steps.avvisi.outputs.changed }}" = "true" ]; then
            if [ -n "${{ steps.avvisi.outputs.tipo }}" ]; then
              MSG_PARTS+=("avviso meteo: ${{ steps.avvisi.outputs.tipo }} ${{ steps.avvisi.outputs.livello }}")
            else
              MSG_PARTS+=("avviso meteo cessato")
            fi
          fi
          if [ "${{ steps.incendi.outputs.changed }}" = "true" ]; then
            if [ -n "${{ steps.incendi.outputs.livello_aib }}" ]; then
              MSG_PARTS+=("rischio incendi: ${{ steps.incendi.outputs.livello_aib }}")
            else
              MSG_PARTS+=("rischio incendi cessato")
            fi
          fi
          MSG_HEAD=$(IFS=' + '; echo "${MSG_PARTS[*]}")
          [ -z "$MSG_HEAD" ] && MSG_HEAD="aggiornamento periodico"
          git commit -m "Allerta meteo: $MSG_HEAD" \
                     -m "Aggiornamento automatico da bollettino DPC (opendatasicilia), avvisi meteo e bollettino AIB Regione Lazio."
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: "🚀 Avvia deploy"
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering deploy workflow..."
          gh workflow run deploy.yml --ref main
