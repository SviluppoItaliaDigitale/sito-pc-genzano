name: "⛈️ Aggiornamento Allerta Meteo"

on:
  schedule:
    # Cron GitHub interno come FAIL-SAFE minimale: 1 run/h al minuto 17
    # (fuori dai quarti d'ora canonici 0/15/30/45 che sono i picchi di
    # carico GitHub Actions, per ridurre il drift).
    # Frequenza nominale: 1 run/h, 24 run/giorno.
    # NON è il trigger primario — quello è cron-job.org che fa il polling
    # ogni 5 minuti puntuale. Questo cron interviene SOLO se cron-job.org
    # va giù: nel peggiore dei casi il sito ricontrolla DPC entro 1 ora.
    - cron: '17 * * * *'
  # Trigger esterno PRIMARIO: cron-job.org chiama workflow_dispatch ogni
  # 5 minuti via API GitHub (Personal Access Token fine-grained con
  # permessi Actions: write sul solo sito-pc-genzano). Latenza end-to-end
  # osservata al cambio livello DPC: ~15 secondi.
  #
  # Configurazione cron-job.org gestita dall'utente su:
  # https://console.cron-job.org/jobs
  #
  # Architettura "doppio trigger" (FAIL-SAFE):
  # - cron-job.org primary: SLA 99.9%, garantisce ogni 5 min puntuale
  # - GitHub schedule: ridondanza se cron-job.org va giù (drift accettabile
  #   come secondario)
  # Lo script anti-spam interno (soglia stale_check 5h45min) impedisce
  # commit duplicati anche se i due trigger sparano ravvicinati.
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-allerta:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔍 Verifica livello allerta DPC per Genzano di Roma"
        id: check
        run: |
          python3 << 'PYEOF'
          import csv, json, io, os, sys, urllib.request
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo  # gestisce automaticamente CET/CEST (ora solare/legale Europe/Rome)

          # opendatasicilia espone due CSV: "bollettino-oggi" (per il giorno
          # corrente, validità fino alle 23:59 del giorno di emissione) e
          # "bollettino-domani" (per il giorno successivo, validità dal
          # 00:00 alle 23:59 del giorno dopo l'emissione).
          # Tra la mezzanotte e le ~14:00 del giorno corrente, "oggi" è ancora
          # quello vecchio (scaduto) mentre "domani" è già diventato la verità
          # corrente. Per coprire il gap notturno legge entrambi e prende il
          # MAX tra quelli VALIDI ADESSO (dentro la finestra data_validita).
          CSV_URLS = {
              "oggi": (
                  "https://raw.githubusercontent.com/opendatasicilia/"
                  "DPC-bollettini-criticita-idrogeologica-idraulica/"
                  "refs/heads/main/data/bollettini/bollettino-oggi-comuni-latest.csv"
              ),
              "domani": (
                  "https://raw.githubusercontent.com/opendatasicilia/"
                  "DPC-bollettini-criticita-idrogeologica-idraulica/"
                  "refs/heads/main/data/bollettini/bollettino-domani-comuni-latest.csv"
              ),
          }
          COMUNE = "Genzano di Roma"
          ALLERTA_PATH = "data/allerta.json"

          # ZoneInfo Europe/Rome gestisce automaticamente l'offset corretto:
          # +02:00 in ora legale (ultima domenica di marzo → ultima domenica di ottobre)
          # +01:00 in ora solare (ultima domenica di ottobre → ultima domenica di marzo)
          rome_tz = ZoneInfo("Europe/Rome")
          now = datetime.now(rome_tz)

          # ── 1. Scarica entrambi i CSV e trova la riga Genzano ──────
          bollettini = {}  # label -> row dict
          for label, url in CSV_URLS.items():
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "PC-Genzano-Bot/1.0"})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = r.read().decode("utf-8")
              except Exception as e:
                  print(f"::warning::CSV {label} non disponibile: {e}")
                  continue
              reader = csv.DictReader(io.StringIO(data))
              for row in reader:
                  if row.get("comune_nome", "").strip() == COMUNE:
                      bollettini[label] = row
                      break

          if not bollettini:
              print(f"::warning::Nessun bollettino raggiungibile o {COMUNE} non trovato")
              sys.exit(0)

          # ── 2. Filtra solo i bollettini VALIDI ADESSO ──────────────
          def parse_iso(s):
              try:
                  return datetime.fromisoformat(s)
              except Exception:
                  return None

          attivi = {}
          for label, row in bollettini.items():
              inizio = parse_iso(row.get("data_validita_inizio", ""))
              fine = parse_iso(row.get("data_validita_fine", ""))
              if inizio and fine and inizio <= now <= fine:
                  attivi[label] = row
                  print(f"✅ Bollettino {label} ATTIVO (validità {inizio} → {fine})")
              else:
                  print(f"⏭️  Bollettino {label} fuori validità (inizio={inizio}, fine={fine})")

          if not attivi:
              # Tutti scaduti / non ancora attivi → fallback su quello che c'è,
              # priorità domani > oggi (domani è di solito il più recente in arrivo).
              fallback_key = "domani" if "domani" in bollettini else "oggi"
              attivi = {fallback_key: bollettini[fallback_key]}
              print(f"::warning::Nessun bollettino in finestra di validità, uso {fallback_key} come fallback")

          # ── 3. Estrai il livello massimo combinando i bollettini attivi ──
          LEVEL_NAME = {0: "verde", 1: "gialla", 2: "arancione", 3: "rossa"}

          def extract_level(value):
              v = value.lower()
              if "allerta rossa" in v:
                  return 3
              if "allerta arancione" in v:
                  return 2
              if "allerta gialla" in v:
                  return 1
              return 0

          RISK_FIELDS = {
              "avviso_idrogeologico": "rischio idrogeologico",
              "avviso_temporali": "temporali",
              "avviso_idraulico": "rischio idraulico",
          }

          max_level = 0
          active_risks_set = set()  # ordine inserito? no, ricostruito sotto
          active_risks_order = []
          bollettino_attivo_label = None

          for label, row in attivi.items():
              crit_level = extract_level(row.get("avviso_criticita", ""))
              if crit_level > max_level:
                  max_level = crit_level
                  bollettino_attivo_label = label

              for field, risk_label in RISK_FIELDS.items():
                  level = extract_level(row.get(field, ""))
                  if level > 0 and risk_label not in active_risks_set:
                      active_risks_set.add(risk_label)
                      active_risks_order.append(risk_label)
                  if level > max_level:
                      max_level = level
                      bollettino_attivo_label = label

          if bollettino_attivo_label is None:
              bollettino_attivo_label = next(iter(attivi))

          active_risks = active_risks_order
          livello = LEVEL_NAME[max_level]
          genzano = attivi[bollettino_attivo_label]
          print(f"📊 MAX level={livello}, dal bollettino '{bollettino_attivo_label}'")
          print(f"Riga: {json.dumps(genzano, ensure_ascii=False)}")

          # ── 4. Costruisci titolo e descrizione ─────────────────────
          TITLES = {
              "verde": "NESSUNA ALLERTA",
              "gialla": "ALLERTA GIALLA",
              "arancione": "ALLERTA ARANCIONE",
              "rossa": "ALLERTA ROSSA",
          }

          BASE_DESCS = {
              "verde": "Non sono previsti fenomeni significativi sul nostro territorio.",
              "gialla": "Prestare attenzione.",
              "arancione": "Limitare gli spostamenti.",
              "rossa": "Seguire le indicazioni delle autorità.",
          }

          titolo = TITLES[livello]

          if livello == "verde" or not active_risks:
              descrizione = BASE_DESCS[livello]
          else:
              rischi_str = ", ".join(active_risks)
              descrizione = f"Criticità per {rischi_str}. {BASE_DESCS[livello]}"

          # ── 5. Confronta con allerta.json attuale ──────────────────
          # isoformat con timespec='seconds' produce automaticamente l'offset
          # corretto in base alla data: +02:00 d'estate, +01:00 d'inverno.
          timestamp_now = now.isoformat(timespec="seconds")

          try:
              with open(ALLERTA_PATH, "r", encoding="utf-8") as f:
                  current = json.load(f)
          except Exception:
              current = {}

          old_level = current.get("livello", "sconosciuto")
          level_changed = current.get("livello") != livello

          # Calcola se sono passate ≥6 ore dall'ultimo controllo committato.
          # Soglia: 5h45min, così il cron orario centra sicuramente la finestra
          # delle 6h senza saltare un giro per pochi secondi di drift.
          stale_check = True
          last_check_str = current.get("ultimo_controllo") or current.get("ultimo_aggiornamento")
          if last_check_str:
              try:
                  last_check = datetime.fromisoformat(last_check_str)
                  if (now - last_check) < timedelta(hours=5, minutes=45):
                      stale_check = False
              except Exception:
                  pass

          if not level_changed and not stale_check:
              print(f"✅ Livello invariato ({livello}) e ultimo controllo recente: skip commit")
              gh_out = os.environ.get("GITHUB_OUTPUT", "")
              if gh_out:
                  with open(gh_out, "a") as f:
                      f.write("changed=false\n")
              sys.exit(0)

          # ── 6. Aggiorna allerta.json ───────────────────────────────
          # ultimo_aggiornamento: cambia SOLO quando il livello cambia
          # ultimo_controllo:    cambia ogni volta che committiamo (≥6h o cambio livello)
          if level_changed:
              ultimo_aggiornamento = timestamp_now
              motivo = f"livello {old_level} → {livello}"
          else:
              ultimo_aggiornamento = current.get("ultimo_aggiornamento", timestamp_now)
              motivo = f"controllo periodico (livello invariato: {livello})"

          new_data = {
              "livello": livello,
              "titolo": titolo,
              "descrizione": descrizione,
              "ultimo_aggiornamento": ultimo_aggiornamento,
              "ultimo_controllo": timestamp_now,
          }

          with open(ALLERTA_PATH, "w", encoding="utf-8") as f:
              json.dump(new_data, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"⚠️ Aggiornamento: {motivo}")

          gh_out = os.environ.get("GITHUB_OUTPUT", "")
          if gh_out:
              with open(gh_out, "a") as f:
                  f.write("changed=true\n")
                  f.write(f"old_level={old_level}\n")
                  f.write(f"new_level={livello}\n")
                  f.write(f"descrizione={descrizione}\n")
                  f.write(f"motivo={motivo}\n")
                  f.write(f"level_changed={'true' if level_changed else 'false'}\n")
          PYEOF

      - name: "📝 Commit e push"
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/allerta.json
          git diff --cached --quiet && exit 0
          git commit -m "$(cat <<EOF
          Allerta meteo: ${{ steps.check.outputs.motivo }}

          Aggiornamento automatico da bollettino DPC (opendatasicilia).
          ${{ steps.check.outputs.descrizione }}
          EOF
          )"
          git push

      - name: "🚀 Avvia deploy"
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering deploy workflow..."
          gh workflow run deploy.yml --ref main
