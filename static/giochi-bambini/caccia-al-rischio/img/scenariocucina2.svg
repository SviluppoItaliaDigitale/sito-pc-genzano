<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Cucina alternativa con rischi da trovare</title>
  <!-- Pavimento -->
  <rect x="0" y="370" width="800" height="130" fill="#d9cfc0"/>
  <!-- Parete -->
  <rect x="0" y="0" width="800" height="370" fill="#f0ece4"/>
  <!-- Battiscopa -->
  <rect x="0" y="365" width="800" height="8" fill="#c0a888"/>
  <!-- RISCHIO: Spigoli mobili (top 29%, left 55.38%) — posizione ~443,145 -->
  <!-- Pensili -->
  <rect x="300" y="50" width="130" height="80" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <rect x="440" y="50" width="130" height="80" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <circle cx="365" cy="90" r="4" fill="#daa520"/>
  <circle cx="505" cy="90" r="4" fill="#daa520"/>
  <!-- Spigolo -->
  <rect x="430" y="50" width="4" height="80" fill="#c09050"/>
  <!-- Piano cucina -->
  <rect x="100" y="200" width="600" height="15" fill="#e0d4c0"/>
  <!-- Mobili sotto -->
  <rect x="100" y="215" width="600" height="155" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <!-- RISCHIO: Fornello e forno accesi (top 49.95%, left 43.49%) — posizione ~348,250 -->
  <rect x="280" y="155" width="140" height="55" fill="#555" stroke="#333" stroke-width="2"/>
  <circle cx="320" cy="174" r="14" fill="#444"/>
  <circle cx="320" cy="174" r="7" fill="#ff6600"/>
  <circle cx="385" cy="174" r="14" fill="#444"/>
  <circle cx="385" cy="174" r="7" fill="#ff6600"/>
  <path d="M315,164 Q320,152 325,164" fill="#ff4400" opacity="0.8"/>
  <path d="M380,164 Q385,152 390,164" fill="#ff4400" opacity="0.8"/>
  <!-- Forno -->
  <rect x="280" y="220" width="90" height="100" fill="#555" stroke="#333" stroke-width="2"/>
  <rect x="285" y="225" width="80" height="50" fill="#3a3a3a"/>
  <rect x="287" y="227" width="76" height="46" fill="#ff8800" opacity="0.2"/>
  <!-- RISCHIO: Tappeto arricciato (top 84.47%, left 78.69%) — posizione ~630,422 -->
  <path d="M560,400 Q600,390 630,405 Q660,395 700,405 L700,450 Q660,440 630,450 Q600,440 560,450 Z" fill="#8b5e3c" opacity="0.5"/>
  <path d="M610,400 L620,425 L630,400" stroke="#6b3e1c" stroke-width="2" fill="none"/>
  <!-- RISCHIO: Cassetti e ante aperte (top 62.49%, left 19.34%) — posizione ~155,312 -->
  <rect x="100" y="220" width="80" height="145" fill="#dab88c" stroke="#c09050" stroke-width="1"/>
  <!-- Anta aperta -->
  <path d="M100,220 L100,365 L60,355 L60,230 Z" fill="#dab88c" stroke="#c09050" stroke-width="1"/>
  <circle cx="65" cy="290" r="3" fill="#daa520"/>
  <!-- Cassetto aperto sopra -->
  <rect x="185" y="220" width="90" height="30" fill="#dab88c" stroke="#c09050" stroke-width="1"/>
  <!-- RISCHIO: Barattoli sporgenti (top 50.75%, left 12.98%) — posizione ~104,254 -->
  <rect x="80" y="140" width="60" height="55" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <!-- Barattoli che sporgono -->
  <rect x="75" y="145" width="18" height="25" rx="3" fill="#e07050"/>
  <rect x="95" y="150" width="18" height="25" rx="3" fill="#5090c0"/>
  <rect x="115" y="145" width="18" height="25" rx="3" fill="#60a060"/>
  <!-- Barattolo che cade -->
  <rect x="60" y="170" width="16" height="22" rx="3" fill="#d4a020" transform="rotate(-15,68,181)"/>
  <!-- RISCHIO: Attrezzi pericolosi (top 40.97%, left 67.64%) — posizione ~541,205 -->
  <!-- Coltelli e utensili su barra magnetica -->
  <rect x="510" y="150" width="80" height="6" fill="#808080"/>
  <path d="M520,156 L520,195 L525,200 L530,195 L530,156" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <path d="M540,156 L540,205 L545,210 L550,205 L550,156" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <path d="M560,156 L560,190 L568,195 L576,190 L576,156" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <!-- Manici -->
  <rect x="522" y="156" width="6" height="15" rx="1" fill="#5a3a1a"/>
  <rect x="542" y="156" width="6" height="15" rx="1" fill="#5a3a1a"/>
  <rect x="564" y="156" width="8" height="15" rx="1" fill="#5a3a1a"/>
  <!-- Finestra -->
  <rect x="600" y="30" width="120" height="110" fill="#87ceeb" stroke="#8b6914" stroke-width="3"/>
  <!-- Ante -->
  <rect x="440" y="220" width="80" height="145" fill="#dab88c" stroke="#c09050" stroke-width="1"/>
  <rect x="525" y="220" width="80" height="145" fill="#dab88c" stroke="#c09050" stroke-width="1"/>
  <rect x="610" y="220" width="80" height="145" fill="#dab88c" stroke="#c09050" stroke-width="1"/>
  <circle cx="510" cy="290" r="3" fill="#daa520"/>
  <circle cx="595" cy="290" r="3" fill="#daa520"/>
  <circle cx="680" cy="290" r="3" fill="#daa520"/>
</svg>
