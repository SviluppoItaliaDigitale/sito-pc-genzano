  <rect x="150" y="70" width="100" height="80" fill="#e8c170" stroke="#8b6914" stroke-width="3"/>
  <circle cx="200" cy="100" r="15" fill="#ff8a65"/>
  <rect x="170" y="120" width="60" height="20" fill="#a1887f"/>
  <!-- Armadio -->
  <rect x="0" y="100" width="60" height="280" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <line x1="30" y1="100" x2="30" y2="380" stroke="#8b4513" stroke-width="2"/>
  <circle cx="25" cy="240" r="3" fill="#daa520"/>
  <circle cx="35" cy="240" r="3" fill="#daa520"/>
</svg>
