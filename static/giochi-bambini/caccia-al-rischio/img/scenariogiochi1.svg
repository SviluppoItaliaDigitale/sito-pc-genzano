<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Cameretta dei giochi con rischi da trovare</title>
  <!-- Pavimento -->
  <rect x="0" y="370" width="800" height="130" fill="#d4c4a8"/>
  <!-- Parete -->
  <rect x="0" y="0" width="800" height="370" fill="#e8f0e0"/>
  <!-- Battiscopa -->
  <rect x="0" y="365" width="800" height="8" fill="#8b6914"/>
  <!-- Stelle adesive sulla parete -->
  <polygon points="60,40 65,55 80,55 68,65 72,80 60,72 48,80 52,65 40,55 55,55" fill="#f0c040" opacity="0.3"/>
  <polygon points="720,30 724,42 736,42 726,50 730,62 720,55 710,62 714,50 704,42 716,42" fill="#f0c040" opacity="0.3"/>
  <!-- RISCHIO: Lampada che scotta (top 41.78%, left 6.54%) — posizione ~52,209 -->
  <rect x="48" y="180" width="8" height="70" fill="#c0c0c0"/>
  <path d="M30,180 L74,180 L68,150 L36,150 Z" fill="#ffeb3b"/>
  <circle cx="52" cy="168" r="10" fill="#fff9c4"/>
  <line x1="52" y1="150" x2="52" y2="140" stroke="#ffd600" stroke-width="2"/>
  <line x1="38" y1="158" x2="32" y2="150" stroke="#ffd600" stroke-width="2"/>
  <line x1="66" y1="158" x2="72" y2="150" stroke="#ffd600" stroke-width="2"/>
  <!-- RISCHIO: Spigoli letto (top 58.36%, left 43.72%) — posizione ~350,292 -->
  <!-- Letto a castello / letto bambino -->
  <rect x="230" y="250" width="250" height="120" rx="5" fill="#7b96b0"/>
  <rect x="230" y="240" width="250" height="20" rx="3" fill="#5a7590"/>
  <!-- Testata -->
  <rect x="225" y="220" width="10" height="155" fill="#5a3a1a"/>
  <rect x="475" y="220" width="10" height="155" fill="#5a3a1a"/>
  <!-- Coperta -->
  <rect x="240" y="280" width="230" height="80" rx="3" fill="#90b0c8"/>
  <!-- Cuscino -->
  <ellipse cx="290" cy="270" rx="35" ry="12" fill="#fff"/>
  <!-- RISCHIO: Giochi disordinati (top 82.12%, left 35.37%) — posizione ~283,411 -->
  <!-- Giocattoli sparsi sul pavimento -->
  <rect x="250" y="385" width="25" height="25" rx="3" fill="#e04040"/>
  <circle cx="300" cy="405" r="12" fill="#4090e0"/>
  <rect x="320" y="395" width="30" height="15" rx="2" fill="#40c040" transform="rotate(15,335,402)"/>
  <polygon points="265,420 275,400 285,420" fill="#f0c040"/>
  <circle cx="310" cy="430" r="8" fill="#e07050"/>
  <!-- RISCHIO: Monitor computer (top 33.81%, left 88.19%) — posizione ~706,169 -->
  <rect x="650" y="200" width="120" height="170" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <rect x="670" y="140" width="80" height="55" rx="3" fill="#333" stroke="#222" stroke-width="2"/>
  <rect x="675" y="145" width="70" height="42" fill="#4488cc"/>
  <!-- Tastiera -->
  <rect x="670" y="200" width="80" height="8" rx="2" fill="#555"/>
  <!-- Luce blu -->
  <rect x="675" y="145" width="70" height="42" fill="#88bbff" opacity="0.3"/>
  <!-- RISCHIO: Tappeto arricciato (top 82.6%, left 62.89%) — posizione ~503,413 -->
  <path d="M440,395 Q470,385 503,400 Q530,390 560,400 L560,440 Q530,430 503,440 Q470,430 440,440 Z" fill="#c07070" opacity="0.5"/>
  <path d="M480,395 L488,418 L496,395" stroke="#a05050" stroke-width="2" fill="none"/>
  <!-- Scaffale giocattoli -->
  <rect x="80" y="270" width="120" height="100" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <rect x="80" y="310" width="120" height="5" fill="#8b6914"/>
  <!-- Giocattoli sullo scaffale -->
  <circle cx="110" cy="290" r="12" fill="#e07050"/>
  <rect x="140" y="278" width="20" height="25" rx="2" fill="#5090c0"/>
  <rect x="90" y="320" width="30" height="40" rx="3" fill="#40c040"/>
  <circle cx="160" cy="345" r="10" fill="#f0c040"/>
  <!-- Finestra -->
  <rect x="350" y="30" width="120" height="120" fill="#87ceeb" stroke="#8b6914" stroke-width="3"/>
  <line x1="410" y1="30" x2="410" y2="150" stroke="#8b6914" stroke-width="2"/>
  <line x1="350" y1="90" x2="470" y2="90" stroke="#8b6914" stroke-width="2"/>
</svg>
