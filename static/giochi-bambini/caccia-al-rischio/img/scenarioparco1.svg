<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Parco giochi con rischi da trovare</title>
  <!-- Cielo -->
  <rect x="0" y="0" width="800" height="300" fill="#87ceeb"/>
  <!-- Nuvole -->
  <ellipse cx="150" cy="60" rx="60" ry="25" fill="#fff" opacity="0.8"/>
  <ellipse cx="180" cy="50" rx="40" ry="20" fill="#fff" opacity="0.8"/>
  <ellipse cx="600" cy="80" rx="50" ry="20" fill="#fff" opacity="0.8"/>
  <ellipse cx="630" cy="70" rx="35" ry="18" fill="#fff" opacity="0.8"/>
  <!-- Sole -->
  <circle cx="700" cy="50" r="30" fill="#f0c040"/>
  <line x1="700" y1="10" x2="700" y2="0" stroke="#f0c040" stroke-width="3"/>
  <line x1="730" y1="25" x2="745" y2="15" stroke="#f0c040" stroke-width="3"/>
  <line x1="740" y1="50" x2="755" y2="50" stroke="#f0c040" stroke-width="3"/>
  <!-- Prato -->
  <rect x="0" y="300" width="800" height="200" fill="#4caf50"/>
  <rect x="0" y="300" width="800" height="20" fill="#66bb6a"/>
  <!-- Alberi sfondo -->
  <rect x="30" y="180" width="15" height="120" fill="#5d4037"/>
  <ellipse cx="37" cy="170" rx="40" ry="45" fill="#2e7d32"/>
  <rect x="750" y="200" width="15" height="100" fill="#5d4037"/>
  <ellipse cx="757" cy="190" rx="35" ry="40" fill="#2e7d32"/>
  <!-- RISCHIO: Ponte - inciampare (top 56.12%, left 16.27%) — posizione ~130,281 -->
  <!-- Ponte di corde -->
  <rect x="80" y="240" width="100" height="10" fill="#8b6914"/>
  <rect x="80" y="240" width="10" height="100" fill="#8b6914"/>
  <rect x="170" y="240" width="10" height="100" fill="#8b6914"/>
  <!-- Assi del ponte -->
  <rect x="85" y="290" width="90" height="8" fill="#a0522d"/>
  <rect x="85" y="270" width="90" height="8" fill="#a0522d"/>
  <rect x="85" y="310" width="90" height="8" fill="#a0522d"/>
  <!-- Corde -->
  <line x1="85" y1="250" x2="175" y2="250" stroke="#8b6914" stroke-width="3"/>
  <line x1="85" y1="260" x2="90" y2="270" stroke="#c0a060" stroke-width="2"/>
  <line x1="115" y1="260" x2="120" y2="270" stroke="#c0a060" stroke-width="2"/>
  <line x1="145" y1="260" x2="150" y2="270" stroke="#c0a060" stroke-width="2"/>
  <!-- RISCHIO: Cadere dal gioco (top 78.84%, left 14.28%) — posizione ~114,394 -->
  <!-- Base gioco in alto con scala -->
  <rect x="80" y="340" width="80" height="10" fill="#c09050"/>
  <rect x="75" y="345" width="10" height="60" fill="#8b6914"/>
  <rect x="155" y="345" width="10" height="60" fill="#8b6914"/>
  <!-- RISCHIO: Scivolo (top 64.81%, left 51.54%) — posizione ~412,324 -->
  <!-- Scivolo grande -->
  <rect x="380" y="200" width="20" height="180" fill="#e04040"/>
  <path d="M400,200 L480,370 L480,380 L400,210 Z" fill="#e04040"/>
  <rect x="375" y="195" width="30" height="10" rx="3" fill="#c03030"/>
  <!-- Scaletta scivolo -->
  <rect x="365" y="200" width="10" height="180" fill="#c03030"/>
  <rect x="365" y="240" width="18" height="6" fill="#c03030"/>
  <rect x="365" y="280" width="18" height="6" fill="#c03030"/>
  <rect x="365" y="320" width="18" height="6" fill="#c03030"/>
  <rect x="365" y="360" width="18" height="6" fill="#c03030"/>
  <!-- RISCHIO: Cadere dal cavallo a molla (top 57.36%, left 40.2%) — posizione ~322,287 -->
  <!-- Cavallo a molla -->
  <ellipse cx="320" cy="340" rx="30" ry="15" fill="#f0c040"/>
  <path d="M300,330 Q310,300 320,310 Q330,300 340,330" fill="#f0c040" stroke="#e0a020" stroke-width="2"/>
  <!-- Testa cavallo -->
  <ellipse cx="340" cy="295" rx="12" ry="18" fill="#f0c040" stroke="#e0a020" stroke-width="2"/>
  <circle cx="344" cy="290" r="2" fill="#333"/>
  <!-- Molla -->
  <path d="M320,355 Q310,365 320,375 Q330,385 320,395" stroke="#c0c0c0" stroke-width="4" fill="none"/>
  <!-- RISCHIO: Farsi male alle braccia (top 49.73%, left 91.8%) — posizione ~734,249 -->
  <!-- Barre per arrampicarsi -->
  <rect x="680" y="180" width="10" height="200" fill="#4090e0"/>
  <rect x="760" y="180" width="10" height="200" fill="#4090e0"/>
  <rect x="680" y="180" width="90" height="10" fill="#4090e0"/>
  <!-- Barre orizzontali -->
  <rect x="690" y="210" width="70" height="6" fill="#3080d0"/>
  <rect x="690" y="240" width="70" height="6" fill="#3080d0"/>
  <rect x="690" y="270" width="70" height="6" fill="#3080d0"/>
  <rect x="690" y="300" width="70" height="6" fill="#3080d0"/>
  <!-- Altalena sfondo -->
  <rect x="550" y="220" width="10" height="160" fill="#8b6914"/>
  <rect x="640" y="220" width="10" height="160" fill="#8b6914"/>
  <rect x="545" y="215" width="110" height="10" fill="#8b6914"/>
  <!-- Catene e sedile -->
  <line x1="570" y1="225" x2="575" y2="340" stroke="#999" stroke-width="2"/>
  <line x1="590" y1="225" x2="585" y2="340" stroke="#999" stroke-width="2"/>
  <rect x="570" y="340" width="20" height="6" rx="2" fill="#333"/>
  <line x1="610" y1="225" x2="615" y2="330" stroke="#999" stroke-width="2"/>
  <line x1="630" y1="225" x2="625" y2="330" stroke="#999" stroke-width="2"/>
  <rect x="610" y="330" width="20" height="6" rx="2" fill="#333"/>
  <!-- Recinzione -->
  <line x1="0" y1="395" x2="800" y2="395" stroke="#8b6914" stroke-width="2" opacity="0.3"/>
</svg>
