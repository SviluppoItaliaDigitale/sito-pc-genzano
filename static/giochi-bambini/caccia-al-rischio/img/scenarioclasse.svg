<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Aula scolastica con rischi da trovare</title>
  <!-- Pavimento -->
  <rect x="0" y="370" width="800" height="130" fill="#c8c0b0"/>
  <!-- Parete -->
  <rect x="0" y="0" width="800" height="370" fill="#f5f0e8"/>
  <!-- Battiscopa -->
  <rect x="0" y="365" width="800" height="8" fill="#a09080"/>
  <!-- Lavagna -->
  <rect x="200" y="40" width="350" height="150" fill="#2e7d32" stroke="#8b6914" stroke-width="4"/>
  <text x="375" y="120" text-anchor="middle" fill="#c8e6c9" font-size="18" font-family="serif">ABC 123</text>
  <!-- Cattedra insegnante -->
  <rect x="280" y="210" width="200" height="15" fill="#8b6914"/>
  <rect x="290" y="225" width="180" height="80" fill="#a0522d"/>
  <rect x="295" y="230" width="80" height="70" fill="#b8734d" stroke="#8b4513" stroke-width="1"/>
  <rect x="380" y="230" width="80" height="70" fill="#b8734d" stroke="#8b4513" stroke-width="1"/>
  <circle cx="335" cy="265" r="3" fill="#daa520"/>
  <circle cx="420" cy="265" r="3" fill="#daa520"/>
  <!-- Sedia insegnante -->
  <rect x="350" y="310" width="60" height="8" fill="#5a3a1a"/>
  <rect x="345" y="280" width="70" height="30" rx="3" fill="#5a3a1a"/>
  <!-- RISCHIO: Spigoli appuntiti banco (top 61.46%, left 39.35%) — posizione ~315,307 -->
  <!-- Banco alunno prima fila -->
  <rect x="80" y="290" width="130" height="10" fill="#c4956a"/>
  <rect x="85" y="300" width="10" height="70" fill="#a07850"/>
  <rect x="195" y="300" width="10" height="70" fill="#a07850"/>
  <!-- Spigolo -->
  <circle cx="80" cy="295" r="4" fill="#c4956a"/>
  <!-- Banco alunno seconda fila -->
  <rect x="500" y="290" width="130" height="10" fill="#c4956a"/>
  <rect x="505" y="300" width="10" height="70" fill="#a07850"/>
  <rect x="615" y="300" width="10" height="70" fill="#a07850"/>
  <!-- Sedie -->
  <rect x="110" y="340" width="50" height="6" fill="#5a3a1a"/>
  <rect x="115" y="320" width="40" height="20" rx="2" fill="#5a3a1a"/>
  <rect x="530" y="340" width="50" height="6" fill="#5a3a1a"/>
  <rect x="535" y="320" width="40" height="20" rx="2" fill="#5a3a1a"/>
  <!-- Libri e quaderni sui banchi -->
  <rect x="100" y="278" width="40" height="12" rx="1" fill="#4090e0"/>
  <rect x="150" y="280" width="35" height="10" rx="1" fill="#e04040"/>
  <rect x="520" y="278" width="40" height="12" rx="1" fill="#40c040"/>
  <rect x="570" y="280" width="35" height="10" rx="1" fill="#f0c040"/>
  <!-- RISCHIO: Finestra apribile (top 47.76%, left 96.55%) — posizione ~772,239 -->
  <rect x="700" y="60" width="90" height="200" fill="#87ceeb" stroke="#8b6914" stroke-width="4"/>
  <line x1="700" y1="160" x2="790" y2="160" stroke="#8b6914" stroke-width="3"/>
  <!-- Anta aperta verso interno -->
  <path d="M790,60 L790,260 L750,250 L750,70 Z" fill="#c4e0f0" stroke="#8b6914" stroke-width="2" opacity="0.7"/>
  <!-- RISCHIO: Spigolo ripiano (top 44.08%, left 22.56%) — posizione ~180,220 -->
  <!-- Scaffale laterale -->
  <rect x="30" y="100" width="110" height="200" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <rect x="30" y="160" width="110" height="5" fill="#8b6914"/>
  <rect x="30" y="220" width="110" height="5" fill="#8b6914"/>
  <!-- Libri -->
  <rect x="40" y="110" width="15" height="45" fill="#e04040"/>
  <rect x="58" y="115" width="12" height="40" fill="#4090e0"/>
  <rect x="73" y="108" width="15" height="47" fill="#40c040"/>
  <rect x="91" y="112" width="12" height="43" fill="#f0c040"/>
  <rect x="40" y="170" width="20" height="45" fill="#c070c0"/>
  <rect x="65" y="175" width="15" height="40" fill="#e0a040"/>
  <rect x="85" y="168" width="18" height="47" fill="#5090c0"/>
  <!-- Spigolo -->
  <circle cx="140" cy="222" r="4" fill="#8b6914"/>
  <!-- Orologio -->
  <circle cx="550" cy="30" r="20" fill="#fff" stroke="#333" stroke-width="2"/>
  <line x1="550" y1="30" x2="550" y2="18" stroke="#333" stroke-width="2"/>
  <line x1="550" y1="30" x2="560" y2="30" stroke="#333" stroke-width="1.5"/>
  <!-- Cartellone -->
  <rect x="600" y="50" width="80" height="60" fill="#fff9c4" stroke="#e0c000" stroke-width="1"/>
  <text x="640" y="85" text-anchor="middle" fill="#333" font-size="10">REGOLE</text>
</svg>
