<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory dei Rischi — Giochi Protezione Civile</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="app-page-hero">
      <div class="container">
        <nav aria-label="Percorso">
          <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item"><a href="/formazione/">Formazione</a></li>
            <li class="breadcrumb-item"><a href="../index.html">Giochi</a></li>
            <li class="breadcrumb-item active" aria-current="page">Memory dei Rischi</li>
          </ol>
        </nav>
        <h1>Memory dei Rischi</h1>
      </div>
    </div>
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="game-container">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <p class="mb-0 fw-bold">Mosse: <span id="moves-count">0</span> &middot; Coppie: <span id="pairs-count">0</span>/<span id="pairs-total">8</span></p>
              <a href="../index.html" class="app-back-link"><i class="bi bi-arrow-left" aria-hidden="true"></i> Torna ai giochi</a>
            </div>
            <div class="memory-grid" role="group" aria-label="Griglia del memory"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="win-screen" class="win-screen-container hide" role="dialog" aria-labelledby="win-title" aria-modal="true">
      <div class="win-box">
        <h2 id="win-title">Complimenti!</h2>
        <p>Hai trovato tutte le coppie!</p>
        <div class="d-flex flex-wrap justify-content-center gap-2">
          <button id="restart-button" class="btn btn-primary"><i class="bi bi-arrow-repeat me-1" aria-hidden="true"></i> Gioca Ancora</button>
          <a href="../index.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1" aria-hidden="true"></i> Torna ai giochi</a>
        </div>
      </div>
    </div>
  </main>
  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="js/script.js" defer></script>
</body>
</html>
