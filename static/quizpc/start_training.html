<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modalità Allenamento — Quiz Protezione Civile</title>
  <meta name="description" content="Allenati con le domande di protezione civile: feedback e spiegazioni per ogni risposta.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="app-page-hero">
      <div class="container">
        <nav aria-label="Percorso">
          <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item"><a href="/formazione/">Formazione</a></li>
            <li class="breadcrumb-item"><a href="index.html">Quiz Formativo</a></li>
            <li class="breadcrumb-item active" aria-current="page">Allenamento</li>
          </ol>
        </nav>
        <h1>Modalità Allenamento</h1>
      </div>
    </div>
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <div class="card p-3 mb-4 bg-light">
                <h2 class="h5 mb-3">Seleziona gli argomenti su cui allenarti</h2>
                <div class="form-check mb-2">
                  <input class="form-check-input" type="checkbox" id="selectAllCheckbox">
                  <label class="form-check-label fw-bold" for="selectAllCheckbox">Seleziona tutti / Deseleziona tutti</label>
                </div>
                <hr class="my-2">
                <div id="categoriesContainer"></div>
              </div>
              <div class="d-grid gap-2">
                <button class="btn btn-primary btn-lg" id="startTrainingBtn"><i class="bi bi-play-fill me-1" aria-hidden="true"></i> Inizia ad allenarti</button>
                <a href="index.html" class="btn btn-outline-secondary">Torna indietro</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="js/banco_domande/1_principi_e_organizzazione.js"></script>
  <script src="js/banco_domande/2_rischio_sismico.js"></script>
  <script src="js/banco_domande/3_rischio_alluvione.js"></script>
  <script src="js/banco_domande/4_incendi_boschivi.js"></script>
  <script src="js/banco_domande/5_operativita_e_logistica.js"></script>
  <script src="js/banco_domande/6_piano_comunale_genzano.js"></script>
  <script src="js/main_loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var categoriesContainer = document.getElementById('categoriesContainer');
      var selectAllCheckbox = document.getElementById('selectAllCheckbox');

      CATEGORIES.forEach(function(category) {
        var count = FULL_QUESTION_BANK.filter(function(q) { return q.category === category; }).length;
        var div = document.createElement('div');
        div.className = 'form-check';
        var safeId = 'train-cat-' + category.replace(/\s/g, '');
        div.innerHTML =
          '<input class="form-check-input category-checkbox" type="checkbox" value="' + category + '" id="' + safeId + '">' +
          '<label class="form-check-label" for="' + safeId + '">' + category + ' <span class="badge bg-secondary rounded-pill">' + count + '</span></label>';
        categoriesContainer.appendChild(div);
      });

      var categoryCheckboxes = document.querySelectorAll('.category-checkbox');
      selectAllCheckbox.addEventListener('change', function() {
        var checked = this.checked;
        categoryCheckboxes.forEach(function(cb) { cb.checked = checked; });
      });

      document.getElementById('startTrainingBtn').addEventListener('click', function() {
        var selectedCategories = Array.from(categoryCheckboxes).filter(function(i) { return i.checked; }).map(function(i) { return i.value; });

        if (selectedCategories.length === 0) {
          var catBox = categoriesContainer.closest('.card');
          catBox.style.borderColor = '#dc3545';
          catBox.style.borderWidth = '2px';
          var msg = document.createElement('div');
          msg.className = 'text-danger small mt-2';
          msg.id = 'catError';
          msg.setAttribute('role', 'alert');
          msg.textContent = 'Seleziona almeno un argomento su cui allenarti.';
          if (!document.getElementById('catError')) catBox.appendChild(msg);
          return;
        }

        localStorage.setItem('trainingCategories', JSON.stringify(selectedCategories));
        window.location.href = 'training.html';
      });
    });
  </script>
</body>
</html>
