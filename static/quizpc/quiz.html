<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz in corso — Protezione Civile</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="container mt-4 mb-5">
      <div class="card quiz-card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h1 class="h5 mb-0">Domanda <span id="question-number"></span> / <span id="total-questions"></span></h1>
          <div id="timer" class="fs-5 fw-bold" aria-live="polite" aria-label="Tempo rimanente"></div>
        </div>
        <div class="progress" style="height:5px;border-radius:0;" role="progressbar" aria-label="Avanzamento quiz">
          <div id="progress-bar" class="progress-bar" style="width:0%;"></div>
        </div>
        <div id="question-animation-wrapper">
          <div class="card-body">
            <h2 class="h4 card-title" id="question-text"></h2>
            <p class="text-muted" id="question-category"></p>
            <div id="answers-container" class="list-group mt-4" role="listbox" aria-label="Risposte disponibili"></div>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <button class="btn btn-secondary" id="exitBtn"><i class="bi bi-x-lg me-1" aria-hidden="true"></i> Esci</button>
          <button id="finish-btn" class="btn btn-danger"><i class="bi bi-check2-all me-1" aria-hidden="true"></i> Termina Quiz</button>
        </div>
      </div>
    </div>
  </main>
  <!-- Modale conferma uscita/termina -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5" id="confirmModalLabel">Conferma</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body" id="confirmModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-danger" id="confirmModalAction">Conferma</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="js/banco_domande/1_principi_e_organizzazione.js"></script>
  <script src="js/banco_domande/2_rischio_sismico.js"></script>
  <script src="js/banco_domande/3_rischio_alluvione.js"></script>
  <script src="js/banco_domande/4_incendi_boschivi.js"></script>
  <script src="js/banco_domande/5_operativita_e_logistica.js"></script>
  <script src="js/banco_domande/6_piano_comunale_genzano.js"></script>
  <script src="js/main_loader.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
