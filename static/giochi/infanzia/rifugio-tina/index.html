<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Il Rifugio di Tina — Giochi Piccoli Esploratori</title>
  <meta name="description" content="Trema la terra! Trova il posto sicuro dove Tina si deve riparare. Gioco per bambini dai 3 ai 6 anni.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
  <link rel="stylesheet" href="/giochi/assets/css/giochi.css">
  <link rel="stylesheet" href="/giochi/infanzia/assets/infanzia.css">
  <style>
    .scena-wrap {
      max-width: 560px; margin: 0 auto;
      background: #fef6e4; border-radius: 18px;
      padding: 10px; border: 4px solid #f4b700;
    }
    .scena-wrap svg { width: 100%; height: auto; display: block; }
    .spot {
      cursor: pointer;
      transition: filter .2s;
    }
    .spot:hover, .spot:focus-visible {
      filter: brightness(1.15) drop-shadow(0 0 6px #F4B700);
      outline: none;
    }
    .shake { animation: quake 0.5s ease-in-out 3; }
    @keyframes quake {
      0%,100% { transform: translate(0,0) rotate(0); }
      20% { transform: translate(-4px, 2px) rotate(-0.4deg); }
      40% { transform: translate(4px, -2px) rotate(0.4deg); }
      60% { transform: translate(-3px, 3px) rotate(-0.3deg); }
      80% { transform: translate(3px, -1px) rotate(0.3deg); }
    }
    .spot.wrong-flash { animation: flash-red 0.5s 2; }
    .spot.right-flash { animation: flash-green 0.5s 2; }
    @keyframes flash-red {
      0%,100% { filter: none; }
      50% { filter: drop-shadow(0 0 14px #D9364F); }
    }
    @keyframes flash-green {
      0%,100% { filter: none; }
      50% { filter: drop-shadow(0 0 14px #4E8B3E); }
    }
    .scena-label {
      display:flex; justify-content:center; align-items:center; gap:.5rem;
      font-weight: 800; color: var(--inf-testo);
      margin-bottom: .6rem;
    }
    .progress-bolli {
      display:flex; justify-content:center; gap:.5rem; margin: .8rem 0;
    }
    .bollino {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #cfd8e3; background: #fff;
      display: inline-flex; align-items:center; justify-content:center;
      color: #fff; font-weight: 800;
    }
    .bollino.on { background: var(--inf-verde); border-color: var(--inf-verde); }
    @media (prefers-reduced-motion: reduce) {
      .shake, .spot.wrong-flash, .spot.right-flash { animation: none; }
    }
  </style>
</head>
<body class="inf-body">
  <main id="main-content" tabindex="-1" class="inf-main">
    <nav aria-label="Percorso">
      <a href="../index.html" class="inf-back"><i class="bi bi-arrow-left" aria-hidden="true"></i> Torna ai giochi</a>
    </nav>
    <div class="inf-home">
      <h1>Il Rifugio di Tina</h1>
      <p>Trema la terra! Tocca il <strong>posto sicuro</strong> dove Tina si nasconde.</p>
    </div>

    <div class="inf-card">
      <div class="progress-bolli" id="progress" aria-label="Scene completate">
        <span class="bollino">1</span>
        <span class="bollino">2</span>
        <span class="bollino">3</span>
      </div>
      <div class="scena-label" id="scena-label">🏠 In cucina</div>

      <div class="scena-wrap">
        <div id="scena-container" aria-label="Scena interattiva"></div>
      </div>

      <div id="feedback" class="text-center mt-3 h5" aria-live="polite" style="min-height:2rem;"></div>
    </div>

    <div id="end" class="inf-card inf-end hide">
      <div class="bravi">Bravissimo!</div>
      <p class="h5 mb-3">Hai aiutato Tina a trovare un posto sicuro!</p>
      <p>Ricorda la regola: <strong>sotto un tavolo robusto</strong>, lontano da finestre, mobili alti e oggetti che possono cadere.</p>
      <div class="attestato-inject my-3"></div>
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <button id="restart" class="inf-big-btn" style="background:var(--inf-blu);"><i class="bi bi-arrow-repeat"></i> Ancora</button>
        <a href="../index.html" class="inf-back"><i class="bi bi-arrow-left"></i> Altri giochi</a>
      </div>
    </div>
  </main>

  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="/giochi/assets/js/progressione.js"></script>
  <script src="/giochi/assets/js/attestato.js"></script>
  <script src="/giochi/assets/js/audio-sintetico.js"></script>
  <script src="/giochi/assets/js/comune.js"></script>
  <script>
  (function(){
    // Scena 1: Cucina — tavolo robusto (giusto), finestra grande (sbagliato), pensile alto (sbagliato)
    var SCENA_CUCINA = '\
      <svg viewBox="0 0 500 340" role="img" aria-label="Scena cucina con tavolo, finestra e pensile">\
        <rect x="0" y="0" width="500" height="260" fill="#fef6e4"/>\
        <rect x="0" y="260" width="500" height="80" fill="#d9b382"/>\
        <!-- Pensile alto -->\
        <g class="spot" data-pos="pensile" tabindex="0" role="button" aria-label="Sotto il pensile alto">\
          <rect x="30" y="20" width="110" height="70" fill="#8b5a2b" stroke="#5a3a1c" stroke-width="3"/>\
          <rect x="40" y="30" width="90" height="50" fill="#a0713a"/>\
          <line x1="85" y1="30" x2="85" y2="80" stroke="#5a3a1c" stroke-width="2"/>\
          <circle cx="78" cy="55" r="3" fill="#333"/>\
          <circle cx="92" cy="55" r="3" fill="#333"/>\
          <!-- Tazze che tremano -->\
          <rect x="55" y="10" width="16" height="14" fill="#D9364F" stroke="#8B1F2E"/>\
          <rect x="90" y="6" width="14" height="16" fill="#3E7BC8" stroke="#17324D"/>\
          <text x="85" y="110" font-size="12" font-weight="800" fill="#8B1F2E" text-anchor="middle">pensile</text>\
        </g>\
        <!-- Finestra -->\
        <g class="spot" data-pos="finestra" tabindex="0" role="button" aria-label="Davanti alla finestra">\
          <rect x="350" y="30" width="120" height="140" fill="#9ED8FF" stroke="#17324D" stroke-width="4"/>\
          <line x1="410" y1="30" x2="410" y2="170" stroke="#17324D" stroke-width="3"/>\
          <line x1="350" y1="100" x2="470" y2="100" stroke="#17324D" stroke-width="3"/>\
          <circle cx="380" cy="60" r="16" fill="#F4B700"/>\
          <text x="410" y="195" font-size="12" font-weight="800" fill="#8B1F2E" text-anchor="middle">finestra</text>\
        </g>\
        <!-- Tavolo robusto (GIUSTO) -->\
        <g class="spot" data-pos="tavolo" tabindex="0" role="button" aria-label="Sotto il tavolo robusto">\
          <rect x="180" y="180" width="160" height="14" fill="#a0713a" stroke="#5a3a1c" stroke-width="3"/>\
          <rect x="190" y="194" width="16" height="70" fill="#8b5a2b" stroke="#5a3a1c" stroke-width="3"/>\
          <rect x="314" y="194" width="16" height="70" fill="#8b5a2b" stroke="#5a3a1c" stroke-width="3"/>\
          <text x="260" y="250" font-size="14" font-weight="800" fill="#2F5A25" text-anchor="middle">tavolo</text>\
        </g>\
      </svg>';

    // Scena 2: Aula scuola — banco (giusto), vicino lampadario (sbagliato), vicino vetrata (sbagliato)
    var SCENA_SCUOLA = '\
      <svg viewBox="0 0 500 340" role="img" aria-label="Scena aula con banco, lampadario e vetrata">\
        <rect x="0" y="0" width="500" height="260" fill="#e8f4ff"/>\
        <rect x="0" y="260" width="500" height="80" fill="#c7a885"/>\
        <!-- Lampadario -->\
        <g class="spot" data-pos="lampadario" tabindex="0" role="button" aria-label="Sotto il lampadario">\
          <line x1="250" y1="0" x2="250" y2="40" stroke="#555" stroke-width="3"/>\
          <ellipse cx="250" cy="55" rx="36" ry="16" fill="#F4B700" stroke="#a67a00" stroke-width="3"/>\
          <circle cx="250" cy="55" r="10" fill="#fff"/>\
          <text x="250" y="90" font-size="12" font-weight="800" fill="#8B1F2E" text-anchor="middle">lampadario</text>\
        </g>\
        <!-- Vetrata -->\
        <g class="spot" data-pos="vetrata" tabindex="0" role="button" aria-label="Davanti alla vetrata">\
          <rect x="380" y="30" width="100" height="180" fill="#b0e0ff" stroke="#17324D" stroke-width="4"/>\
          <line x1="430" y1="30" x2="430" y2="210" stroke="#17324D" stroke-width="2"/>\
          <line x1="380" y1="120" x2="480" y2="120" stroke="#17324D" stroke-width="2"/>\
          <text x="430" y="235" font-size="12" font-weight="800" fill="#8B1F2E" text-anchor="middle">vetrata</text>\
        </g>\
        <!-- Banco (GIUSTO) -->\
        <g class="spot" data-pos="banco" tabindex="0" role="button" aria-label="Sotto il banco">\
          <rect x="40" y="170" width="140" height="12" fill="#a0713a" stroke="#5a3a1c" stroke-width="3"/>\
          <rect x="44" y="182" width="10" height="80" fill="#8b5a2b" stroke="#5a3a1c" stroke-width="2"/>\
          <rect x="166" y="182" width="10" height="80" fill="#8b5a2b" stroke="#5a3a1c" stroke-width="2"/>\
          <!-- Libro sopra -->\
          <rect x="80" y="156" width="50" height="14" fill="#D9364F" stroke="#8B1F2E" stroke-width="2"/>\
          <text x="110" y="250" font-size="14" font-weight="800" fill="#2F5A25" text-anchor="middle">banco</text>\
        </g>\
      </svg>';

    // Scena 3: Giardino — spazio aperto (giusto), sotto albero (sbagliato), vicino muro (sbagliato)
    var SCENA_GIARDINO = '\
      <svg viewBox="0 0 500 340" role="img" aria-label="Scena giardino con spazio aperto, albero e muro">\
        <rect x="0" y="0" width="500" height="200" fill="#cfe9ff"/>\
        <rect x="0" y="200" width="500" height="140" fill="#8ABF78"/>\
        <circle cx="80" cy="60" r="24" fill="#F4B700"/>\
        <!-- Albero (sbagliato) -->\
        <g class="spot" data-pos="albero" tabindex="0" role="button" aria-label="Sotto l albero">\
          <rect x="55" y="160" width="20" height="80" fill="#6b4a35" stroke="#3a2815" stroke-width="3"/>\
          <circle cx="65" cy="150" r="44" fill="#4E8B3E" stroke="#2F5A25" stroke-width="3"/>\
          <text x="65" y="270" font-size="12" font-weight="800" fill="#8B1F2E" text-anchor="middle">albero</text>\
        </g>\
        <!-- Muro alto (sbagliato) -->\
        <g class="spot" data-pos="muro" tabindex="0" role="button" aria-label="Vicino al muro alto">\
          <rect x="380" y="80" width="110" height="180" fill="#d9b382" stroke="#8b5a2b" stroke-width="3"/>\
          <rect x="386" y="86" width="30" height="18" fill="#8b5a2b"/>\
          <rect x="420" y="86" width="30" height="18" fill="#8b5a2b"/>\
          <rect x="454" y="86" width="30" height="18" fill="#8b5a2b"/>\
          <rect x="386" y="108" width="30" height="18" fill="#8b5a2b"/>\
          <rect x="420" y="108" width="30" height="18" fill="#8b5a2b"/>\
          <text x="435" y="285" font-size="12" font-weight="800" fill="#8B1F2E" text-anchor="middle">muro</text>\
        </g>\
        <!-- Prato aperto (GIUSTO) -->\
        <g class="spot" data-pos="prato" tabindex="0" role="button" aria-label="Nel prato aperto lontano da tutto">\
          <ellipse cx="250" cy="260" rx="90" ry="26" fill="#a8d890" stroke="#4E8B3E" stroke-width="3" stroke-dasharray="6,4"/>\
          <circle cx="230" cy="260" r="4" fill="#F4B700"/>\
          <circle cx="270" cy="256" r="4" fill="#D9364F"/>\
          <circle cx="250" cy="268" r="4" fill="#fff"/>\
          <text x="250" y="305" font-size="14" font-weight="800" fill="#2F5A25" text-anchor="middle">prato aperto</text>\
        </g>\
      </svg>';

    var SCENE = [
      {
        label: '🏠 In cucina',
        html: SCENA_CUCINA,
        giusto: 'tavolo',
        tipGiusto: 'Bravissimo! Sotto il tavolo robusto sei al sicuro.',
        tipSbagliato: {
          pensile: 'Attento! Dal pensile possono cadere le tazze.',
          finestra: 'Attento! I vetri della finestra possono rompersi.'
        }
      },
      {
        label: '🏫 A scuola',
        html: SCENA_SCUOLA,
        giusto: 'banco',
        tipGiusto: 'Perfetto! Sotto il banco sei protetta.',
        tipSbagliato: {
          lampadario: 'Attenta! Il lampadario può cadere.',
          vetrata: 'Attenta! Le vetrate possono rompersi.'
        }
      },
      {
        label: '🌳 In giardino',
        html: SCENA_GIARDINO,
        giusto: 'prato',
        tipGiusto: 'Sì! Nel prato aperto, lontano da muri e alberi, sei al sicuro.',
        tipSbagliato: {
          albero: 'Attenta! Un ramo dell\'albero può cadere.',
          muro: 'Attenta! Il muro può sgretolarsi.'
        }
      }
    ];

    var idx = 0, errori = 0, locked = false;
    var container = document.getElementById('scena-container');
    var labelEl = document.getElementById('scena-label');
    var feedback = document.getElementById('feedback');
    var endScreen = document.getElementById('end');
    var progressBolli = document.querySelectorAll('#progress .bollino');

    function mostraScena(){
      locked = false;
      var s = SCENE[idx];
      labelEl.textContent = s.label;
      container.innerHTML = s.html;
      feedback.textContent = 'Trema la terra! Trova il posto sicuro.';
      feedback.style.color = 'var(--inf-testo)';

      // Shake scene
      setTimeout(function(){
        var svg = container.querySelector('svg');
        if (svg) svg.classList.add('shake');
        if (window.AudioSintetico){
          window.AudioSintetico.init();
          window.AudioSintetico.tono({freq: 80, durata: 0.4, gain: 0.25});
          setTimeout(function(){ window.AudioSintetico.tono({freq: 60, durata: 0.4, gain: 0.25}); }, 300);
        }
      }, 200);

      container.querySelectorAll('.spot').forEach(function(spot){
        spot.addEventListener('click', function(){ scegli(spot, s); });
        spot.addEventListener('keydown', function(e){
          if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); scegli(spot, s); }
        });
      });
    }

    function scegli(spot, s){
      if (locked) return;
      var pos = spot.getAttribute('data-pos');
      if (pos === s.giusto){
        locked = true;
        spot.classList.add('right-flash');
        feedback.style.color = '#0f5132';
        feedback.textContent = '✅ ' + s.tipGiusto;
        if (window.AudioSintetico) window.AudioSintetico.dingPositivo();
        progressBolli[idx].classList.add('on');
        progressBolli[idx].innerHTML = '<i class="bi bi-check-lg"></i>';
        setTimeout(function(){
          idx++;
          if (idx >= SCENE.length) fine();
          else mostraScena();
        }, 2200);
      } else {
        spot.classList.add('wrong-flash');
        feedback.style.color = '#8B1F2E';
        feedback.textContent = '🐢 ' + (s.tipSbagliato[pos] || 'Riprova!');
        errori++;
        if (window.AudioSintetico) window.AudioSintetico.tonoNeutro();
        setTimeout(function(){ spot.classList.remove('wrong-flash'); }, 900);
      }
    }

    function fine(){
      endScreen.classList.remove('hide');
      document.querySelector('.inf-card:not(.inf-end)').classList.add('hide');
      if (window.AudioSintetico){
        window.AudioSintetico.tono({freq:523,durata:.2});
        setTimeout(function(){ window.AudioSintetico.tono({freq:659,durata:.2}); },200);
        setTimeout(function(){ window.AudioSintetico.tono({freq:784,durata:.3}); },400);
      }
      var punti = Math.max(1, SCENE.length - Math.floor(errori/2));
      if (window.GiochiUtil) window.GiochiUtil.salvaEMostraAttestato('rifugio-tina', punti, SCENE.length, '#end');
    }

    document.getElementById('restart').addEventListener('click', function(){
      idx = 0; errori = 0;
      endScreen.classList.add('hide');
      document.querySelector('.inf-card.hide')?.classList.remove('hide');
      progressBolli.forEach(function(b,i){ b.classList.remove('on'); b.textContent = (i+1); });
      mostraScena();
    });

    mostraScena();
  })();
  </script>
</body>
</html>
