<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lo Zaino di Tina — Giochi Piccoli Esploratori</title>
  <meta name="description" content="Tocca le cose giuste da mettere nello zaino dell'emergenza. Gioco per bambini dai 3 ai 6 anni.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
  <link rel="stylesheet" href="/giochi/assets/css/giochi.css">
  <link rel="stylesheet" href="/giochi/infanzia/assets/infanzia.css">
  <style>
    .zaino-wrap { display:flex; justify-content:center; margin-bottom: 1rem; }
    .zaino-wrap svg { max-width: 200px; height:auto; }
    .oggetti-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      max-width: 520px;
      margin: 0 auto;
    }
    .oggetto-btn {
      border: 4px solid #fff;
      border-radius: 18px;
      background: #fff;
      padding: .6rem;
      min-height: 120px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,.15);
      transition: transform .15s;
    }
    .oggetto-btn:hover, .oggetto-btn:focus-visible {
      transform: translateY(-4px);
      border-color: var(--inf-blu);
      outline: none;
    }
    .oggetto-btn svg { width: 72px; height: 72px; }
    .oggetto-btn.giusto {
      animation: vola-in-zaino .8s ease-out forwards;
      pointer-events: none;
    }
    .oggetto-btn.sbagliato {
      animation: shake-no .4s;
      border-color: var(--inf-rosso);
    }
    @keyframes vola-in-zaino {
      0% { transform: scale(1); opacity:1; }
      60% { transform: scale(1.15) translateY(-60px); opacity:.7; }
      100% { transform: scale(.2) translateY(-180px); opacity:0; }
    }
    @keyframes shake-no {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .progress-bolli {
      display:flex; justify-content:center; gap:.5rem; margin-bottom:.8rem;
    }
    .bollino {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #cfd8e3; background: #fff;
      display: inline-flex; align-items:center; justify-content:center;
      color: #fff; font-weight: 800;
    }
    .bollino.on { background: var(--inf-verde); border-color: var(--inf-verde); }
    @media (prefers-reduced-motion: reduce) {
      .oggetto-btn.giusto { animation: none; opacity: 0; }
      .oggetto-btn.sbagliato { animation: none; border-color: var(--inf-rosso); }
    }
  </style>
</head>
<body class="inf-body">
  <main id="main-content" tabindex="-1" class="inf-main">
    <nav aria-label="Percorso">
      <a href="../index.html" class="inf-back"><i class="bi bi-arrow-left" aria-hidden="true"></i> Torna ai giochi</a>
    </nav>
    <div class="inf-home">
      <h1>Lo Zaino di Tina</h1>
      <p>Tocca le cose <strong>giuste</strong> da mettere nello zaino dell'emergenza.</p>
    </div>

    <div class="inf-card">
      <div class="zaino-wrap">
        <!-- Zaino con Tina -->
        <svg viewBox="0 0 220 220" role="img" aria-label="Zaino di Tina" focusable="false">
          <ellipse cx="110" cy="205" rx="85" ry="7" fill="rgba(0,0,0,0.08)"/>
          <!-- Spalline -->
          <path d="M 60 60 Q 50 30 90 30" stroke="#2F5A25" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M 160 60 Q 170 30 130 30" stroke="#2F5A25" stroke-width="6" fill="none" stroke-linecap="round"/>
          <!-- Corpo zaino -->
          <rect x="40" y="60" width="140" height="140" rx="22" fill="#4E8B3E" stroke="#2F5A25" stroke-width="3"/>
          <!-- Tasca -->
          <rect x="60" y="120" width="100" height="55" rx="12" fill="#3E7030" stroke="#2F5A25" stroke-width="2.5"/>
          <circle cx="110" cy="147" r="6" fill="#F4B700" stroke="#2F5A25" stroke-width="2"/>
          <!-- Testa Tina che spunta -->
          <circle cx="110" cy="58" r="22" fill="#8ABF78" stroke="#2F5A25" stroke-width="2.5"/>
          <circle cx="103" cy="55" r="3" fill="#17324D"/>
          <circle cx="117" cy="55" r="3" fill="#17324D"/>
          <path d="M 104 66 Q 110 70 116 66" stroke="#17324D" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Casco rosso -->
          <path d="M 88 48 Q 110 32 132 48 L 132 52 L 88 52 Z" fill="#D9364F" stroke="#8B1F2E" stroke-width="2"/>
          <!-- Croce bianca protezione civile -->
          <rect x="100" y="155" width="20" height="6" fill="#fff"/>
          <rect x="107" y="148" width="6" height="20" fill="#fff"/>
        </svg>
      </div>

      <div class="progress-bolli" id="progress" aria-label="Oggetti messi nello zaino">
        <span class="bollino">1</span>
        <span class="bollino">2</span>
        <span class="bollino">3</span>
        <span class="bollino">4</span>
        <span class="bollino">5</span>
      </div>

      <div id="round-label" class="text-center h5 mb-3" aria-live="polite">Tocca la cosa giusta!</div>

      <div class="oggetti-grid" id="grid" role="group" aria-label="Oggetti da scegliere"></div>

      <div id="feedback" class="text-center mt-3 h5" aria-live="polite" style="min-height:2rem;"></div>
    </div>

    <div id="end" class="inf-card inf-end hide">
      <div class="bravi">Bravissimo!</div>
      <p class="h5 mb-3">Lo zaino di Tina è pronto per l'emergenza!</p>
      <p class="text-muted small">Insieme a un grande, puoi preparare anche il tuo zaino di casa.</p>
      <div class="attestato-inject my-3"></div>
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <button id="restart" class="inf-big-btn" style="background:var(--inf-blu);"><i class="bi bi-arrow-repeat"></i> Ancora</button>
        <a href="../index.html" class="inf-back"><i class="bi bi-arrow-left"></i> Altri giochi</a>
      </div>
    </div>
  </main>

  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="/giochi/assets/js/progressione.js"></script>
  <script src="/giochi/assets/js/attestato.js"></script>
  <script src="/giochi/assets/js/audio-sintetico.js"></script>
  <script src="/giochi/assets/js/comune.js"></script>
  <script>
  (function(){
    // SVG inline per ogni oggetto (right e wrong)
    var SVG = {
      casco: '<svg viewBox="0 0 80 80"><path d="M 10 50 Q 40 15 70 50 L 70 58 L 10 58 Z" fill="#D9364F" stroke="#8B1F2E" stroke-width="3"/><rect x="36" y="28" width="8" height="26" fill="#fff" stroke="#8B1F2E" stroke-width="2"/><rect x="28" y="36" width="24" height="8" fill="#fff" stroke="#8B1F2E" stroke-width="2"/></svg>',
      torcia: '<svg viewBox="0 0 80 80"><rect x="30" y="30" width="20" height="42" rx="4" fill="#3E7BC8" stroke="#17324D" stroke-width="3"/><path d="M 28 30 L 52 30 L 58 12 L 22 12 Z" fill="#F4B700" stroke="#17324D" stroke-width="3"/><circle cx="40" cy="50" r="4" fill="#F4B700"/></svg>',
      giacchetto: '<svg viewBox="0 0 80 80"><path d="M 18 22 L 40 12 L 62 22 L 62 70 L 18 70 Z" fill="#F4B700" stroke="#a67a00" stroke-width="3"/><path d="M 40 12 L 40 70" stroke="#a67a00" stroke-width="3"/><rect x="26" y="40" width="10" height="4" fill="#fff" stroke="#a67a00"/><rect x="44" y="40" width="10" height="4" fill="#fff" stroke="#a67a00"/></svg>',
      acqua: '<svg viewBox="0 0 80 80"><rect x="26" y="18" width="28" height="54" rx="6" fill="#9ED8FF" stroke="#17324D" stroke-width="3"/><rect x="30" y="8" width="20" height="12" rx="3" fill="#3E7BC8" stroke="#17324D" stroke-width="2"/><rect x="30" y="32" width="20" height="16" fill="#fff" stroke="#17324D" stroke-width="1.5"/><text x="40" y="44" font-size="10" font-weight="800" fill="#17324D" text-anchor="middle">H₂O</text></svg>',
      coperta: '<svg viewBox="0 0 80 80"><rect x="12" y="20" width="56" height="42" rx="4" fill="#D9364F" stroke="#8B1F2E" stroke-width="3"/><path d="M 12 28 L 68 28 M 12 40 L 68 40 M 12 52 L 68 52" stroke="#fff" stroke-width="2"/><path d="M 68 20 L 68 62 L 58 58 L 58 16 Z" fill="#8B1F2E"/></svg>',
      // sbagliati
      caramelle: '<svg viewBox="0 0 80 80"><ellipse cx="40" cy="40" rx="18" ry="10" fill="#F4B700" stroke="#a67a00" stroke-width="3"/><path d="M 22 40 L 6 32 L 6 48 Z" fill="#D9364F" stroke="#8B1F2E" stroke-width="2"/><path d="M 58 40 L 74 32 L 74 48 Z" fill="#D9364F" stroke="#8B1F2E" stroke-width="2"/></svg>',
      videogioco: '<svg viewBox="0 0 80 80"><rect x="12" y="24" width="56" height="32" rx="6" fill="#333" stroke="#000" stroke-width="3"/><rect x="22" y="32" width="20" height="16" fill="#9ED8FF" stroke="#000"/><circle cx="52" cy="36" r="3" fill="#D9364F"/><circle cx="58" cy="42" r="3" fill="#4E8B3E"/><circle cx="52" cy="48" r="3" fill="#F4B700"/></svg>',
      tv: '<svg viewBox="0 0 80 80"><rect x="10" y="18" width="60" height="40" rx="4" fill="#333" stroke="#000" stroke-width="3"/><rect x="16" y="24" width="48" height="28" fill="#9ED8FF"/><rect x="30" y="58" width="20" height="4" fill="#555"/><rect x="22" y="62" width="36" height="4" rx="2" fill="#333"/></svg>',
      peluche: '<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="22" fill="#b48a6e" stroke="#6b4a35" stroke-width="3"/><circle cx="24" cy="24" r="8" fill="#b48a6e" stroke="#6b4a35" stroke-width="2.5"/><circle cx="56" cy="24" r="8" fill="#b48a6e" stroke="#6b4a35" stroke-width="2.5"/><circle cx="33" cy="36" r="3" fill="#17324D"/><circle cx="47" cy="36" r="3" fill="#17324D"/><circle cx="40" cy="44" r="3" fill="#17324D"/><path d="M 34 50 Q 40 56 46 50" stroke="#17324D" stroke-width="2" fill="none" stroke-linecap="round"/></svg>',
      cuscino: '<svg viewBox="0 0 80 80"><rect x="10" y="22" width="60" height="40" rx="10" fill="#c7d9ff" stroke="#17324D" stroke-width="3"/><path d="M 18 30 Q 24 34 30 30 M 40 30 Q 46 34 52 30" stroke="#17324D" stroke-width="1.5" fill="none"/></svg>',
      pallone: '<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="24" fill="#fff" stroke="#17324D" stroke-width="3"/><path d="M 40 16 L 48 32 L 40 40 L 32 32 Z M 40 40 L 56 44 L 52 60 L 40 56 Z M 40 40 L 24 44 L 28 60 L 40 56 Z" fill="#17324D"/></svg>'
    };
    var ROUNDS = [
      { giusto: {id:'casco', nome:'casco'}, sbagliati: [{id:'caramelle',nome:'caramelle'},{id:'tv',nome:'televisore'}], tip: 'Il casco protegge la testa!' },
      { giusto: {id:'torcia', nome:'torcia'}, sbagliati: [{id:'videogioco',nome:'videogioco'},{id:'pallone',nome:'pallone'}], tip: 'La torcia fa luce se va via la corrente!' },
      { giusto: {id:'acqua', nome:"bottiglia d'acqua"}, sbagliati: [{id:'peluche',nome:'peluche'},{id:'caramelle',nome:'caramelle'}], tip: "L'acqua è sempre importante!" },
      { giusto: {id:'giacchetto', nome:'giacchetto giallo'}, sbagliati: [{id:'cuscino',nome:'cuscino'},{id:'tv',nome:'televisore'}], tip: 'Il giacchetto giallo ti rende ben visibile!' },
      { giusto: {id:'coperta', nome:'coperta'}, sbagliati: [{id:'pallone',nome:'pallone'},{id:'videogioco',nome:'videogioco'}], tip: 'La coperta scalda se fa freddo!' }
    ];

    var grid = document.getElementById('grid');
    var roundLabel = document.getElementById('round-label');
    var feedback = document.getElementById('feedback');
    var endScreen = document.getElementById('end');
    var progressBolli = document.querySelectorAll('#progress .bollino');
    var idx = 0;
    var errori = 0;

    function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t;} return a; }

    function mostraRound(){
      grid.innerHTML = '';
      feedback.textContent = '';
      var r = ROUNDS[idx];
      var items = [{id:r.giusto.id,nome:r.giusto.nome,ok:true}]
        .concat(r.sbagliati.map(function(s){return {id:s.id,nome:s.nome,ok:false};}));
      shuffle(items);
      roundLabel.textContent = 'Quale serve in emergenza?';
      items.forEach(function(it){
        var btn = document.createElement('button');
        btn.className = 'oggetto-btn';
        btn.setAttribute('type','button');
        btn.setAttribute('aria-label', it.nome);
        btn.innerHTML = SVG[it.id] || '';
        btn.addEventListener('click', function(){ scegli(btn, it, r); });
        grid.appendChild(btn);
      });
    }

    function scegli(btn, it, r){
      if (window.AudioSintetico) window.AudioSintetico.init();
      if (it.ok){
        btn.classList.add('giusto');
        feedback.style.color = '#0f5132';
        feedback.textContent = '✅ ' + r.tip;
        if (window.AudioSintetico) window.AudioSintetico.dingPositivo();
        progressBolli[idx].classList.add('on');
        progressBolli[idx].innerHTML = '<i class="bi bi-check-lg"></i>';
        setTimeout(function(){
          idx++;
          if (idx >= ROUNDS.length) fine();
          else mostraRound();
        }, 1800);
      } else {
        btn.classList.add('sbagliato');
        feedback.style.color = '#8B1F2E';
        feedback.textContent = '🐢 Questo non serve in emergenza. Riprova!';
        errori++;
        if (window.AudioSintetico) window.AudioSintetico.tonoNeutro();
        setTimeout(function(){ btn.classList.remove('sbagliato'); }, 500);
      }
    }

    function fine(){
      endScreen.classList.remove('hide');
      document.querySelector('.inf-card:not(.inf-end)').classList.add('hide');
      if (window.AudioSintetico){
        window.AudioSintetico.tono({freq:523,durata:.2});
        setTimeout(function(){ window.AudioSintetico.tono({freq:659,durata:.2}); },200);
        setTimeout(function(){ window.AudioSintetico.tono({freq:784,durata:.3}); },400);
      }
      var punti = Math.max(1, ROUNDS.length - Math.floor(errori/2));
      if (window.GiochiUtil) window.GiochiUtil.salvaEMostraAttestato('vesti-tina', punti, ROUNDS.length, '#end');
    }

    document.getElementById('restart').addEventListener('click', function(){
      idx = 0; errori = 0;
      endScreen.classList.add('hide');
      document.querySelector('.inf-card.hide')?.classList.remove('hide');
      progressBolli.forEach(function(b,i){ b.classList.remove('on'); b.textContent = (i+1); });
      mostraRound();
    });

    mostraRound();
  })();
  </script>
</body>
</html>
