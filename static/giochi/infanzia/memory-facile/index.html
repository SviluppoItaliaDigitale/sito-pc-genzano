<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Facile — Giochi Piccoli Esploratori</title>
  <meta name="description" content="Memory con 3 livelli (3, 4, 6 coppie) illustrato sulla protezione civile. Gioco semplice per bambini dai 3 ai 6 anni.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
  <link rel="stylesheet" href="/giochi/assets/css/giochi.css">
  <link rel="stylesheet" href="/giochi/infanzia/assets/infanzia.css">
  <link rel="stylesheet" href="/giochi/assets/css/coach.css">
  <link rel="stylesheet" href="/giochi/assets/css/tts-bambini.css">
  <style>
    .mem-grid {
      display: grid; gap: .75rem;
      max-width: 480px; margin: 0 auto;
    }
    .mem-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .mem-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .level-badge {
      display: inline-block; background: var(--inf-blu); color: #fff;
      padding: .35rem .9rem; border-radius: 999px;
      font-weight: 800; font-size: 1rem; margin-bottom: .5rem;
    }
    .level-up {
      text-align: center; padding: 1.5rem 1rem;
      background: linear-gradient(135deg, #fff8d6, #ffe4b5);
      border: 4px solid #F4B700; border-radius: 22px;
    }
    .level-up .stelle { font-size: 2.5rem; line-height: 1; margin-bottom: .5rem; }
    .level-up .titolo { color: var(--inf-blu); font-weight: 800; font-size: 1.6rem; margin-bottom: .3rem; }
    .mem-card {
      aspect-ratio: 1; border-radius: 18px; cursor: pointer;
      perspective: 800px; background: transparent; border: 0; padding: 0;
    }
    .mem-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform .5s; transform-style: preserve-3d;
    }
    .mem-card.flipped .mem-inner, .mem-card.matched .mem-inner {
      transform: rotateY(180deg);
    }
    .mem-face {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 18px; backface-visibility: hidden;
      font-size: 3rem;
    }
    .mem-front {
      background: linear-gradient(135deg, var(--inf-blu), #2a5ea6);
      color: #fff;
      box-shadow: 0 4px 0 rgba(0,0,0,.2);
    }
    .mem-back {
      background: #fff; border: 3px solid var(--inf-blu);
      transform: rotateY(180deg);
    }
    .mem-card.matched .mem-back { background: #d1e7dd; border-color: var(--inf-verde); }
    .tina-perche {
      background: #d1e7dd; border: 2px solid #198754;
      border-radius: 18px; padding: .8rem 1rem;
      font-size: 1rem; font-weight: 600; color: #0f5132;
      text-align: center; margin: 1rem 0 0;
      animation: perche-in .35s ease;
    }
    .tina-perche.hide { display: none !important; }
    @keyframes perche-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .tina-perche { animation: none; }
    }
  </style>
</head>
<body class="inf-body" data-coach-game="memory-facile">
  <main id="main-content" tabindex="-1" class="inf-main">
    <nav aria-label="Percorso">
      <a href="../index.html" class="inf-back"><i class="bi bi-arrow-left"></i> Torna ai giochi</a>
    </nav>
    <div class="inf-home">
      <h1>Memory Facile</h1>
      <p>Trova tutte le coppie uguali in <strong>3 livelli</strong>!</p>
    </div>

    <div class="inf-card" id="game-card">
      <div class="text-center mb-2">
        <span class="level-badge" id="level-badge">Livello 1 di 3</span>
      </div>
      <div class="text-center mb-3">
        <span class="inf-score"><i class="bi bi-heart-fill"></i> Coppie: <span id="count">0</span> / <span id="total">3</span></span>
      </div>
      <div id="grid" class="mem-grid cols-3" role="group" aria-label="Griglia del memory"></div>
      <div id="perche" class="tina-perche hide" aria-live="polite"></div>
      <div class="tts-bambini-wrap">
        <button type="button" class="tts-bambini-btn" data-tts="Trova le coppie uguali. Tocca due carte." aria-label="Ascolta come si gioca">Ascolta</button>
      </div>
    </div>

    <div id="level-up" class="inf-card hide">
      <div class="level-up">
        <div class="stelle">⭐⭐⭐</div>
        <div class="titolo" id="level-up-titolo">Livello 1 superato!</div>
        <p class="mb-3" id="level-up-msg">Pronto per il livello 2?</p>
        <button id="next-level" class="inf-big-btn" style="background:var(--inf-blu);"><i class="bi bi-arrow-right"></i> Livello successivo</button>
      </div>
    </div>

    <div id="end" class="inf-card inf-end hide">
      <div class="bravi">Evviva!</div>
      <p class="h5 mb-3">Hai superato tutti i 3 livelli!</p>
      <p class="text-muted small">Hai trovato 13 coppie in totale. Sei un piccolo campione di memoria!</p>
      <div class="attestato-inject my-3"></div>
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <button id="restart" class="inf-big-btn" style="background:var(--inf-blu);"><i class="bi bi-arrow-repeat"></i> Ancora</button>
        <a href="../index.html" class="inf-back"><i class="bi bi-arrow-left"></i> Altri giochi</a>
      </div>
    </div>
  </main>

  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="/giochi/assets/js/progressione.js"></script>
  <script src="/giochi/assets/js/attestato.js"></script>
  <script src="/giochi/assets/js/audio-sintetico.js"></script>
  <script src="/giochi/assets/js/comune.js"></script>
  <script>
  (function(){
    var ICONE_TOTALI = [
      { emo: '🚑', lbl: 'ambulanza',  perche: "L'ambulanza porta in ospedale chi sta male." },
      { emo: '🚒', lbl: 'pompieri',   perche: 'I pompieri spengono il fuoco e salvano le persone.' },
      { emo: '⛑️', lbl: 'casco',     perche: 'Il casco protegge la testa dei volontari.' },
      { emo: '🔦', lbl: 'torcia',     perche: 'La torcia fa luce quando manca la corrente.' },
      { emo: '🧯', lbl: 'estintore',  perche: "L'estintore spegne le piccole fiamme. Solo i grandi lo usano." },
      { emo: '🚓', lbl: 'polizia',    perche: 'La polizia aiuta a tenere tutti al sicuro.' },
      { emo: '⚠️', lbl: 'attenzione', perche: 'Il triangolo giallo dice: stai attento, c\'è un pericolo!' },
      { emo: '🚪', lbl: 'uscita',     perche: "L'uscita di emergenza è la strada per uscire in sicurezza." },
      { emo: '📞', lbl: 'telefono',   perche: 'Per chiamare aiuto in Italia si fa il 1-1-2.' }
    ];
    var LIVELLI = [
      { coppie: 3, cols: 3 },
      { coppie: 4, cols: 4 },
      { coppie: 6, cols: 4 }
    ];

    var grid = document.getElementById('grid');
    var gameCard = document.getElementById('game-card');
    var levelUpCard = document.getElementById('level-up');
    var levelUpTitolo = document.getElementById('level-up-titolo');
    var levelUpMsg = document.getElementById('level-up-msg');
    var endScreen = document.getElementById('end');
    var countEl = document.getElementById('count');
    var totalEl = document.getElementById('total');
    var levelBadge = document.getElementById('level-badge');
    var btnNext = document.getElementById('next-level');

    var first = null, lock = false, matched = 0;
    var livello = 0;
    var iconeLivello = [];
    var totaleCoppie = 0;

    function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t;} return a; }

    function avviaLivello(){
      var cfg = LIVELLI[livello];
      iconeLivello = shuffle(ICONE_TOTALI.slice()).slice(0, cfg.coppie);
      grid.className = 'mem-grid cols-' + cfg.cols;
      grid.innerHTML = '';
      matched = 0; first = null; lock = false;
      countEl.textContent = '0';
      totalEl.textContent = cfg.coppie;
      levelBadge.textContent = 'Livello ' + (livello + 1) + ' di ' + LIVELLI.length;
      gameCard.classList.remove('hide');
      levelUpCard.classList.add('hide');
      endScreen.classList.add('hide');
      var cards = shuffle(iconeLivello.concat(iconeLivello));
      cards.forEach(function(c){
        var btn = document.createElement('button');
        btn.className = 'mem-card';
        btn.setAttribute('type','button');
        btn.setAttribute('aria-label','Carta coperta');
        btn.dataset.lbl = c.lbl;
        btn.innerHTML = '<div class="mem-inner"><div class="mem-face mem-front"><i class="bi bi-question-lg"></i></div><div class="mem-face mem-back">' + c.emo + '</div></div>';
        btn.addEventListener('click', function(){ flip(btn, c); });
        grid.appendChild(btn);
      });
    }

    function flip(btn, c){
      if (lock) return;
      if (btn.classList.contains('flipped') || btn.classList.contains('matched')) return;
      btn.classList.add('flipped');
      btn.setAttribute('aria-label', c.lbl);
      if (window.AudioSintetico) { window.AudioSintetico.init(); window.AudioSintetico.tono({freq: 440, durata: 0.1, gain: 0.15}); }
      if (!first){ first = {btn: btn, lbl: c.lbl}; return; }
      // Nasconde "perche" precedente quando si gira la seconda carta del turno
      var perBox = document.getElementById('perche');
      if (perBox) { perBox.classList.add('hide'); perBox.textContent = ''; }
      if (first.lbl === c.lbl){
        first.btn.classList.add('matched');
        btn.classList.add('matched');
        matched++;
        totaleCoppie++;
        countEl.textContent = matched;
        if (window.AudioSintetico) window.AudioSintetico.dingPositivo();
        // Mostra spiegazione didattica della coppia trovata (1 frase per
        // bambini 3-6 anni). Resta visibile fino alla prossima carta girata.
        var perEl = document.getElementById('perche');
        if (perEl && c.perche) {
          perEl.textContent = '💡 ' + c.emo + ' ' + c.perche;
          perEl.classList.remove('hide');
        }
        first = null;
        if (matched === iconeLivello.length) setTimeout(fineLivello, 1800);
      } else {
        lock = true;
        var f = first;
        setTimeout(function(){
          f.btn.classList.remove('flipped');
          btn.classList.remove('flipped');
          f.btn.setAttribute('aria-label','Carta coperta');
          btn.setAttribute('aria-label','Carta coperta');
          first = null; lock = false;
        }, 1200);
      }
    }

    function fineLivello(){
      if (livello < LIVELLI.length - 1) {
        gameCard.classList.add('hide');
        levelUpCard.classList.remove('hide');
        levelUpTitolo.textContent = 'Livello ' + (livello + 1) + ' superato!';
        var prossime = LIVELLI[livello + 1].coppie;
        levelUpMsg.textContent = 'Ora ti aspettano ' + prossime + ' coppie. Pronto per il livello ' + (livello + 2) + '?';
        if (window.AudioSintetico){
          window.AudioSintetico.tono({freq:523,durata:.15});
          setTimeout(function(){ window.AudioSintetico.tono({freq:659,durata:.15}); },180);
          setTimeout(function(){ window.AudioSintetico.tono({freq:784,durata:.25}); },360);
        }
      } else {
        finish();
      }
    }

    function finish(){
      gameCard.classList.add('hide');
      levelUpCard.classList.add('hide');
      endScreen.classList.remove('hide');
      if (window.AudioSintetico){
        window.AudioSintetico.tono({freq:523,durata:.2});
        setTimeout(function(){ window.AudioSintetico.tono({freq:659,durata:.2}); },200);
        setTimeout(function(){ window.AudioSintetico.tono({freq:784,durata:.3}); },400);
      }
      if (window.GiochiUtil) window.GiochiUtil.salvaEMostraAttestato('memory-facile', totaleCoppie, 13, '#end');
    }

    btnNext.addEventListener('click', function(){
      livello++;
      avviaLivello();
    });

    document.getElementById('restart').addEventListener('click', function(){
      livello = 0;
      totaleCoppie = 0;
      avviaLivello();
    });

    avviaLivello();
  })();
  </script>
  <script src="/giochi/assets/js/tts-bambini.js" defer></script>
  <script src="/giochi/assets/js/coach.js" defer></script>
</body>
</html>
