<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Cameretta giochi alternativa con rischi da trovare</title>
  <!-- Pavimento -->
  <rect x="0" y="370" width="800" height="130" fill="#d4c4a8"/>
  <!-- Parete -->
  <rect x="0" y="0" width="800" height="370" fill="#f0e8f0"/>
  <!-- Battiscopa -->
  <rect x="0" y="365" width="800" height="8" fill="#8b6914"/>
  <!-- RISCHIO: Lampadina che scotta (top 36.69%, left 27.54%) — posizione ~220,183 -->
  <rect x="216" y="155" width="8" height="60" fill="#c0c0c0"/>
  <path d="M198,155 L242,155 L236,130 L204,130 Z" fill="#ffeb3b"/>
  <circle cx="220" cy="145" r="10" fill="#fff9c4"/>
  <line x1="220" y1="127" x2="220" y2="118" stroke="#ffd600" stroke-width="2"/>
  <line x1="206" y1="133" x2="200" y2="126" stroke="#ffd600" stroke-width="2"/>
  <line x1="234" y1="133" x2="240" y2="126" stroke="#ffd600" stroke-width="2"/>
  <!-- RISCHIO: Finestra aperta (top 61.22%, left 36.36%) — posizione ~291,306 -->
  <rect x="220" y="180" width="140" height="160" fill="#87ceeb" stroke="#8b6914" stroke-width="4"/>
  <line x1="290" y1="180" x2="290" y2="340" stroke="#8b6914" stroke-width="3"/>
  <!-- Anta aperta -->
  <path d="M220,180 L220,340 L260,330 L260,190 Z" fill="#c4e0f0" stroke="#8b6914" stroke-width="2" opacity="0.7"/>
  <!-- Vento -->
  <path d="M290,250 Q310,245 320,260" stroke="#90caf9" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- RISCHIO: Spigoli appuntiti (top 75.08%, left 43.8%) — posizione ~350,375 -->
  <!-- Tavolo basso -->
  <rect x="310" y="340" width="100" height="8" fill="#8b6914"/>
  <rect x="315" y="348" width="8" height="40" fill="#705010"/>
  <rect x="398" y="348" width="8" height="40" fill="#705010"/>
  <!-- Spigolo evidenziato -->
  <circle cx="310" cy="344" r="4" fill="#8b6914"/>
  <!-- RISCHIO: Scivolo pericoloso (top 57.81%, left 82.21%) — posizione ~658,289 -->
  <rect x="620" y="200" width="20" height="180" fill="#e04040"/>
  <path d="M640,200 L740,370 L740,380 L640,210 Z" fill="#e04040"/>
  <rect x="620" y="195" width="25" height="10" rx="3" fill="#c03030"/>
  <!-- Scalini scivolo -->
  <rect x="610" y="340" width="15" height="8" fill="#c03030"/>
  <rect x="610" y="310" width="15" height="8" fill="#c03030"/>
  <rect x="610" y="280" width="15" height="8" fill="#c03030"/>
  <!-- RISCHIO: Giochi sparsi (top 84.26%, left 21.03%) — posizione ~168,421 -->
  <rect x="130" y="395" width="25" height="25" rx="3" fill="#4090e0"/>
  <circle cx="180" cy="415" r="12" fill="#e04040"/>
  <rect x="195" y="405" width="30" height="15" rx="2" fill="#f0c040" transform="rotate(-10,210,412)"/>
  <polygon points="145,430 155,410 165,430" fill="#40c040"/>
  <circle cx="210" cy="440" r="8" fill="#c070c0"/>
  <!-- Letto -->
  <rect x="430" y="100" width="180" height="100" rx="5" fill="#7b96b0"/>
  <rect x="430" y="90" width="180" height="20" rx="3" fill="#5a7590"/>
  <rect x="425" y="80" width="10" height="125" fill="#5a3a1a"/>
  <rect x="605" y="80" width="10" height="125" fill="#5a3a1a"/>
  <rect x="440" y="120" width="160" height="70" rx="3" fill="#90b0c8"/>
  <ellipse cx="480" cy="112" rx="30" ry="10" fill="#fff"/>
  <!-- Scaffale -->
  <rect x="50" y="80" width="120" height="150" fill="#d4a574" stroke="#8b6914" stroke-width="2"/>
  <rect x="50" y="130" width="120" height="5" fill="#8b6914"/>
  <rect x="50" y="180" width="120" height="5" fill="#8b6914"/>
  <circle cx="80" cy="105" r="12" fill="#e07050"/>
  <rect x="110" y="95" width="20" height="28" rx="2" fill="#5090c0"/>
  <rect x="60" y="140" width="40" height="35" rx="3" fill="#40c040"/>
  <circle cx="140" cy="160" r="10" fill="#f0c040"/>
  <rect x="60" y="190" width="25" height="30" rx="2" fill="#c070c0"/>
  <rect x="100" y="195" width="30" height="25" rx="2" fill="#e0a040"/>
</svg>
