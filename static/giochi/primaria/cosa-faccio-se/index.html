<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cosa Faccio Se... — Giochi Protezione Civile</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="stylesheet" href="/vendor/bootstrap-italia/css/bootstrap-italia.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="stylesheet" href="/app-shared/app-common.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="app-page-hero">
      <div class="container">
        <nav aria-label="Percorso">
          <ol class="breadcrumb mb-2">
            <li class="breadcrumb-item"><a href="/">Home</a></li>
            <li class="breadcrumb-item"><a href="/formazione/">Formazione</a></li>
            <li class="breadcrumb-item"><a href="/giochi/">Giochi della Sicurezza</a></li>
            <li class="breadcrumb-item"><a href="../index.html">Scuola Primaria</a></li>
            <li class="breadcrumb-item active" aria-current="page">Cosa Faccio Se...</li>
          </ol>
        </nav>
        <h1>Cosa Faccio Se...</h1>
      </div>
    </div>
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="game-container">
            <div id="select-screen">
              <p class="lead text-center mb-4">Scegli una situazione di emergenza e scopri se sai fare le scelte giuste!</p>
              <div id="scenario-list" class="row g-3 justify-content-center"></div>
              <div class="text-center mt-3">
                <a href="../index.html" class="app-back-link"><i class="bi bi-arrow-left" aria-hidden="true"></i> Torna ai giochi</a>
              </div>
            </div>
            <div id="story-screen" class="hide">
              <div class="story-header mb-3">
                <span id="scenario-badge" class="badge bg-primary"></span>
                <span class="ms-2 text-muted small">Passo <span id="step-num">1</span></span>
              </div>
              <div id="story-card" class="story-card">
                <p id="story-text" class="story-text"></p>
              </div>
              <div id="choices-container"></div>
              <div id="story-feedback" class="story-feedback hide" aria-live="polite"></div>
            </div>
            <div id="end-screen" class="hide text-center">
              <div class="end-icon mb-3"><i class="bi bi-shield-check" aria-hidden="true"></i></div>
              <h2>Ce l'hai fatta!</h2>
              <p id="end-message" class="lead"></p>
              <p class="text-muted">Errori commessi: <strong><span id="end-errors">0</span></strong></p>
              <div class="attestato-inject my-3"></div>
              <div class="d-flex flex-wrap justify-content-center gap-2">
                <button id="another-btn" class="btn btn-primary"><i class="bi bi-arrow-repeat me-1" aria-hidden="true"></i> Altra situazione</button>
                <a href="../index.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1" aria-hidden="true"></i> Torna ai giochi</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/vendor/bootstrap-italia/js/bootstrap-italia.bundle.min.js"></script>
  <script src="/app-shared/site-chrome.js"></script>
  <script src="/giochi/assets/js/progressione.js"></script>
  <script src="/giochi/assets/js/attestato.js"></script>
  <script src="/giochi/assets/js/comune.js"></script>
  <script src="js/script.js" defer></script>
</body>
</html>
