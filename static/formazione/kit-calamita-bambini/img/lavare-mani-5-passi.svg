<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Lavarsi le mani in cinque passi</title>
  <desc id="desc">Scheda illustrata in bianco e nero con cinque passaggi semplici per lavarsi le mani: bagna, sapone, strofina, risciacqua, asciuga.</desc>
  <defs><style>.l{fill:none;stroke:#111;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.s{fill:#fff;stroke:#111;stroke-width:5;stroke-linejoin:round}.t{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#111}.n{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#111;font-size:42px}</style></defs>
  <rect x="35" y="35" width="1130" height="730" rx="28" class="l"/>
  <text x="600" y="90" text-anchor="middle" font-size="42" class="t">LAVO LE MANI IN 5 PASSI</text>
  <text x="600" y="128" text-anchor="middle" font-size="24" class="t">Prima di mangiare, dopo il bagno, quando torno da fuori</text>
  <g transform="translate(85 175)">
    <rect width="310" height="230" rx="18" class="s"/><circle cx="48" cy="48" r="29" class="s"/><text x="48" y="62" text-anchor="middle" class="n">1</text><text x="155" y="48" text-anchor="middle" font-size="28" class="t">BAGNA</text>
