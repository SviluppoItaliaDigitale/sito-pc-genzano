    <path d="M170 75 C145 120 135 150 135 176 C135 214 205 214 205 176 C205 150 195 120 170 75 Z" class="l"/><path d="M92 102 H248" class="l"/><path d="M120 140 Q170 112 220 140" class="l"/><path d="M122 186 Q170 165 218 186" class="l"/>
