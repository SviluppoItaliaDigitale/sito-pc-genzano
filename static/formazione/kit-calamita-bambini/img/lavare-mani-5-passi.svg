    <rect x="105" y="86" width="130" height="90" rx="15" class="l"/><path d="M130 86 V58 H210 V86" class="l"/><circle cx="148" cy="128" r="10" class="l"/><circle cx="190" cy="148" r="13" class="l"/><circle cx="168" cy="170" r="8" class="l"/>
  </g>
  <g transform="translate(805 175)">
    <rect width="310" height="230" rx="18" class="s"/><circle cx="48" cy="48" r="29" class="s"/><text x="48" y="62" text-anchor="middle" class="n">3</text><text x="170" y="48" text-anchor="middle" font-size="28" class="t">STROFINA</text>
