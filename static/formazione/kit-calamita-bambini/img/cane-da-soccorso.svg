  <g aria-label="legenda colori">
    <rect x="145" y="90" width="910" height="80" rx="14" class="thin"/>
    <text x="600" y="122" text-anchor="middle" font-size="28" class="txt">COLORA SEGUENDO I NUMERI</text>
    <text x="600" y="155" text-anchor="middle" font-size="24" class="txt">1 marrone · 2 rosso · 3 blu · 4 nero · 5 giallo</text>
