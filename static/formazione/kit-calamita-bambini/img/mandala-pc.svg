  <text x="600" y="90" text-anchor="middle" font-size="38" class="t">MANDALA DELLA CALMA</text>
  <text x="600" y="130" text-anchor="middle" font-size="24" class="t">Colora piano: respiro, mi calmo, mi sento al sicuro</text>
