<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Mandala della Protezione Civile da colorare</title>
  <desc id="desc">Mandala lineare con simboli semplici della Protezione Civile: sole, tenda, radio, zaino, cuore, casco, casa sicura e punto informazioni.</desc>
  <defs>
    <style>.l{fill:none;stroke:#111;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.t{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#111}.s{fill:#fff;stroke:#111;stroke-width:5;stroke-linejoin:round}</style>
  </defs>
