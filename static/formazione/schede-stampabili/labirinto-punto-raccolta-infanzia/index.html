  <meta name="robots" content="index, follow">

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda gioco-labirinto: trova la strada per il punto di raccolta. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo 'Trova la strada per il punto di raccolta'. Sottotitolo 'Aiuta il bambino a raggiungere il punto di raccolta seguendo la strada giusta e evitando i pericoli'. A sinistra in alto un bambino con zainetto è il punto di partenza. Il labirinto presenta 5 pericoli marcati con una X da evitare: ascensore, fumo, pozzanghera con acqua, albero caduto con rami spezzati, transenne stradali. A destra in basso il cartello 'Punto di raccolta'. Riquadro finale con nuvoletta sorridente e cuore 'Ricorda stai calmo chiedi aiuto e vai sempre in un posto sicuro'. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
