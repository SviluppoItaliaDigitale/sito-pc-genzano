         alt="Scheda da colorare: il mio amico pompiere. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo 'Il mio amico pompiere'. Sottotitolo 'Colora i disegni e conosci il pompiere e i suoi attrezzi'. Sei vignette numerate con gli attrezzi del pompiere: 1) casco con visiera in primo piano; 2) un paio di stivali grandi; 3) giacca da pompiere con strisce riflettenti; 4) pompiere con idrante spegne le fiamme; 5) pompiere salva un bambino tenendolo in braccio; 6) telefono con il numero 112 accanto a un camion dei pompieri. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
