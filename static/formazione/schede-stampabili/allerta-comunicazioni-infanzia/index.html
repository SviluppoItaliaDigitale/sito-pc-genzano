  <div class="scheda-toolbar no-print">

    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: allerta e comunicazioni. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'Allerta e comunicazioni'. Sottotitolo 'Colora i disegni e impara cosa fare in 6 passi facili'. Sei vignette numerate: 1) bambino guarda la TV con un giornalista che mostra il segnale di allerta; 2) bambino guarda uno smartphone con un'icona di altoparlante e il segnale di allerta; 3) bambino con i genitori intorno a una mappa parlano del piano di emergenza familiare; 4) bambino indica una piantina con il piano di evacuazione che mostra vie di fuga e punti di ritrovo; 5) bambino prepara uno zaino con bottiglia d'acqua, torcia, medicine e radio; 6) bambino al telefono con un fumetto che mostra il numero 112. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
