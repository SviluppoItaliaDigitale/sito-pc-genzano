  <title>Scheda da colorare: Pronto soccorso — Infanzia</title>
  <meta name="description" content="Scheda fotocopiabile colorabile per la Scuola dell'Infanzia. 6 disegni line-art con i passi base del pronto soccorso: valutare la situazione, chiamare il 112, controllare coscienza e respiro, pulire una ferita, rassicurare, attendere i soccorsi.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/formazione/schede-stampabili/assets/scheda-print.css">

    body { margin: 0; padding: 0; background: #f4f7fb; }
    .scheda-immagine-wrapper { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }
    .scheda-immagine-wrapper img { width: 100%; height: auto; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-radius: 4px; }
    @media print {
      body { background: #fff; }
      .scheda-immagine-wrapper { max-width: 100%; margin: 0; padding: 0; }
      .scheda-immagine-wrapper img { box-shadow: none; border-radius: 0; width: 100%; height: auto; max-height: 100vh; object-fit: contain; }

    }
  </style>
</head>
<body>
  <div class="scheda-toolbar no-print">
    <a href="/formazione/schede-stampabili/" aria-label="Torna alle schede">← Torna alle schede</a>
    <span class="scheda-titolo">Da colorare: Pronto soccorso — Infanzia</span>
    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: pronto soccorso. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'Pronto soccorso'. Sottotitolo 'Colora i disegni e impara cosa fare in 6 passi facili'. Sei vignette numerate: 1) bambino con una ferita al ginocchio accanto a una cassetta di pronto soccorso; 2) bambino al telefono che chiama il 112; 3) bambina che controlla coscienza e respiro di un altro bambino; 4) due bambini, uno pulisce e fascia con una garza la ferita dell'altro; 5) bambino avvolto in una coperta calda con bottiglia d'acqua; 6) ambulanza che arriva con sirena accesa. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
