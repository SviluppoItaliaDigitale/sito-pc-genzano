<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scheda da colorare: Disegna il tuo aiutante — Infanzia</title>
  <meta name="description" content="Scheda fotocopiabile per la Scuola dell'Infanzia. Silhouette tratteggiata di un volontario di Protezione Civile da ricalcare e completare con occhi, bocca, oggetti in mano e colori, lasciando spazio all'immaginazione del bambino.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/formazione/schede-stampabili/assets/scheda-print.css">
  <style>
    body { margin: 0; padding: 0; background: #f4f7fb; }
    .scheda-immagine-wrapper { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }
    .scheda-immagine-wrapper img { width: 100%; height: auto; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-radius: 4px; }
    @media print {
      body { background: #fff; }
      .scheda-immagine-wrapper { max-width: 100%; margin: 0; padding: 0; }
      .scheda-immagine-wrapper img { box-shadow: none; border-radius: 0; width: 100%; height: auto; max-height: 100vh; object-fit: contain; }
      @page { size: A4 portrait; margin: 8mm; }
    }
  </style>
</head>
<body>
  <div class="scheda-toolbar no-print">
    <a href="/formazione/schede-stampabili/" aria-label="Torna alle schede">← Torna alle schede</a>
    <span class="scheda-titolo">Disegna il tuo aiutante — Infanzia</span>
    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: disegna il tuo aiutante. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'Disegna il tuo aiutante'. Sottotitolo 'Come immagini il volontario che ti aiuta? Disegnalo tu!'. A sinistra una silhouette tratteggiata di un volontario PC da ricalcare e completare: casco con triangolo PC accennato, gilet con scritta PC, occhi suggeriti da piccoli cerchi tratteggiati. A destra quattro ovali etichettati 'Occhi', 'Bocca', 'Cosa tiene in mano?', 'I colori' dove il bambino completa il personaggio con la propria fantasia. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
  </main>
</body>
</html>
