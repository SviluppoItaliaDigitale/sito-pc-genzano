  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

    body { margin: 0; padding: 0; background: #f4f7fb; }
    .scheda-immagine-wrapper { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }
    .scheda-immagine-wrapper img { width: 100%; height: auto; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-radius: 4px; }

      body { background: #fff; }
      .scheda-immagine-wrapper { max-width: 100%; margin: 0; padding: 0; }
      .scheda-immagine-wrapper img { box-shadow: none; border-radius: 0; width: 100%; height: auto; max-height: 100vh; object-fit: contain; }

<body>
  <div class="scheda-toolbar no-print">
    <a href="/formazione/schede-stampabili/" aria-label="Torna alle schede">← Torna alle schede</a>
    <span class="scheda-titolo">Da colorare: I pericoli naturali — Infanzia</span>
    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: i pericoli naturali. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'I pericoli naturali'. Sottotitolo 'Colora i disegni e impara cosa fare in 6 passi facili'. Sei vignette numerate da 1 a 6 con i pericoli naturali raffigurati e descritti: 1) terremoto, la terra trema con una casa e una crepa nel terreno; 2) alluvione, cade molta pioggia e l'acqua sale fino a coprire una casa; 3) frana, la terra e le rocce scivolano giù da una collina; 4) temporale, vento forte, tuoni e fulmini con una nuvola che soffia; 5) eruzione vulcanica, il vulcano sputa lava e cenere; 6) incendio boschivo, il fuoco brucia il bosco di alberi. In basso la dicitura 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
  </main>
