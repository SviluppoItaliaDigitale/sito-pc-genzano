<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scheda da colorare: A scuola in sicurezza — Infanzia</title>
  <meta name="description" content="Scheda fotocopiabile colorabile per la Scuola dell'Infanzia. 6 disegni line-art con le regole per stare a scuola in sicurezza: camminare in fila, ascoltare la maestra, conoscere l'uscita di emergenza, andare al punto di raccolta, non spingere, aiutare i compagni.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/formazione/schede-stampabili/assets/scheda-print.css">
  <style>
    body { margin: 0; padding: 0; background: #f4f7fb; }
    .scheda-immagine-wrapper { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }
    .scheda-immagine-wrapper img { width: 100%; height: auto; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-radius: 4px; }
    @media print {
      body { background: #fff; }
      .scheda-immagine-wrapper { max-width: 100%; margin: 0; padding: 0; }
      .scheda-immagine-wrapper img { box-shadow: none; border-radius: 0; width: 100%; height: auto; max-height: 100vh; object-fit: contain; }
      @page { size: A4 portrait; margin: 8mm; }
    }
  </style>
</head>
<body>
  <div class="scheda-toolbar no-print">
    <a href="/formazione/schede-stampabili/" aria-label="Torna alle schede">← Torna alle schede</a>
    <span class="scheda-titolo">Da colorare: A scuola in sicurezza — Infanzia</span>
    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: a scuola in sicurezza. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo 'A scuola in sicurezza'. Sottotitolo 'Ricorda queste semplici regole per stare tutti al sicuro'. Sei vignette numerate: 1) tre bambini in fila in corridoio, 'Cammino in fila senza spingere'; 2) maestra con libro spiega a tre bambini, 'Ascolto la maestra e seguo le istruzioni'; 3) bambino indica un cartello 'Uscita di emergenza' su una porta, 'Conosco l'uscita di emergenza'; 4) tre bambini camminano verso il cartello 'Punto di raccolta', 'Vado al punto di raccolta'; 5) bambino su una scala con cartello di divieto, 'Non spingo e non corro'; 6) bambina aiuta un bambino seduto a terra con un cuoricino di empatia, 'Sono calmo e aiuto i compagni'. Riquadro finale con cuore e sorriso 'Insieme siamo più sicuri'. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
  </main>
