         alt="Scheda da colorare: le forme dei cartelli. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo 'Le forme dei cartelli'. Sottotitolo 'Ogni cartello ha la sua forma. Coloriamoli insieme!'. Sei cartelli da riconoscere: 1) cerchio con diagonale 'Il cerchio è un divieto'; 2) quadrato con figura che corre verso l'uscita 'Il quadrato mostra l'uscita'; 3) triangolo con punto esclamativo 'Il triangolo è un pericolo'; 4) cerchio vuoto 'Il cerchio blu è un obbligo'; 5) rettangolo con croce di pronto soccorso 'Il rettangolo è informazione'; 6) triangolo con triangolo PC all'interno 'Questo triangolo è la Protezione Civile'. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
