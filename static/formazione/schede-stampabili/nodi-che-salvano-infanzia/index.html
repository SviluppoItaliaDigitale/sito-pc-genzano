         alt="Scheda da colorare: i nodi che salvano. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'I nodi che salvano'. Sottotitolo 'Colora i disegni e impara cosa fare in 6 passi facili'. Sei vignette numerate che insegnano a fare un nodo semplice: 1) bambino tiene una corda fra le due mani; 2) bambino forma un anello con la corda; 3) bambino passa l'estremità libera dentro l'anello; 4) bambino tira le due estremità per stringere il nodo; 5) il nodo finito, forte e sicuro; 6) due bambini usano la corda annodata per legarsi a un albero. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
