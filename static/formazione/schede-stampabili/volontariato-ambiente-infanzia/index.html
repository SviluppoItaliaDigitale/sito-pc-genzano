  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

  <div class="scheda-toolbar no-print">
    <a href="/formazione/schede-stampabili/" aria-label="Torna alle schede">← Torna alle schede</a>
    <span class="scheda-titolo">Da colorare: Volontariato e ambiente — Infanzia</span>
    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: volontariato e ambiente. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'Volontariato e ambiente'. Sottotitolo 'Colora i disegni e impara cosa fare in 6 passi facili'. Sei vignette con volontari della PC (casco con triangolo e gilet con PC) che mostrano gesti di rispetto per l'ambiente: 1) volontario raccoglie rifiuti nel prato con un sacco; 2) volontaria pianta un alberello accanto a un cartello 'Rispetta la natura'; 3) volontario fa la raccolta differenziata con tre bidoni etichettati Carta, Plastica, Vetro; 4) volontaria annaffia un fiore con un innaffiatoio; 5) due volontari ripuliscono insieme un'area con sacchi e pinza; 6) due volontari con il pollice in su mostrano il pianeta Terra che sorride. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
