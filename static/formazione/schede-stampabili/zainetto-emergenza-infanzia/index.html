<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scheda da colorare: Il mio zainetto di emergenza — Infanzia</title>
  <meta name="description" content="Scheda fotocopiabile colorabile per la Scuola dell'Infanzia. Lo zainetto di emergenza personale del bambino con 6 oggetti essenziali: acqua, torcia, fischietto, copertina, numeri utili (112), peluche rassicurante.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="/formazione/schede-stampabili/assets/scheda-print.css">
  <style>
    body { margin: 0; padding: 0; background: #f4f7fb; }
    .scheda-immagine-wrapper { max-width: 900px; margin: 1rem auto; padding: 0 1rem; }
    .scheda-immagine-wrapper img { width: 100%; height: auto; display: block; box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-radius: 4px; }
    @media print {
      body { background: #fff; }
      .scheda-immagine-wrapper { max-width: 100%; margin: 0; padding: 0; }
      .scheda-immagine-wrapper img { box-shadow: none; border-radius: 0; width: 100%; height: auto; max-height: 100vh; object-fit: contain; }
      @page { size: A4 portrait; margin: 8mm; }
    }
  </style>
</head>
<body>
  <div class="scheda-toolbar no-print">
    <a href="/formazione/schede-stampabili/" aria-label="Torna alle schede">← Torna alle schede</a>
    <span class="scheda-titolo">Da colorare: Il mio zainetto di emergenza — Infanzia</span>
    <button type="button" onclick="window.print()">🖨️ Stampa o salva come PDF</button>
  </div>

  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: il mio zainetto di emergenza. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo 'Il mio zainetto di emergenza'. Sottotitolo 'Colora gli oggetti e scopri cosa c'è nel mio zainetto'. Al centro un grande zainetto con cuoricino sorridente. Intorno sei oggetti numerati con didascalia: 1) Acqua, bottiglia con didascalia 'Ho sempre una bottiglia d'acqua'; 2) Torcia, 'Mi illumina quando è buio'; 3) Fischietto, 'Fischio forte se ho bisogno di aiuto'; 4) Copertina, 'Mi tiene al caldo quando fa freddo'; 5) Numeri utili, quadernino con il numero 112, 'Conosco i numeri importanti'; 6) Peluche rassicurante, orsacchiotto, 'Il mio amico peluche mi fa sentire al sicuro'. Al centro un riquadro con cuori 'Il mio zainetto è sempre pronto per aiutarmi!'. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
  </main>
