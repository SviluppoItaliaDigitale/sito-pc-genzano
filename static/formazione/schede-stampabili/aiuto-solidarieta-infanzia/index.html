  <main class="scheda-immagine-wrapper">
    <img src="scheda-completa.png"
         alt="Scheda da colorare: aiuto e solidarietà. In alto al centro il logo del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma. Titolo grande 'Aiuto e solidarietà'. Sottotitolo 'Colora i disegni e impara cosa fare in 6 passi facili'. Sei vignette con volontari della PC (casco con triangolo e gilet con PC) che mostrano i valori del volontariato: 1) saluta gentilmente un bambino; 2) consegna una coperta a una persona anziana in un campo di accoglienza; 3) ascolta e consola un bambino con un orsetto; 4) due volontari sistemano insieme una scatola di rifornimenti; 5) volontaria comunica con sorriso a una famiglia; 6) volontario fa il segno del cuore con le mani davanti a una bandiera della PC. In basso 'Rev. 02 - Maggio 2026 - protezionecivilegenzano.it'.">
