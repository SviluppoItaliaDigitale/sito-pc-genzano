# URL statici da aggiungere al sitemap.xml di Hugo
# Hugo non include automaticamente file in /static/, quindi vanno dichiarati qui.
#
# REGOLA: ogni nuovo gioco / app statica con `<meta name="robots" content="index, follow">`
# va aggiunto a questo elenco per essere dichiarato esplicitamente nel sitemap
# (Google li trova comunque via crawl dei link interni, ma il sitemap accelera la scoperta).
#
# Schema voci:
#   - path: percorso relativo dalla root (deve iniziare con /)
#     priority: priorità SEO 0.0-1.0 (default Hugo: 0.5)
#     changefreq: hourly | daily | weekly | monthly | yearly | never
#
# Vedi MANUALE-SITO §4.7 e .claude/rules/05-github-aruba-deploy.md per il deploy.

