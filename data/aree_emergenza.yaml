# Volontari di Protezione Civile (aprile 2026). Tutti i 16 punti sono
# contrassegnati come verified: true.
#
# NOTA: AR2 — nel testo del Piano l'area è indicata come "Via Piemonte",
# mentre l'accesso reale sul territorio è in Via Sicilia (dove è
