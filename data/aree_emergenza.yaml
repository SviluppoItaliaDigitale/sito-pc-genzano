# Aree di emergenza del Piano di Protezione Civile di Genzano di Roma.
#
# Coordinate ottenute da Nominatim (OpenStreetMap) e contrassegnate
# come "verified: true". Per i 4 punti che Nominatim non ha trovato
# direttamente, ho usato stime ragionevoli basate sull'area indicata
# negli indirizzi e contrassegnato "verified: false" — il Comune o un
# volontario può correggere queste 4 coordinate verificandole sul campo
# o con il GIS comunale.
#
# Tipi di area:
#   AA = Area di Attesa della popolazione (10 punti)
#   AS = Area di Ammassamento Soccorritori (2 punti)
#   AR = Area di Ricovero della popolazione (4 punti)

