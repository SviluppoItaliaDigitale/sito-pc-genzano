# Registro dei video in Lingua Italiana dei Segni (LIS).
#
# Da maggio 2026 il sito linka video LIS prodotti da due canali istituzionali
# pubblici, in modalità *privacy-first* (nessun embed YouTube — il click
# apre il video sul canale del produttore in nuova scheda). I 2 canali sono:
#
# 1. Io non rischio (DPC + ANPAS + INGV + RELUIS + CIMA) — canale ufficiale
#    della campagna nazionale di comunicazione sulle buone pratiche di PC.
#    Tre collezioni LIS distinte:
#    a) Playlist "Materiali informativi Io non rischio in LIS e con audio
#       descrizione" (id PLyRppYk2-sTIDs7RX-2C0pB1ZmgtA0yMo, 12 video 2023).
#    b) 3 video Stromboli LIS pubblicati nel 2025.
#    c) Playlist "Videolezioni - L'attimo decisivo" (id PLyRppYk2-sTKsMmo7PNnOabYpz2paC77V,
#       12 lezioni divulgative con interprete LIS in sovrimpressione,
#       senza dichiarazione esplicita LIS nei metadata YouTube).
#    Livello 1 nella gerarchia delle fonti PC
#    (vedi .claude/rules/06-protezione-civile-scientifica.md).
#
# 2. Abili a Proteggere (Cooperativa Sociale Europe Consulting) — progetto
#    sul rapporto disabilità ↔ protezione civile. Serie "Glossario in LIS"
#    che traduce in Lingua dei Segni i termini chiave del lessico tecnico
#    della PC. Sinergia diretta con la nostra pagina /abili-a-proteggere/.
#
# I video sono raggruppati in *famiglie tematiche* (campo `famiglia:`); le
# pagine del sito dichiarano `lis_section: <famiglia>` nel frontmatter per
# mostrare il badge "X video in LIS" che porta alla sezione corrispondente
# di /lis/.
#
# Per aggiungere un video: nuova voce in `video:`, compilare i campi, e
# (se vuoi mostrarlo come badge contestuale) aggiungere `lis_section:` al
# frontmatter della pagina target.

# Famiglie tematiche con i loro metadata (titolo sezione, descrizione).
famiglia:
  rischio-sismico:
    titolo: "Rischio sismico"
    descrizione: "Cosa fare in caso di terremoto e il vocabolario tecnico essenziale: classificazione sismica, fenomeni precursori, reti di monitoraggio, normativa antisismica."

  rischio-vulcanico:
    titolo: "Rischio vulcanico"
    descrizione: "Cosa sapere e cosa fare sulle eruzioni vulcaniche (con riferimento al caso Stromboli) e il vocabolario di base: bradisismo, fumarole, eruzioni effusive ed esplosive."

  rischio-idrogeologico:
    titolo: "Rischio idrogeologico — alluvioni"
    descrizione: "Cosa fare prima, durante e dopo un'alluvione, in base alla campagna nazionale del Dipartimento di Protezione Civile."

  rischio-incendio:
    titolo: "Rischio incendi boschivi"
    descrizione: "Come evitare, riconoscere e affrontare un incendio boschivo: comportamenti di autoprotezione e segnalazione."

  maremoto:
    titolo: "Rischio maremoto (utile per chi va al mare)"
    descrizione: "Cosa sapere e cosa fare in caso di maremoto sulle coste italiane: per quanto Genzano sia comune interno, è informazione utile per chi raggiunge il litorale laziale e altre coste."

  allerte-meteo:
    titolo: "Allerte meteo e bollettini"
    descrizione: "Come leggere i bollettini di criticità e di vigilanza meteo, i livelli di allerta, il ruolo del Centro funzionale per la protezione civile."

  gestione-emergenza:
    titolo: "Sale operative e gestione delle emergenze"
    descrizione: "Centro Operativo Comunale (COC), Comitato Operativo, Sala situazione Italia, DICOMAC, Strutture operative nazionali e Funzioni di supporto."

  pianificazione:
    titolo: "Pianificazione e attività di protezione civile"
    descrizione: "Pianificazione di protezione civile, esercitazioni e Colonna Mobile Nazionale: come si prepara il sistema."

  aree-emergenza:
    titolo: "Aree di emergenza"
    descrizione: "I tre tipi di aree previste dal Piano di Emergenza Comunale: aree di attesa, di accoglienza, di ammassamento dei soccorritori."

  kit-emergenza:
    titolo: "Kit di emergenza"
    descrizione: "Cosa contiene il kit di emergenza domestico secondo la campagna nazionale Io non rischio."

# Fonti dei video — usate per attribuzione visibile sulla pagina /lis/.
fonte:
  io-non-rischio:
    nome: "Io non rischio"
    descrizione: "Campagna nazionale di comunicazione sulle buone pratiche di protezione civile promossa dal Dipartimento della Protezione Civile in collaborazione con ANPAS, INGV, RELUIS e CIMA."
    canale_url: "https://www.youtube.com/@io_non_rischio"
    playlist_lis_url: "https://www.youtube.com/playlist?list=PLyRppYk2-sTIDs7RX-2C0pB1ZmgtA0yMo"
    licenza: "Materiali della campagna nazionale Io non rischio — riuso secondo i termini della campagna. Video sul canale ufficiale YouTube."

  abili-a-proteggere:
    nome: "Abili a Proteggere"
    descrizione: "Progetto della Cooperativa Sociale Europe Consulting sul rapporto disabilità e protezione civile. Serie 'Glossario in LIS — Lingua dei Segni' che traduce i termini chiave della PC."
    canale_url: "https://www.youtube.com/@abiliaproteggere4520"
    licenza: "Video pubblici sul canale YouTube del progetto Abili a Proteggere."

  dpc-gov:
    nome: "Dipartimento della Protezione Civile (PCM)"
    descrizione: "Canale ufficiale del Dipartimento della Protezione Civile della Presidenza del Consiglio dei Ministri. Pubblica conferenze stampa, eventi istituzionali, materiali su esercitazioni nazionali e supporto a emergenze in atto. Non ha playlist LIS dedicata, ma occasionalmente i video istituzionali hanno interprete LIS. Monitorato settimanalmente dal workflow `check-video-lis.yml`."
    canale_url: "https://www.youtube.com/@DPCgov"
    licenza: "Video del Dipartimento di Protezione Civile — riuso secondo i termini istituzionali."

