# Tassonomie
[taxonomies]
  badge = "badges"

# Impostazioni di output
[outputs]
home = ["HTML", "RSS", "JSON", "BUILDINFO"]

# Formato output per /build-info.js — timestamp della build Hugo
# usato dalle pagine statiche (giochi, quizpc, formazionepc, ecc.)
# tramite site-chrome.js per mostrare "Sito aggiornato il..." nella utility bar
[mediaTypes."application/javascript"]
  suffixes = ["js"]

[outputFormats.BUILDINFO]
  mediaType = "application/javascript"
  baseName = "build-info"
  isPlainText = true
  notAlternative = true

# Sitemap
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Sitemap — priorità per sezione (override del default 0.5)
[frontmatter]
  date = ["date"]
  lastmod = [":git", "lastmod", ":fileModTime"]

# Impostazioni Markdown
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser.attribute]
      block = true
      title = true

