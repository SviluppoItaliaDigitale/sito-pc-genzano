# ============================================================
# Configurazione Hugo — Protezione Civile Genzano di Roma
# ============================================================


baseURL = "https://sviluppoitaliadigitale.github.io/sito-pc-genzano/"
languageCode = "it"
defaultContentLanguage = "it"
title = "Protezione Civile Genzano di Roma"
timeZone = "Europe/Rome"

# Tema personalizzato
theme = "flavour-pcgenzano"

# Usa i metadati git per determinare l'ultimo aggiornamento di ogni pagina
enableGitInfo = true

# Impostazioni generali
[params]
  # URL di produzione — usato per canonical, og:url e sitemap
  productionBaseURL = "https://www.protezionecivilegenzano.it/"
  description = "Sito ufficiale del Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma"
  author = "Gruppo Comunale Volontari di Protezione Civile di Genzano di Roma"
  # Handle X (Twitter) del Gruppo, usato come twitter:site nelle Twitter Card
  # delle anteprime quando un articolo viene condiviso su X.
  twitterSite = "@alfagenzano"
  cf = "92011880588"
  sede = "Via Sicilia, 13-15 - 00045 Genzano di Roma (RM)"
  telefono = "+39 06 9362600"
  # Formato E.164 per attributo href="tel:..." (solo cifre, nessuno spazio)
  telefono_tel = "+39069362600"
  email = "segreteria@protezionecivilegenzano.it"
  pec = ""
  facebook = "https://www.facebook.com/protezionecivilegenzanodiroma"
  instagram = "https://www.instagram.com/protezionecivilegenzano/"
  twitter = "https://x.com/alfagenzano"
  telegram = "https://t.me/pcalfagenzano"
  linktree = "https://linktr.ee/protezionecivilegenzano"
  gestionale = "https://activepager.com/auth/login"
  # Area Volontari — URL centralizzati (audit 13/05 P1-3)
  areaVolontariUrl = "/area-volontari/"
  activePagerLoginUrl = "https://activepager.com/auth/login"
  activePagerPrivacyUrl = "https://activepager.com/privacy"
  httpsAttivo = true
  # Link alla dichiarazione di accessibilità su form.agid.gov.it
  dichiarazioneAccessibilita = ""
  # Informazioni istituzionali
  coi = "14° COI Prov. di Roma"
  registroRegionale = "n.184"
  runts = "Iscritta al RUNTS sez. 'Altri Enti del Terzo Settore' con determina n. G14230 del 28/10/2024"
  coordinamento = "FEPIVOL"

# Menu principale di navigazione (mega-menu accorpato)
# 8 voci di primo livello: 3 dirette (Home, Comunicazioni, Contatti) e 5
# dropdown (Per il Cittadino, Per le scuole, Accessibilità e Supporti,
# Volontariato, Risorse).
#
# Razionale del riordino di maggio 2026 (v3): l'audit di usabilità ha
# rilevato 3 problemi sull'organizzazione di aprile 2026:
# 1) "Educazione e Inclusione" sovraccarico (10 voci, oltre Miller 7±2),
#    con materiale didattico per scuole + accessibilità trasversale + uno
#    strumento (glossario) tutto mescolato → splittato in "Per le scuole"
#    e "Accessibilità e Supporti".
# 2) "Kit Emergenza Schede" (kit-calamita per cittadini in difficoltà:
#    anziano in evacuazione, caregiver di allettato, neogenitore in
#    calamità) era nel posto sbagliato (Educazione) → spostato in
#    "Per il Cittadino" e rinominato "Kit pronti per situazioni vulnerabili".
# 3) "Glossario" è uno strumento, non un'area didattica → spostato in
#    "Risorse" dove vivono FAQ, normativa, area download.
# 4) "Schede Stampabili" era ambiguo (sembravano kit cittadini) → rinominato
#    "Schede didattiche stampabili" per chiarezza vs Kit Calamità.
#
# Razionale del riordino precedente di aprile 2026 (v2, mantenuto): le
# pagine di accessibilità inclusiva (Abili a Proteggere, Facile da Leggere)
# erano raggiungibili solo in 3+ click — paradosso, visto che servono a
# chi ha più difficoltà. Le pagine di servizio (FAQ, Strumenti, Area
# Download, Normativa) erano solo in homepage o footer: raccolte sotto
# un nuovo dropdown "Risorse" sempre disponibile.
[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1

# --- Dropdown: Per il Cittadino (7 voci) ---
[[menus.main]]
  name = "Per il Cittadino"
  identifier = "per-il-cittadino"
  weight = 2

[[menus.main]]
